<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AktivOslo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--navy:#12122a;--ink:#1c1c3a;--accent:#2d6be4;--green:#16a34a;--orange:#ea580c;--sand:#f7f6f2;--card:#ffffff;--border:#ebebeb;--text:#111;--muted:#6b7280;--radius:14px;--r-sm:9px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100dvh;overflow:hidden;font-family:'Inter',system-ui,sans-serif;background:var(--sand);color:var(--text)}

/* ── HEADER ── */
header{background:linear-gradient(135deg,#12122a 0%,#1c1c3a 100%);color:#fff;padding:12px 16px 10px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:8px}
.logo{display:flex;align-items:center;gap:8px}
.logo-text{font-size:1.05rem;font-weight:800;letter-spacing:-.02em}
.logo-sub{font-size:.65rem;color:rgba(255,255,255,.45);margin-top:1px}
.streak-badge{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border-radius:20px;padding:5px 11px;cursor:pointer}
.streak-fire{font-size:1rem}
.streak-num{font-size:.85rem;font-weight:800;color:#fbbf24}
.streak-label{font-size:.62rem;color:rgba(255,255,255,.5)}

/* ── TODAY CARD (hero) ── */
.today-card{margin:12px 14px 0;background:linear-gradient(135deg,#12122a 0%,#252560 100%);border-radius:var(--radius);overflow:hidden;cursor:pointer;position:relative;flex-shrink:0;box-shadow:0 4px 20px rgba(18,18,42,.25)}
.today-card-inner{padding:14px 16px 16px;display:flex;gap:12px;align-items:flex-start}
.today-left{flex:1;min-width:0}
.today-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.5);margin-bottom:4px}
.today-name{font-size:1.05rem;font-weight:800;color:#fff;line-height:1.25}
.today-reason{font-size:.77rem;color:rgba(255,255,255,.65);margin-top:4px;line-height:1.45}
.today-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.today-pill{font-size:.68rem;padding:3px 9px;border-radius:20px;font-weight:600}
.today-pill.free{background:rgba(22,163,74,.25);color:#86efac}
.today-pill.paid{background:rgba(234,88,12,.2);color:#fdba74}
.today-pill.dist{background:rgba(255,255,255,.12);color:rgba(255,255,255,.7)}
.today-emoji{font-size:2.8rem;flex-shrink:0;align-self:center}
.today-refresh{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);width:26px;height:26px;border-radius:50%;font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── WEATHER ROW ── */
.weather-row{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--sand);flex-shrink:0}
.w-pill{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:.75rem;color:var(--muted);font-weight:500}
.w-pill strong{color:var(--text)}
.suggest-btn{margin-left:auto;background:var(--accent);color:#fff;border:none;border-radius:20px;padding:6px 14px;font-size:.77rem;font-weight:700;cursor:pointer;white-space:nowrap}
.suggest-btn:active{opacity:.85}

/* ── TABS ── */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:9px 4px;text-align:center;font-size:.72rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── SEARCH + FILTERS ── */
.filter-bar{background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.search-wrap{padding:8px 14px 0}
.search-wrap input{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.88rem;font-family:inherit;outline:none;background:var(--sand);color:var(--text)}
.search-wrap input:focus{border-color:var(--accent);background:#fff}
.cat-row{display:flex;gap:6px;padding:8px 14px;overflow-x:auto;scrollbar-width:none}
.cat-row::-webkit-scrollbar{display:none}
.cat-btn{white-space:nowrap;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:.74rem;font-weight:600;cursor:pointer;color:var(--muted);transition:all .12s;font-family:inherit}
.cat-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);box-shadow:0 2px 8px rgba(18,18,42,.2)}
.chip-row{display:flex;gap:5px;padding:0 14px 8px;overflow-x:auto;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:4px 10px;border-radius:14px;border:1px solid var(--border);background:#fff;font-size:.71rem;cursor:pointer;color:var(--muted);font-family:inherit;transition:all .12s}
.chip.on{background:#e8f0fe;color:var(--accent);border-color:#a8c4f5;font-weight:600}

/* ── LIST ── */
#listView{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.results-bar{padding:6px 14px;font-size:.72rem;color:var(--muted);background:var(--sand);flex-shrink:0;border-bottom:1px solid var(--border);font-weight:500}
.cards{padding:10px 14px;display:flex;flex-direction:column;gap:9px;padding-bottom:24px}
.card{background:var(--card);border-radius:var(--radius);padding:13px 14px;border:1px solid var(--border);cursor:pointer;transition:transform .12s,box-shadow .12s}.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.09);border-color:#d0d0d0}
.card:active{transform:scale(.98)}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-title{font-size:.93rem;font-weight:700;line-height:1.3}
.card-loc{font-size:.71rem;color:var(--muted);margin-top:2px}
.card-desc{font-size:.8rem;color:#444;margin-top:7px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:9px}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.ctag{font-size:.67rem;padding:2px 7px;border-radius:6px;background:#f0f0ec;color:#555}
.ctag.t{background:#e8eef7;color:#1a3a6e;font-weight:600}
.badge-free{background:#dcfce7;color:var(--green);font-size:.68rem;padding:3px 8px;border-radius:8px;font-weight:700;white-space:nowrap}
.badge-paid{background:#ffedd5;color:var(--orange);font-size:.68rem;padding:3px 8px;border-radius:8px;font-weight:700;white-space:nowrap}
.score-tag{font-size:.68rem;padding:2px 7px;border-radius:8px;background:#f5f5f0;color:#555;font-weight:600;margin-left:4px}
.visited-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block;margin-right:4px;vertical-align:middle}
.no-results{text-align:center;padding:60px 20px;color:var(--muted)}
.no-results .nr-i{font-size:2.5rem;margin-bottom:10px}

/* ── EXPLORE (seksjoner) ── */
#exploreView{flex:1;overflow-y:auto;background:var(--sand)}
.explore-pad{padding:10px 0 28px}
.ex-section{margin-bottom:4px}
.ex-title{font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:12px 14px 6px}
.h-scroll{display:flex;gap:10px;padding:0 14px 8px;overflow-x:auto;scrollbar-width:none}
.h-scroll::-webkit-scrollbar{display:none}
.h-card{flex-shrink:0;width:185px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;cursor:pointer}
.h-card:active{opacity:.8}
.h-emoji{height:80px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;background:var(--sand)}
.h-body{padding:9px 11px 11px}
.h-name{font-size:.83rem;font-weight:700;line-height:1.3}
.h-loc{font-size:.69rem;color:var(--muted);margin-top:2px}
.h-foot{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.rank-list{padding:0 14px;display:flex;flex-direction:column;gap:7px}
.rank-item{background:var(--card);border-radius:var(--r-sm);padding:10px 13px;display:flex;align-items:center;gap:11px;cursor:pointer;border:1px solid var(--border)}
.rank-item:active{opacity:.8}
.rank-num{font-size:1rem;font-weight:900;color:var(--border);width:20px;text-align:center}
.rank-num.top{color:var(--accent)}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:.86rem;font-weight:700}
.rank-sub{font-size:.7rem;color:var(--muted);margin-top:1px}
.bucket-row{display:flex;gap:8px;padding:0 14px;overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap}
.bucket-row::-webkit-scrollbar{display:none}
.bucket-btn{flex-shrink:0;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:.78rem;font-weight:600;cursor:pointer;color:var(--text);font-family:inherit;text-align:left;min-width:130px;transition:all .15s}
.bucket-btn:active{background:var(--sand)}
.bucket-btn.done{border-color:var(--green);background:#f0fdf4;color:var(--green)}
.bucket-icon{font-size:1.4rem;margin-bottom:4px;display:block}
.bucket-label{font-size:.71rem;color:var(--muted);margin-top:2px}

/* ── MAP ── */
#mapView{position:absolute;inset:0;display:none;flex-direction:column}
#mapView.visible{display:flex}
#map{flex:1}
.map-sheet{position:absolute;bottom:0;left:0;right:0;background:var(--card);border-radius:18px 18px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.12);z-index:1000;transform:translateY(100%);transition:transform .28s ease;max-height:58dvh;overflow-y:auto}
.map-sheet.open{transform:translateY(0)}
.sheet-drag{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 6px}
.map-count{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(18,18,42,.82);color:#fff;padding:5px 14px;border-radius:20px;font-size:.73rem;font-weight:600;z-index:400;pointer-events:none}
.map-cat-row{position:absolute;top:42px;left:0;right:0;z-index:400;display:flex;gap:6px;padding:0 12px;overflow-x:auto;scrollbar-width:none}
.map-cat-row::-webkit-scrollbar{display:none}
.mcat{white-space:nowrap;padding:5px 12px;border-radius:20px;background:rgba(255,255,255,.95);border:1px solid rgba(0,0,0,.1);font-size:.73rem;font-weight:600;cursor:pointer;color:var(--muted);box-shadow:0 1px 4px rgba(0,0,0,.12);font-family:inherit}
.mcat.active{background:var(--navy);color:#fff;border-color:var(--navy)}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;overflow-y:auto;padding:16px}
.modal-box{background:var(--card);border-radius:20px;padding:22px;max-width:520px;margin:0 auto;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-close{position:absolute;top:14px;right:14px;background:var(--sand);border:none;color:var(--muted);width:30px;height:30px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.modal-emoji{font-size:3rem;margin-bottom:6px}
.modal-name{font-size:1.1rem;font-weight:800;padding-right:28px;line-height:1.25}
.modal-loc{font-size:.77rem;color:var(--muted);margin-top:2px;margin-bottom:10px}
.modal-badges{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.modal-desc{font-size:.84rem;line-height:1.6;color:#333;margin-bottom:14px}
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
.sg-box{background:var(--sand);border-radius:9px;padding:9px;text-align:center}
.sg-l{font-size:.63rem;color:var(--muted);margin-bottom:2px}
.sg-v{font-size:1.1rem;font-weight:900;color:var(--navy)}
.info-rows{font-size:.81rem;margin-bottom:14px}
.info-row{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5}
.info-row:last-child{border:none}
.ir-l{color:var(--muted);width:105px;flex-shrink:0}
.ir-v{font-weight:500;color:var(--text);flex:1}
.rate-box{background:var(--sand);border-radius:10px;padding:12px 14px;margin-bottom:10px;text-align:center}
.rate-title{font-size:.78rem;font-weight:700;margin-bottom:8px}
.star-row{display:flex;gap:6px;justify-content:center}
.star-btn{font-size:1.7rem;cursor:pointer;background:none;border:none;transition:transform .1s;font-family:inherit}
.star-btn:active{transform:scale(1.2)}
.fav-btn{width:100%;padding:11px;border:1.5px solid var(--border);background:#fff;border-radius:var(--r-sm);font-size:.86rem;font-weight:700;cursor:pointer;margin-top:6px;color:var(--muted);font-family:inherit;transition:all .15s}
.fav-btn.on{background:#fef2f2;border-color:#fca5a5;color:#dc2626}
.mark-visited{width:100%;padding:11px;border:1.5px solid var(--border);background:#fff;border-radius:var(--r-sm);font-size:.86rem;font-weight:700;cursor:pointer;margin-top:6px;color:var(--green);font-family:inherit;transition:all .15s;border-color:#86efac}
.mark-visited.done{background:#f0fdf4;border-color:var(--green)}

/* ── SUGGESTIONS OVERLAY ── */
.sugg-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:3000;overflow-y:auto;padding:16px;align-items:flex-start}
.sugg-overlay.open{display:flex}
.sugg-box{background:var(--card);border-radius:18px;padding:20px;max-width:500px;width:100%;margin:0 auto;position:relative}
.sugg-title{font-size:1rem;font-weight:800;color:var(--navy);margin-bottom:2px}
.sugg-sub{font-size:.75rem;color:var(--muted);margin-bottom:14px}
.sugg-close{position:absolute;top:16px;right:16px;background:var(--sand);border:none;font-size:1rem;color:var(--muted);width:28px;height:28px;border-radius:50%;cursor:pointer;font-family:inherit}
.ctx-chips{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ctx-chip{padding:5px 12px;border-radius:16px;border:1.5px solid var(--border);background:#fff;font-size:.75rem;font-weight:600;cursor:pointer;color:var(--muted);font-family:inherit;transition:all .12s}
.ctx-chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.sugg-list{display:flex;flex-direction:column;gap:9px}
.sugg-item{background:var(--sand);border-radius:12px;padding:12px 13px;cursor:pointer;border:1.5px solid transparent;display:flex;gap:11px;transition:border-color .15s}
.sugg-item:active{opacity:.8}
.sugg-item.top{border-color:var(--accent);background:#f0f4ff}
.si-emoji{font-size:1.7rem;flex-shrink:0}
.si-info{flex:1;min-width:0}
.si-name{font-size:.88rem;font-weight:700}
.si-why{font-size:.72rem;color:var(--accent);font-weight:600;margin-top:2px}
.si-meta{font-size:.7rem;color:var(--muted);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap}
.si-match{font-size:.75rem;font-weight:800;color:var(--navy);padding-top:2px;flex-shrink:0}

/* ── BOTTOM NAV (for explore/map) ── */
#bottomNav{display:flex;background:var(--card);border-top:1px solid var(--border);flex-shrink:0;padding:6px 0 max(8px,env(safe-area-inset-bottom))}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 2px;cursor:pointer;background:none;border:none;color:var(--muted);font-family:inherit;transition:color .15s}
.nav-btn.on{color:var(--accent)}
.nav-btn svg{width:20px;height:20px}
.nav-btn span{font-size:.58rem;font-weight:700;letter-spacing:.02em}

/* ── STREAK MODAL ── */
.streak-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:4000;align-items:center;justify-content:center;padding:20px}
.streak-modal.open{display:flex}
.streak-box{background:var(--card);border-radius:18px;padding:28px 24px;max-width:320px;width:100%;text-align:center}
.streak-big{font-size:4rem;font-weight:900;color:#fbbf24}
.streak-msg{font-size:1rem;font-weight:700;margin:8px 0 4px}
.streak-sub{font-size:.82rem;color:var(--muted);line-height:1.5}
.streak-days{display:flex;gap:6px;justify-content:center;margin:16px 0}
.streak-day{width:32px;height:32px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:var(--muted)}
.streak-day.done{background:#fbbf24;color:#fff}
.streak-day.today{background:var(--accent);color:#fff}
.streak-close{margin-top:4px;width:100%;padding:11px;background:var(--navy);color:#fff;border:none;border-radius:var(--r-sm);font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--navy);color:#fff;padding:8px 18px;border-radius:20px;font-size:.78rem;font-weight:600;opacity:0;transition:all .22s;z-index:9999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── APP LAYOUT ── */
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
#listView,#exploreView{display:none}
#listView.visible,#exploreView.visible{display:flex;flex-direction:column}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div>
        <div class="logo-text">🏃 AktivOslo</div>
        <div class="logo-sub">177 steder · Oslo, Asker, Bærum</div>
      </div>
    </div>
    <div class="streak-badge" onclick="openStreak()">
      <span class="streak-fire">🔥</span>
      <div>
        <div class="streak-num" id="streakNum">0</div>
        <div class="streak-label">dager</div>
      </div>
    </div>
  </header>

  <!-- TODAY HERO -->
  <div class="today-card" id="todayCard" onclick="todayCardClick()">
    <button class="today-refresh" onclick="event.stopPropagation();nextTodayPlace()" title="Neste forslag">↻</button>
    <div class="today-card-inner">
      <div class="today-left">
        <div class="today-label">✨ Dagens anbefaling</div>
        <div class="today-name" id="todayName">Laster...</div>
        <div class="today-reason" id="todayReason"></div>
        <div class="today-meta" id="todayMeta"></div>
      </div>
      <div class="today-emoji" id="todayEmoji">⏳</div>
    </div>
  </div>

  <!-- WEATHER + SUGGEST -->
  <div class="weather-row">
    <div class="w-pill" id="wPill">🌡️ <strong>Oslo</strong></div>
    <button class="suggest-btn" onclick="openSugg()">✨ Hva skal vi finne på?</button>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" id="tabListe" onclick="switchTab('liste')">📋 Alle steder</div>
    <div class="tab" id="tabUtforsk" onclick="switchTab('utforsk')">🗂️ Utforsk</div>
    <div class="tab" id="tabKart" onclick="switchTab('kart')">🗺️ Kart</div>
  </div>

  <!-- MAIN -->
  <div id="main">

    <!-- LISTE VIEW -->
    <div id="listView" class="visible">
      <div class="filter-bar">
        <div class="search-wrap">
          <input type="text" id="searchQ" placeholder="🔍 Søk sted, bydel, aktivitet..." oninput="renderList()" autocomplete="off">
        </div>
        <div class="cat-row" id="catRow"></div>
        <div class="chip-row" id="chipRow"></div>
      </div>
      <div class="results-bar" id="resultsBar"></div>
      <div class="cards" id="cards"></div>
    </div>

    <!-- UTFORSK VIEW -->
    <div id="exploreView">
      <div class="explore-pad">

        <div class="ex-section">
          <div class="ex-title">🏆 Høyest rangert</div>
          <div class="rank-list" id="rankList"></div>
        </div>

        <div class="ex-section">
          <div class="ex-title">🔥 Trendende nå</div>
          <div class="h-scroll" id="trendRow"></div>
        </div>

        <div class="ex-section">
          <div class="ex-title">💎 Skjulte perler</div>
          <div class="h-scroll" id="gemsRow"></div>
        </div>

        <div class="ex-section">
          <div class="ex-title">🪣 Din aktivitetsliste</div>
          <div class="bucket-row" id="bucketRow"></div>
        </div>

      </div>
    </div>

    <!-- MAP VIEW -->
    <div id="mapView">
      <div id="map"></div>
      <div class="map-count" id="mapCount"></div>
      <div class="map-cat-row" id="mapCatRow"></div>
      <div class="map-sheet" id="mapSheet">
        <div class="sheet-drag"></div>
        <div id="mapSheetBody" style="padding:0 18px 28px"></div>
      </div>

};

// STREAK
// ═══════════════════════════════════════════
function getStreak() {
  const today = new Date().toDateString();
  let streak = LS.get('streak') || { count: 0, last: null, days: [] };
  if (streak.last !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (streak.last === yesterday) { streak.count++; }
    else if (streak.last !== today) { streak.count = 1; }
    streak.last = today;
    streak.days = [...(streak.days||[]).slice(-6), today];
    LS.set('streak', streak);
  }
  return streak;
}

function openStreak() {
  const s = getStreak();
  document.getElementById('streakBig').textContent = s.count + '🔥';
  document.getElementById('streakMsg').textContent = s.count <= 1 ? 'Første dag!' : `${s.count} dager på rad!`;
  document.getElementById('streakSub').textContent = s.count < 3 ? 'Kom tilbake i morgen for å holde streaken i gang.' : s.count < 7 ? 'Du er på god vei – ikke gi deg nå!' : 'Imponerende! Du er en ekte Oslo-utforsker.';
  const today = new Date().toDateString();
  const days = ['Man','Tir','Ons','Tor','Fre','Lør','Søn'];
  const dayNums = Array.from({length:7},(_,i)=>{ const d=new Date(Date.now()-(6-i)*86400000); return d.toDateString(); });
  document.getElementById('streakDays').innerHTML = dayNums.map((d,i) => {
    const isDone = (s.days||[]).includes(d);
    const isToday = d===today;
    return `<div class="streak-day ${isToday?'today':isDone?'done':''}">${days[i]}</div>`;
  }).join('');
  document.getElementById('streakModal').classList.add('open');
}
function closeStreak(){ document.getElementById('streakModal').classList.remove('open'); }

function updateStreakBadge(){
  const s = getStreak();
  document.getElementById('streakNum').textContent = s.count;
}

async function fetchWeather(){
  try{
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=59.913&longitude=10.752&current=temperature_2m,weathercode,windspeed_10m&timezone=Europe/Oslo');
    const d = await r.json(); const c = d.current;
    const t = Math.round(c.temperature_2m);
    const code = c.weathercode;
    const icons = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',51:'🌦️',61:'🌧️',71:'🌨️',80:'🌦️',95:'⛈️'};
    const descs = {0:'klarvær',1:'lettskyet',2:'delvis skyet',3:'overskyet',45:'tåke',51:'yr',61:'regn',71:'snø',80:'regnbyger',95:'tordenvær'};
    const ic  = icons[code] || icons[Math.floor(code/10)*10] || '🌡️';
    const de  = descs[code] || descs[Math.floor(code/10)*10] || '';
    weather = { temp: t, code, wind: Math.round(c.windspeed_10m), icon: ic, desc: de };
    document.getElementById('wPill').innerHTML = `${ic} <strong>${t}°C</strong>&nbsp;${de}`;
    buildTodayCard();
    if(document.getElementById('suggOverlay').classList.contains('open')) renderSugg();
  } catch(e) {
    document.getElementById('wPill').innerHTML = '🌡️ <strong>Oslo</strong>';
    buildTodayCard();
  }
}

// ═══════════════════════════════════════════
// WEATHER SCORE
// ═══════════════════════════════════════════
function weatherScore(p){
  if(!weather) return 50;
  const {temp:t, code} = weather;
  const types = p.activity_types||[];
  const rainy = code>=51, cold = t<8, warm = t>=17, hot = t>=22;
  let s = 50;
  if(types.some(x=>['badested','svømming','elvebad'].includes(x))){ if(hot)s+=42; else if(warm)s+=22; else if(cold)s-=35; if(rainy)s-=25; }
  if(types.includes('badstue')){ if(cold||rainy)s+=35; else s+=5; }
  if(types.some(x=>['løperute','tur','discgolf','tennisbane','tuftpark','bordtennis','skatepark'].includes(x))){ if(!rainy&&!cold)s+=20; if(rainy)s-=28; }
  if(types.some(x=>['skiløype','skøytebane'].includes(x))){ if(t<0)s+=45; else s-=60; }
  const mo = new Date().getMonth();
  const sm = {vår:[2,3,4],sommer:[5,6,7],høst:[8,9,10],vinter:[11,0,1]};
  if(p.seasons){ const ok=p.seasons.some(x=>x==='hele året'||(sm[x]||[]).includes(mo)); if(!ok)s-=70; }
  return Math.max(0,Math.min(100,s));
}

function matchScore(p){
  let s = 40;
  const types = p.activity_types||[];
  const pref = prefs.types||[];
  const vis  = prefs.visits||{};
  s += types.filter(t=>pref.includes(t)).length * 16;
  types.forEach(t=>{ if(vis[t]) s += Math.min(18, vis[t]*3); });
  if(S.ctx==='family' && p.family_friendly) s+=12;
  if(S.ctx==='date' && !p.family_friendly) s+=7;
  if(S.ctx==='friends' && p.is_free) s+=6;
  if(S.ctx==='solo' && types.some(x=>['løperute','tur','discgolf'].includes(x))) s+=8;
  s += weatherScore(p)*0.22;
  s += (p.score_total||70)*0.06;
  if(favs.includes(p.id)) s+=10;
  return Math.min(99, Math.max(20, Math.round(s)));
}

// TODAY CARD
// ═══════════════════════════════════════════
let todayPool = [];

function buildTodayCard(){
  if(!todayPool.length){
    todayPool = [...PLACES]
      .map(p=>({...p, _ws: weatherScore(p)}))
      .filter(p=>p._ws>=25)
      .sort((a,b)=>(b._ws + (b.score_total||70)*0.3) - (a._ws + (a.score_total||70)*0.3));
  }
  const p = todayPool[S.todayIdx % todayPool.length];
  if(!p) return;
  document.getElementById('todayName').textContent = pEmoji(p) + ' ' + p.name;
  const ws = weatherScore(p), t = weather?.temp;
  let reason = '';
  const types = p.activity_types||[];
  if(types.some(x=>['badested','elvebad','svømming'].includes(x)) && t>=22) reason = `${t}°C — perfekt badedag`;
  else if(types.includes('badstue') && weather?.code>=51) reason = 'Regnvær ute — deilig inne';
  else if(types.includes('løperute') && weather?.code<51 && t>5) reason = 'Bra løpevær i dag';
  else if(types.includes('discgolf') && weather?.code<51) reason = 'Lite folk på banen nå';
  else if(types.includes('tur')) reason = 'Fin naturopplevelse';
  else reason = 'Godt besøkt og høyt rangert';
  document.getElementById('todayReason').textContent = reason;
  document.getElementById('todayEmoji').textContent = pEmoji(p);
  const meta = [];
  meta.push(`<span class="today-pill ${p.is_free?'free':'paid'}">${p.is_free?'Gratis':p.price_range||'Betalt'}</span>`);
  meta.push(`<span class="today-pill dist">📍 ${p.neighborhood||p.municipality}</span>`);
  if(p.score_total) meta.push(`<span class="today-pill dist">⭐ ${p.score_total}/100</span>`);
  document.getElementById('todayMeta').innerHTML = meta.join('');
}

function nextTodayPlace(){ S.todayIdx++; buildTodayCard(); }
function todayCardClick(){ const p = todayPool[S.todayIdx % todayPool.length]; if(p) openModal(p.id); }

function renderSugg(){
  const t = weather?.temp ?? 15;
  const code = weather?.code ?? 1;
  const h = new Date().getHours();
  const ctxL = {solo:'for deg',friends:'med venner',family:'for familien',date:'på date'}[S.ctx]||'';
  document.getElementById('suggSub').textContent = `${t}°C · ${h<12?'Formiddag':h<17?'Ettermiddag':'Kveld'} · ${ctxL}`;

  const scored = PLACES.map(p=>({...p, _m: matchScore(p), _w: weatherScore(p)}))
    .filter(p=>p._w>=15)
    .sort((a,b)=>(b._m+b._w*0.5)-(a._m+a._w*0.5))
    .slice(0,7);

  document.getElementById('suggList').innerHTML = scored.map((p,i)=>{
    const types = p.activity_types||[];
    const rainy = code>=51, hot = t>=22;
    let why = '';
    if(i===0){
      if(hot&&types.some(x=>['badested','elvebad','svømming'].includes(x))) why=`🔥 ${t}°C — perfekt badedag`;
      else if(rainy&&types.includes('badstue')) why='🌧️ Regnvær — perfekt for badstue';
      else why='⭐ Beste totalmatch nå';
    } else {
      if(hot&&types.some(x=>['badested','svømming','elvebad'].includes(x))) why=`☀️ Flott badedag`;
      else if(rainy&&types.includes('badstue')) why='🌧️ Bra regnværsvalg';
      else if(types.includes('løperute')&&!rainy) why='🏃 Godt løpevær';
      else if(types.includes('discgolf')) why='🥏 Populær bane';
      else if(types.includes('bordtennis')) why='🏓 Alltid gratis';
      else why=`⭐ ${p.score_total}/100`;
    }
    return `<div class="sugg-item ${i===0?'top':''}" onclick="closeSugg();setTimeout(()=>openModal('${p.id}'),120)">
      <div class="si-emoji">${pEmoji(p)}</div>
      <div class="si-info">
        <div class="si-name">${i===0?'🏆 ':''}${p.name}</div>
        <div class="si-why">${why}</div>
        <div class="si-meta">
          <span>📍 ${p.neighborhood||p.municipality}</span>
          <span>${p.is_free?'Gratis':p.price_range||'Betalt'}</span>
        </div>
      </div>
      <div class="si-match">${p._m}%</div>
    </div>`;
  }).join('');

  scored.slice(0,3).forEach(p=>{ (p.activity_types||[]).forEach(t=>{ prefs.visits[t]=(prefs.visits[t]||0)+0.1; }); });
  LS.set('prefs', prefs);
}

// ═══════════════════════════════════════════
// CATEGORIES / FILTERS
// ═══════════════════════════════════════════
const CATS = [
  {id:'all',l:'🗺️ Alle'},{id:'badested',l:'🏊 Bading'},{id:'badstue',l:'🧖 Badstue'},
  {id:'elvebad',l:'🏞️ Elvebad'},{id:'tuftpark',l:'💪 Tuftepark'},{id:'tennisbane',l:'🎾 Tennis'},
  {id:'løperute',l:'🏃 Løping'},{id:'tur',l:'🥾 Tur'},{id:'discgolf',l:'🥏 Discgolf'},
  {id:'skatepark',l:'🛹 Skate'},{id:'bordtennis',l:'🏓 Bordtennis'},{id:'fotballbane',l:'⚽ Fotball'},
  {id:'basketballbane',l:'🏀 Basket'},{id:'volleyballbane',l:'🏐 Volleyball'},
  {id:'klatring',l:'🧗 Klatring'},{id:'skiløype',l:'⛷️ Ski'},{id:'skøytebane',l:'⛸️ Skøyter'},
  {id:'padelbane',l:'🏓 Padel'},{id:'kajakkutleie',l:'🚣 Kajakk'},{id:'øy',l:'🏝️ Øyer'},
];

function buildFilters(){
  const cr = document.getElementById('catRow');
  CATS.forEach(c=>{
    const b = document.createElement('button');
    b.className='cat-btn'+(c.id===S.activeCat?' active':'');
    b.textContent=c.l; b.dataset.cat=c.id;
    b.onclick=()=>{ S.activeCat=c.id; cr.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); renderList(); };
    cr.appendChild(b);
  });
  const chips = document.getElementById('chipRow');
  const makeChip=(id,label,key)=>{
    const c=document.createElement('button');
    c.className='chip'; c.textContent=label; c.id=id;
    c.onclick=()=>{ S[key]=!S[key]; c.classList.toggle('on',S[key]); renderList(); };
    chips.appendChild(c);
  };
  makeChip('cFree','✅ Gratis','freeOnly');
  makeChip('cDog','🐕 Hund OK','dogOnly');
  const sortChips=[['⭐ Best rangert','score'],['🔥 Trending','trending'],['🎯 Din match','match']];
  sortChips.forEach(([l,mode])=>{
    const c=document.createElement('button');
    c.className='chip'+(S.sortMode===mode?' on':'');
    c.textContent=l; c.dataset.sort=mode;
    c.onclick=()=>{ S.sortMode=mode; chips.querySelectorAll('[data-sort]').forEach(x=>x.classList.remove('on')); c.classList.add('on'); renderList(); };
    chips.appendChild(c);
  });
}

// ═══════════════════════════════════════════
// LIST RENDER
// ═══════════════════════════════════════════
function renderList(){
  const q = document.getElementById('searchQ').value.toLowerCase().trim();
  let res = PLACES.filter(p=>{
    if(S.activeCat!=='all' && !(p.activity_types||[]).includes(S.activeCat)) return false;
    if(S.freeOnly && !p.is_free) return false;
    if(S.dogOnly && !p.dog_friendly) return false;
    if(q){
      const hay=[p.name, p.description||'', p.neighborhood||'', p.municipality, ...(p.activity_types||[]), ...(p.best_for_tags||[])].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  if(S.sortMode==='score') res.sort((a,b)=>(b.score_total||0)-(a.score_total||0));
  else if(S.sortMode==='trending') res.sort((a,b)=>(b.trending_score||0)-(a.trending_score||0));
  else if(S.sortMode==='match') res.sort((a,b)=>matchScore(b)-matchScore(a));

  document.getElementById('resultsBar').textContent = `${res.length} steder${S.sortMode==='match'?' · Sortert etter din match':''}`;

  const cont = document.getElementById('cards');
  if(!res.length){ cont.innerHTML='<div class="no-results"><div class="nr-i">🔍</div>Ingen steder. Prøv et annet søk.</div>'; return; }

  cont.innerHTML = res.map(p=>{
    const ms = matchScore(p);
    const isVisited = visited.includes(p.id);
    const types = (p.activity_types||[]).slice(0,3).map(t=>`<span class="ctag t">${t}</span>`).join('');
    const icons = [p.toilet?'🚻':null, p.parking?'🅿️':null, p.public_transport?'🚌':null, p.dog_friendly?'🐕':null, p.family_friendly?'👨‍👩‍👧':null].filter(Boolean).slice(0,4);
    return `<div class="card" onclick="openModal('${p.id}');trackV('${p.id}')">
      <div class="card-head">
        <div>
          <div class="card-title">${pEmoji(p)} ${p.name}${isVisited?'<span class="visited-dot"></span>':''}</div>
          <div class="card-loc">📍 ${p.neighborhood||p.municipality}</div>
        </div>
        <span class="${p.is_free?'badge-free':'badge-paid'}">${p.is_free?'Gratis':p.price_range||'Betalt'}</span>
      </div>
      <div class="card-desc">${p.description||''}</div>
      <div class="card-foot">
        <div class="card-tags">${types}</div>
        <div style="display:flex;gap:4px;flex-shrink:0">
          ${p.score_total?`<span class="score-tag">⭐${p.score_total}</span>`:''}
          ${S.sortMode==='match'&&ms>=70?`<span class="score-tag" style="background:#e8f0fe;color:var(--accent)">🎯${ms}%</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
// EXPLORE VIEW
// ═══════════════════════════════════════════
function buildExplore(){
  // Top 5
  const top5 = [...PLACES].sort((a,b)=>(b.score_total||0)-(a.score_total||0)).slice(0,5);
  document.getElementById('rankList').innerHTML = top5.map((p,i)=>`
    <div class="rank-item" onclick="openModal('${p.id}')">
      <div class="rank-num ${i<3?'top':''}">${i+1}</div>
      <div style="font-size:1.5rem">${pEmoji(p)}</div>
      <div class="rank-info">
        <div class="rank-name">${p.name}</div>
        <div class="rank-sub">📍 ${p.neighborhood||p.municipality} · ${p.is_free?'Gratis':p.price_range||'Betalt'}</div>
      </div>
      <div style="font-size:.8rem;font-weight:800;color:var(--accent)">${p.score_total}</div>
    </div>`).join('');

  // Trending
  const trend = [...PLACES].sort((a,b)=>(b.trending_score||0)-(a.trending_score||0)).slice(0,8);
  document.getElementById('trendRow').innerHTML = trend.map(p=>hCard(p)).join('');

  // Hidden gems
  const gems = PLACES.filter(p=>!p.featured&&(p.score_total||0)>=78).sort((a,b)=>(b.score_total||0)-(a.score_total||0)).slice(0,8);
  document.getElementById('gemsRow').innerHTML = gems.map(p=>hCard(p)).join('');

  // Bucket list — ting du ikke har besøkt
  const bucketCats = [{id:'badstue',l:'🧖 Prøv badstue'},{id:'discgolf',l:'🥏 Spill discgolf'},{id:'elvebad',l:'🏞️ Bad i elv'},{id:'klatring',l:'🧗 Klatre'},{id:'kayakkutleie',l:'🚣 Padle kajakk'},{id:'skatepark',l:'🛹 Kjør skate'},{id:'øy',l:'🏝️ Besøk en øy'},{id:'skiløype',l:'⛷️ Gå på ski'}];
  document.getElementById('bucketRow').innerHTML = bucketCats.map(c=>{
    const done = PLACES.filter(p=>(p.activity_types||[]).includes(c.id)).some(p=>visited.includes(p.id));
    return `<button class="bucket-btn ${done?'done':''}" onclick="S.activeCat='${c.id}';switchTab('liste')">
      <span class="bucket-icon">${c.l.split(' ')[0]}</span>${c.l.replace(/^. /,'')}
      <div class="bucket-label">${done?'✓ Gjort!':'Ikke prøvd ennå'}</div>
    </button>`;
  }).join('');
}

function hCard(p){ return `<div class="h-card" onclick="openModal('${p.id}')">
  <div class="h-emoji">${pEmoji(p)}</div>
  <div class="h-body">
    <div class="h-name">${p.name}</div>
    <div class="h-loc">📍 ${p.neighborhood||p.municipality}</div>
    <div class="h-foot">
      <span class="${p.is_free?'badge-free':'badge-paid'}">${p.is_free?'Gratis':p.price_range||'Betalt'}</span>
      ${p.score_total?`<span class="score-tag">⭐${p.score_total}</span>`:''}
    </div>
  </div></div>`; }

// ═══════════════════════════════════════════
// MAP
// ═══════════════════════════════════════════
const CAT_COLORS={badested:'#1565c0',badstue:'#7b1fa2',elvebad:'#00838f',tuftpark:'#2e7d32',tennisbane:'#e65100',fotballbane:'#1b5e20',basketballbane:'#f57f17',skatepark:'#37474f',klatring:'#4e342e',discgolf:'#33691e',løperute:'#004d40',tur:'#4e342e',skiløype:'#0d47a1',bordtennis:'#4a148c',sykling:'#006064',øy:'#01579b',park:'#388e3c'};
const pColor=p=>{ for(const t of p.activity_types||[]) if(CAT_COLORS[t]) return CAT_COLORS[t]; return '#555'; };
const pinSvg=c=>`<svg xmlns="http://www.w3.org/2000/svg" width="24" height="32" viewBox="0 0 26 34"><path d="M13 0C5.8 0 0 5.8 0 13c0 9 13 21 13 21S26 22 26 13C26 5.8 20.2 0 13 0z" fill="${c}" stroke="rgba(255,255,255,.7)" stroke-width="1.5"/><circle cx="13" cy="13" r="5" fill="rgba(255,255,255,.4)"/></svg>`;

function initMap(){
  if(S.leafletMap) return;
  S.leafletMap = L.map('map',{zoomControl:false}).setView([59.913,10.752],12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(S.leafletMap);
  L.control.zoom({position:'bottomright'}).addTo(S.leafletMap);
  // Build map cat row
  const mcr = document.getElementById('mapCatRow');
  [{id:'all',l:'Alle'},...CATS.slice(1,15)].forEach(c=>{
    const b=document.createElement('button');
    b.className='mcat'+(c.id===S.mapCat?' active':''); b.textContent=c.l||c.id;
    b.onclick=()=>{ S.mapCat=c.id; mcr.querySelectorAll('.mcat').forEach(x=>x.classList.remove('active')); b.classList.add('active'); renderMap(); };
    mcr.appendChild(b);
  });
  setTimeout(()=>S.leafletMap.invalidateSize(),100);
}

function renderMap(){
  if(!S.leafletMap) initMap();
  S.mapMarkers.forEach(m=>S.leafletMap.removeLayer(m)); S.mapMarkers=[];
  document.getElementById('mapSheet').classList.remove('open');
  const places = PLACES.filter(p=>p.lat&&p.lng&&(S.mapCat==='all'||(p.activity_types||[]).includes(S.mapCat)));
  places.forEach(p=>{
    const icon=L.divIcon({html:pinSvg(pColor(p)),className:'',iconSize:[24,32],iconAnchor:[12,32]});
    const m=L.marker([p.lat,p.lng],{icon}).addTo(S.leafletMap);
    m.on('click',()=>openMapSheet(p.id)); S.mapMarkers.push(m);
  });
  document.getElementById('mapCount').textContent=`${places.length} steder`;
  if(S.mapMarkers.length){ try{S.leafletMap.fitBounds(L.featureGroup(S.mapMarkers).getBounds().pad(.1),{maxZoom:14});}catch(e){} }
  setTimeout(()=>S.leafletMap.invalidateSize(),200);
}

function openMapSheet(id){
  const p=PLACES.find(x=>x.id===id); if(!p) return;
  document.getElementById('mapSheetBody').innerHTML=`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px">
      <div><div style="font-size:1rem;font-weight:800">${pEmoji(p)} ${p.name}</div>
        <div style="font-size:.75rem;color:var(--muted);margin-top:2px">📍 ${p.address||p.neighborhood||p.municipality}</div></div>
      <button onclick="document.getElementById('mapSheet').classList.remove('open')" style="background:var(--sand);border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:1rem;flex-shrink:0">✕</button>
    </div>
    <div style="font-size:.8rem;color:#444;line-height:1.5;margin:8px 0">${(p.description||'').slice(0,140)}${p.description?.length>140?'...':''}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      ${(p.activity_types||[]).slice(0,4).map(t=>`<span class="ctag t">${t}</span>`).join('')}
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="toggleFav('${p.id}');this.textContent=favs.includes('${p.id}')?'❤️ Lagret':'🤍 Lagre'" style="flex:1;padding:10px;border:1.5px solid var(--border);background:#fff;border-radius:9px;font-weight:600;cursor:pointer;font-family:inherit">${favs.includes(p.id)?'❤️ Lagret':'🤍 Lagre'}</button>
      <button onclick="document.getElementById('mapSheet').classList.remove('open');setTimeout(()=>openModal('${p.id}'),80)" style="flex:1;padding:10px;background:var(--navy);color:#fff;border:none;border-radius:9px;font-weight:600;cursor:pointer;font-family:inherit">Detaljer →</button>
    </div>`;
  document.getElementById('mapSheet').classList.add('open');
}

// ═══════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════
function openModal(id){
  const p=PLACES.find(x=>x.id===id); if(!p) return;
  trackV(id);
  const isFav=favs.includes(id), isDone=visited.includes(id);
  const ms=matchScore(p);
  const scores=[['Totalt',p.score_total],['Kvalitet',p.score_quality],['Beliggenhet',p.score_location],['Tilgjengelig',p.score_accessibility],['Atmosfære',p.score_atmosphere],['Verdi',p.score_value]].filter(x=>x[1]);
  const infoRows=[
    ['Adresse',p.address],['Bestilling',p.booking_required?'Kreves':'Ikke nødvendig'],
    ['Kollektivt',p.public_transport?(p.transport_details||'Ja'):null],
    ['Parkering',p.parking?'Ja':null],['Toalett',p.toilet?'Ja':null],
    ['Hund OK',p.dog_friendly?'Ja':null],['Familie',p.family_friendly?'Ja':null],
    ['Sesong',(p.seasons||[]).join(', ')],
  ].filter(([,v])=>v).map(([l,v])=>`<div class="info-row"><span class="ir-l">${l}</span><span class="ir-v">${v}</span></div>`).join('');

  document.getElementById('modalBox').innerHTML=`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-emoji">${pEmoji(p)}</div>
    <div class="modal-name">${p.name}</div>
    <div class="modal-loc">📍 ${p.address||p.neighborhood||p.municipality} · ${p.area||''}</div>
    <div class="modal-badges">
      <span class="${p.is_free?'badge-free':'badge-paid'}">${p.is_free?'Gratis':p.price_range||'Betalt'}</span>
      ${ms>=70?`<span class="score-tag" style="background:#e8f0fe;color:var(--accent)">🎯 Passer deg ${ms}%</span>`:''}
      ${isDone?'<span class="score-tag" style="background:#f0fdf4;color:var(--green)">✓ Besøkt</span>':''}
    </div>
    <div class="modal-desc">${p.description||''}</div>
    ${scores.length?`<div class="score-grid">${scores.map(([l,v])=>`<div class="sg-box"><div class="sg-l">${l}</div><div class="sg-v">${v}</div></div>`).join('')}</div>`:''}
    <div class="info-rows">${infoRows}</div>
    <div class="rate-box">
      <div class="rate-title">Gi en vurdering</div>
      <div class="star-row" id="sr${id}">
        ${[1,2,3,4,5].map(n=>`<button class="star-btn" onclick="rateStar('${id}',${n})" style="color:${n<=Math.round((p.score_total||70)/20)?'#fbbf24':'#ddd'}">★</button>`).join('')}
      </div>
    </div>
    <button class="mark-visited ${isDone?'done':''}" id="mv${id}" onclick="markVisited('${id}')">
      ${isDone?'✓ Besøkt':'📍 Marker som besøkt'}
    </button>
    <button class="fav-btn ${isFav?'on':''}" id="fb${id}" onclick="toggleFav('${id}')">
      ${isFav?'❤️ Lagret som favoritt':'🤍 Lagre som favoritt'}
    </button>
    ${p.booking_url?`<a href="${p.booking_url}" target="_blank" style="display:block;background:var(--navy);color:#fff;text-align:center;padding:11px;border-radius:9px;text-decoration:none;font-weight:700;margin-top:8px;font-size:.88rem">📅 Book plass</a>`:''}
  `;
  document.getElementById('modal').style.display='block';
}
function closeModal(){ document.getElementById('modal').style.display='none'; }

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function markVisited(id){
  if(!visited.includes(id)){ visited.push(id); LS.set('visited',visited); showToast('📍 Markert som besøkt!'); }
  else { visited=visited.filter(x=>x!==id); LS.set('visited',visited); showToast('Fjernet fra besøkt'); }
  const btn=document.getElementById('mv'+id);
  if(btn){ btn.textContent=visited.includes(id)?'✓ Besøkt':'📍 Marker som besøkt'; btn.classList.toggle('done',visited.includes(id)); }
  buildExplore();
}

function toggleFav(id){
  if(favs.includes(id)){ favs=favs.filter(x=>x!==id); showToast('Fjernet fra favoritter'); }
  else { favs.push(id); showToast('❤️ Lagret som favoritt!'); }
  LS.set('favs',favs);
  const btn=document.getElementById('fb'+id);
  if(btn){ btn.textContent=favs.includes(id)?'❤️ Lagret som favoritt':'🤍 Lagre som favoritt'; btn.classList.toggle('on',favs.includes(id)); }
}

function rateStar(id,stars){
  const p=PLACES.find(x=>x.id===id); if(!p) return;
  p.score_total=Math.min(99,Math.max(40,Math.round(((p.score_total||75)*(p.review_count||5)+stars*20)/((p.review_count||5)+1))));
  p.review_count=(p.review_count||5)+1;
  const row=document.getElementById('sr'+id);
  if(row) row.querySelectorAll('.star-btn').forEach((b,i)=>b.style.color=i<stars?'#fbbf24':'#ddd');
  showToast(`${'★'.repeat(stars)} Takk!`);
  (p.activity_types||[]).forEach(t=>{ prefs.visits[t]=(prefs.visits[t]||0)+2; }); LS.set('prefs',prefs);
}

function trackV(id){
  const p=PLACES.find(x=>x.id===id); if(!p) return;
  (p.activity_types||[]).forEach(t=>{ prefs.visits[t]=(prefs.visits[t]||0)+1; }); LS.set('prefs',prefs);
}

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }

// ═══════════════════════════════════════════
// TAB SWITCH
// ═══════════════════════════════════════════
function switchTab(tab){
  S.tab=tab;
  ['liste','utforsk','kart'].forEach(t=>{
    document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active',t===tab);
    document.getElementById('nav'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('on',t===tab);
  });
  document.getElementById('listView').classList.toggle('visible', tab==='liste');
  document.getElementById('exploreView').classList.toggle('visible', tab==='utforsk');
  const mv=document.getElementById('mapView');
  if(tab==='kart'){ mv.classList.add('visible'); initMap(); setTimeout(renderMap,80); }
  else mv.classList.remove('visible');
  if(tab==='utforsk') buildExplore();
  // Filter bar bare synlig på liste
  document.querySelector('.filter-bar').style.display = tab==='liste'?'block':'none';
  document.getElementById('resultsBar').style.display = tab==='liste'?'block':'none';
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
(function init(){
  updateStreakBadge();
  buildFilters();
  renderList();
  fetchWeather();
  // Sett default sort chip
  document.querySelector('[data-sort="score"]').classList.add('on');
})();
</script>
