<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AktivOslo</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
header{background:#1a1a2e;color:#fff;padding:11px 16px;flex-shrink:0}
.header-row{display:flex;align-items:center;justify-content:space-between}
header h1{font-size:1.2rem;font-weight:700}
header p{font-size:.7rem;opacity:.5;margin-top:1px}
.view-toggle{display:flex;background:rgba(255,255,255,.15);border-radius:20px;padding:3px;gap:2px}
.view-btn{padding:5px 13px;border-radius:18px;border:none;font-size:.77rem;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:rgba(255,255,255,.7)}
.view-btn.active{background:#fff;color:#1a1a2e}

/* TODAY STRIP */
.today-strip{flex-shrink:0;background:#fff;border-bottom:1px solid #e8e8e0}
.today-inner{padding:8px 14px}
.today-row{display:flex;align-items:center;gap:10px}
.weather-pill{display:flex;align-items:center;gap:6px;background:#f5f5f0;border-radius:20px;padding:5px 12px;font-size:.78rem;color:#444;flex-shrink:0}
.today-btn{flex:1;background:linear-gradient(135deg,#1a1a2e,#2d2d5e);color:#fff;border:none;border-radius:22px;padding:9px 14px;font-size:.82rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;justify-content:center}
.today-btn:active{opacity:.9}
.ctx-row{display:none}
.ctx-row::-webkit-scrollbar{display:none}
.ctx-chip{white-space:nowrap;padding:4px 11px;border-radius:16px;border:1.5px solid #ddd;background:#fff;font-size:.73rem;font-weight:600;cursor:pointer;color:#666;transition:all .15s}
.ctx-chip.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}

/* TOP BAR */
.top-bar{flex-shrink:0;background:#fff;border-bottom:1px solid #e8e8e0}
.search-wrap{padding:9px 14px}
.search-wrap input{width:100%;padding:9px 13px;border:1.5px solid #ddd;border-radius:10px;font-size:.9rem;outline:none;background:#fafaf8}
.search-wrap input:focus{border-color:#1a1a2e;background:#fff}
.filters{display:flex;gap:6px;padding:7px 14px;overflow-x:auto;border-top:1px solid #f0f0f0;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-btn{white-space:nowrap;padding:5px 12px;border-radius:18px;border:1.5px solid #ddd;background:#fff;font-size:.76rem;cursor:pointer;font-weight:500;transition:all .15s}
.filter-btn.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.sub-filters{display:flex;gap:5px;padding:6px 14px;overflow-x:auto;border-top:1px solid #f0f0f0;scrollbar-width:none;background:#fafaf8}
.sub-filters::-webkit-scrollbar{display:none}
.sub-btn{white-space:nowrap;padding:4px 10px;border-radius:14px;border:1px solid #ddd;background:#fff;font-size:.73rem;cursor:pointer;transition:all .15s}
.sub-btn.active{background:#2563eb;color:#fff;border-color:#2563eb}
.extra-filters{display:flex;gap:5px;padding:5px 14px;overflow-x:auto;border-top:1px solid #f0f0f0;scrollbar-width:none;background:#fafaf8}
.extra-filters::-webkit-scrollbar{display:none}
.extra-btn{white-space:nowrap;padding:4px 10px;border-radius:14px;border:1px solid #ddd;background:#fff;font-size:.72rem;cursor:pointer;transition:all .15s;color:#555}
.extra-btn.active{background:#e8f0fe;color:#1a56db;border-color:#93b4f7}

/* LIST VIEW */
#listView{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.results-info{padding:7px 14px;font-size:.75rem;color:#666;background:#fafaf8;border-bottom:1px solid #e8e8e0;flex-shrink:0;display:flex;align-items:center;gap:8px}
.cards{padding:10px 14px;display:grid;gap:10px;padding-bottom:24px}
.card{background:#fff;border-radius:13px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;border:1px solid #eee;transition:transform .12s,box-shadow .12s}
.card:active{transform:scale(.98)}
.card.match-high{border-left:3px solid #1a1a2e}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-name{font-size:.95rem;font-weight:600;line-height:1.3}
.badge-free{background:#e8f5e9;color:#2e7d32;font-size:.67rem;padding:3px 8px;border-radius:9px;font-weight:600;white-space:nowrap;flex-shrink:0}
.badge-paid{background:#fff3e0;color:#e65100;font-size:.67rem;padding:3px 8px;border-radius:9px;font-weight:600;white-space:nowrap;flex-shrink:0}
.card-area{font-size:.73rem;color:#999;margin-top:2px}
.card-desc{font-size:.81rem;color:#555;margin-top:7px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tag{background:#f0f0eb;color:#555;font-size:.69rem;padding:2px 7px;border-radius:7px}
.tag.type{background:#e8eef7;color:#1a3a6e;font-weight:500}
.card-footer{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center;justify-content:space-between}
.icon-info{font-size:.7rem;color:#999}
.feat-badge{display:inline-block;background:#fff9c4;color:#795548;font-size:.65rem;padding:2px 6px;border-radius:7px;font-weight:600}
.match-badge{background:#e8eef7;color:#1a3a6e;font-size:.67rem;padding:2px 7px;border-radius:9px;font-weight:700}
.score-badge{background:#f0f0eb;color:#555;font-size:.67rem;padding:2px 7px;border-radius:9px;font-weight:600}
.no-results{text-align:center;padding:50px 20px;color:#bbb}
.no-results span{font-size:2rem;display:block;margin-bottom:10px}

/* TRENDING STRIP i listen */
.trending-strip{margin:0 14px 10px;background:#fff;border-radius:13px;padding:12px 14px;border:1px solid #e8e8e0;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.trending-title{font-size:.78rem;font-weight:700;color:#1a1a2e;margin-bottom:8px}
.trending-pills{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
.trending-pills::-webkit-scrollbar{display:none}
.trend-pill{white-space:nowrap;padding:5px 11px;border-radius:16px;background:#f5f5f0;font-size:.73rem;cursor:pointer;color:#333;transition:background .15s;border:1px solid #eee}
.trend-pill:active{background:#e8eef7}

/* MAP VIEW */
#mapView{flex:1;display:none;flex-direction:column}
#map{flex:1}
#mapBottomSheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:18px 18px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.15);z-index:1000;transform:translateY(100%);transition:transform .3s ease;max-height:60dvh;overflow-y:auto}
#mapBottomSheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 8px}
.sheet-content{padding:0 18px 24px}
.sheet-close{float:right;font-size:1.3rem;color:#aaa;cursor:pointer;margin-top:-4px}
.sheet-name{font-size:1.05rem;font-weight:700;margin-bottom:2px;padding-right:24px}
.sheet-area{font-size:.78rem;color:#999;margin-bottom:10px}
.sheet-desc{font-size:.84rem;color:#444;line-height:1.55;margin-bottom:12px}
.sheet-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.sheet-icons{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.sheet-icon{font-size:.78rem;color:#666}
.sheet-book{display:block;background:#1a1a2e;color:#fff;text-align:center;padding:11px;border-radius:11px;text-decoration:none;font-weight:600;font-size:.88rem}
.map-count{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(26,26,46,.85);color:#fff;padding:5px 14px;border-radius:20px;font-size:.75rem;font-weight:600;z-index:500;pointer-events:none}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;overflow-y:auto;padding:16px}
.modal{background:#fff;border-radius:18px;padding:22px;max-width:540px;margin:0 auto;position:relative}
.modal h2{font-size:1.2rem;font-weight:700;margin-bottom:3px;padding-right:28px}
.modal .m-area{color:#888;font-size:.8rem;margin-bottom:10px}
.modal .m-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.modal .m-desc{font-size:.86rem;line-height:1.6;margin-bottom:12px;color:#333}
.modal-scores{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.mscore-box{background:#f5f5f0;border-radius:10px;padding:10px;text-align:center}
.mscore-label{font-size:.66rem;color:#888;margin-bottom:3px}
.mscore-val{font-size:1.1rem;font-weight:800;color:#1a1a2e}
.modal-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:.82rem}
.modal-row:last-child{border-bottom:none}
.m-label{color:#aaa;width:115px;flex-shrink:0}
.m-val{color:#1a1a1a;font-weight:500;flex:1}
.close-btn{position:absolute;top:16px;right:16px;font-size:1.3rem;cursor:pointer;color:#bbb;background:none;border:none;line-height:1}
.modal-tags{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0 12px}
.btn-book{display:block;background:#1a1a2e;color:#fff;text-align:center;padding:12px;border-radius:11px;text-decoration:none;font-weight:600;margin-top:14px;font-size:.9rem}
.fav-btn{width:100%;padding:10px;border:1.5px solid #ddd;background:#fff;border-radius:11px;font-size:.86rem;font-weight:600;cursor:pointer;margin-top:8px;color:#555}
.fav-btn.active{background:#fce8e8;border-color:#e74c3c;color:#e74c3c}
.rate-row{display:flex;gap:8px;justify-content:center;margin:10px 0}
.star-btn{font-size:1.6rem;cursor:pointer;background:none;border:none;transition:transform .1s}
.star-btn:active{transform:scale(1.2)}

/* TODAY SUGGESTIONS SHEET */
.sugg-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:3000;overflow-y:auto;padding:16px}
.sugg-overlay.open{display:block}
.sugg-sheet{background:#fff;border-radius:18px;padding:20px;max-width:540px;margin:0 auto;position:relative}
.sugg-header{margin-bottom:14px}
.sugg-title{font-size:1.1rem;font-weight:800;color:#1a1a2e}
.sugg-sub{font-size:.78rem;color:#888;margin-top:3px}
.sugg-close{position:absolute;top:18px;right:18px;background:#f5f5f0;border:none;font-size:1rem;color:#999;width:28px;height:28px;border-radius:50%;cursor:pointer}
.sugg-list{display:flex;flex-direction:column;gap:9px}
.sugg-item{background:#f9f9f6;border-radius:12px;padding:13px 14px;cursor:pointer;border:1.5px solid #eee;display:flex;gap:12px;align-items:flex-start;transition:border-color .15s}
.sugg-item.top{border-color:#1a1a2e;background:#f0f3ff}
.sugg-item:active{opacity:.85}
.sugg-emoji{font-size:1.7rem;flex-shrink:0}
.sugg-info .sugg-name{font-size:.9rem;font-weight:700;color:#1a1a1a}
.sugg-info .sugg-why{font-size:.73rem;color:#2563eb;font-weight:600;margin-top:2px}
.sugg-info .sugg-meta{font-size:.71rem;color:#888;margin-top:4px;display:flex;gap:8px;flex-wrap:wrap}
.sugg-match{font-size:.75rem;font-weight:800;color:#1a1a2e;flex-shrink:0;padding-top:2px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a1a2e;color:#fff;padding:9px 18px;border-radius:20px;font-size:.8rem;font-weight:600;opacity:0;transition:all .25s;z-index:9999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <h1>🏃 AktivOslo</h1>
      <p>Oslo, Asker og Bærum · 155 steder</p>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="btnList" onclick="switchView('list')">📋 Liste</button>
      <button class="view-btn" id="btnMap" onclick="switchView('map')">🗺️ Kart</button>
    </div>
  </div>
</header>

<!-- TODAY STRIP -->
<div class="today-strip">
  <div class="today-inner">
    <div class="today-row">
      <div class="weather-pill" id="weatherPill">⏳ Laster...</div>
      <button class="today-btn" onclick="openSuggestions()">
        ✨ Hva skal vi finne på?
      </button>
    </div>
  </div>

</div>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="🔍 Søk sted, bydel, aktivitet..." oninput="applyFilters()">
  </div>
  <div class="filters" id="catFilters"></div>
  <div class="sub-filters" id="areaFilters"></div>
  <div class="extra-filters" id="extraFilters">
    <div class="extra-btn" id="freeBtn" onclick="toggleFree()">✅ Gratis</div>
    <div class="extra-btn" id="dogBtn" onclick="toggleDog()">🐕 Hund OK</div>
    <div class="extra-btn" id="famBtn" onclick="toggleFam()">👨‍👩‍👧 Familie</div>
    <div class="extra-btn" id="openBtn" onclick="toggleOpen()">🟢 Åpent nå</div>
    <div class="extra-btn" id="sortTrend" onclick="sortBy('trending')">🔥 Trending</div>
    <div class="extra-btn" id="sortScore" onclick="sortBy('score')">⭐ Best rangert</div>
    <div class="extra-btn" id="sortMatch" onclick="sortBy('match')">🎯 Beste match</div>
  </div>
</div>

<!-- LIST VIEW -->
<div id="listView">
  <div class="results-info" id="resultsInfo"></div>
  <div class="cards" id="cards"></div>
</div>

<!-- MAP VIEW -->
<div id="mapView">
  <div style="position:relative;flex:1;display:flex;flex-direction:column">
    <div id="map"></div>
    <div class="map-count" id="mapCount"></div>
  </div>
  <div id="mapBottomSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-content" id="sheetContent"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

<!-- SUGGESTIONS OVERLAY -->
<div class="sugg-overlay" id="suggOverlay" onclick="closeSuggestions(event)">
  <div class="sugg-sheet">
    <div class="sugg-header">
      <div class="sugg-title" id="suggTitle">✨ Hva skal vi finne på?</div>
      <div class="sugg-sub" id="suggSub">Laster...</div>
    </div>
    <button class="sugg-close" onclick="document.getElementById('suggOverlay').classList.remove('open')">✕</button>
    <div class="sugg-list" id="suggList"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

// ===================== WEATHER =====================
async function fetchWeather(){
  try{
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=59.913&longitude=10.752&current=temperature_2m,weathercode,windspeed_10m&timezone=Europe/Oslo');
    const d=await r.json();
    const c=d.current;
    weatherData={temp:Math.round(c.temperature_2m),code:c.weathercode,wind:Math.round(c.windspeed_10m)};
    const icons={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',51:'🌦️',61:'🌧️',71:'🌨️',80:'🌦️',95:'⛈️'};
    const descs={0:'klarvær',1:'lettskyet',2:'delvis skyet',3:'overskyet',45:'tåke',51:'yr',61:'regn',71:'snø',80:'regnbyger',95:'tordenvær'};
    const ic=icons[c.weathercode]||icons[Math.floor(c.weathercode/10)*10]||'🌡️';
    const de=descs[c.weathercode]||descs[Math.floor(c.weathercode/10)*10]||'variabelt';
    document.getElementById('weatherPill').textContent=`${ic} ${weatherData.temp}°C · ${de}`;
  }catch(e){document.getElementById('weatherPill').textContent='🌡️ Oslo';}
}

    currentContext=c.dataset.ctx;
    userPrefs.mood=currentContext;
    savePrefs();
  });
});

// ===================== MATCH SCORE =====================
function getWeatherScore(p){
  if(!weatherData)return 50;
  const t=weatherData.temp,code=weatherData.code;
  const types=p.activity_types||[];
  const isRainy=code>=51,isCold=t<8,isWarm=t>=18,isHot=t>=23;
  let s=50;
  if(types.some(x=>['badested','svømming','elvebad'].includes(x))){if(isHot)s+=40;else if(isWarm)s+=20;else if(isCold)s-=30;if(isRainy)s-=20;}
  if(types.includes('badstue')){if(isCold||isRainy)s+=30;else s+=5;}
  if(types.some(x=>['løperute','tur','discgolf','tennisbane','tuftpark','bordtennis'].includes(x))){if(!isRainy&&!isCold)s+=20;if(isRainy)s-=25;if(isHot)s-=5;}
  if(types.some(x=>['skiløype','skøytebane'].includes(x))){if(t<2)s+=40;else s-=50;}
  if(p.seasons){const m=new Date().getMonth();const sm={vår:[2,3,4],sommer:[5,6,7],høst:[8,9,10],vinter:[11,0,1]};const ok=p.seasons.some(s=>s==='hele året'||(sm[s]||[]).includes(m));if(!ok)s-=60;}
  return Math.max(0,Math.min(100,s));
}

function matchScore(p){
  let s=50;
  const types=p.activity_types||[];
  const prefs=userPrefs.types||[];
  const visits=userPrefs.visits||{};
  s+=types.filter(t=>prefs.includes(t)).length*15;
  types.forEach(t=>{if(visits[t])s+=Math.min(20,visits[t]*3);});
  if(currentContext==='family'&&p.family_friendly)s+=12;
  if(currentContext==='date'&&!p.family_friendly&&p.area==='Sentrum')s+=8;
  if(currentContext==='friends'&&p.is_free)s+=6;
  if(currentContext==='solo'&&types.some(x=>['løperute','tur','discgolf'].includes(x)))s+=8;
  s+=getWeatherScore(p)*0.2;
  s+=(p.score_total||70)*0.08;
  return Math.min(99,Math.max(25,Math.round(s)));
}

// ===================== SUGGESTIONS =====================
function openSuggestions(){
  const scored=PLACES.map(p=>({...p,_m:matchScore(p),_w:getWeatherScore(p)}))
    .filter(p=>p._w>=15)
    .sort((a,b)=>(b._m+b._w*0.5)-(a._m+a._w*0.5))
    .slice(0,7);

  const t=weatherData?weatherData.temp:15;
  const code=weatherData?weatherData.code:1;
  const isRainy=code>=51,isHot=t>=22;
  const hour=new Date().getHours();
  const ctxLabel={solo:'for deg',friends:'med venner',family:'for familien',date:'på date'}[currentContext]||'';

  document.getElementById('suggTitle').textContent=`✨ Beste forslag ${ctxLabel} nå`;
  document.getElementById('suggSub').textContent=`${t}°C · ${hour<12?'Formiddag':hour<17?'Ettermiddag':'Kveld'} · Basert på vær og dine preferanser`;

  document.getElementById('suggList').innerHTML=scored.map((p,i)=>{
    let why='';
    const types=p.activity_types||[];
    if(i===0){if(isHot&&types.some(x=>['badested','elvebad','svømming'].includes(x)))why=`🔥 Perfekt badedag med ${t}°C`;else if(isRainy&&types.includes('badstue'))why='🌧️ Regnvær? Perfekt for badstue';else why='⭐ Beste totalmatch akkurat nå';}
    else if(isHot&&types.some(x=>['badested','svømming','elvebad'].includes(x)))why=`☀️ Flott badedag i dag`;
    else if(isRainy&&types.includes('badstue'))why='🌧️ Perfekt regnværsaktivitet';
    else if(types.includes('løperute')&&!isRainy)why='🏃 Fin dag for løpetur';
    else if(types.includes('discgolf'))why='🥏 Populær bane nå';
    else if(types.includes('bordtennis'))why='🏓 Alltid gratis og tilgjengelig';
    else if(hour>=17)why='🌇 Perfekt kveldstilbud';
    else why=`⭐ ${p.score_total}/100 poeng`;
    return `<div class="sugg-item ${i===0?'top':''}" onclick="closeSuggestions();setTimeout(()=>openModal('${p.id}'),100)">
      <div class="sugg-emoji">${placeEmoji(p)}</div>
      <div class="sugg-info" style="flex:1">
        <div class="sugg-name">${i===0?'🏆 ':''}${p.name}</div>
        <div class="sugg-why">${why}</div>
        <div class="sugg-meta">
          <span>📍 ${p.neighborhood||p.municipality}</span>
          <span>${p.is_free?'🆓 Gratis':p.price_range||'Betalt'}</span>
          <span>⭐ ${p.score_total}/100</span>
        </div>
      </div>
      <div class="sugg-match">${p._m}%</div>
    </div>`;
  }).join('');

  document.getElementById('suggOverlay').classList.add('open');
  scored.slice(0,3).forEach(p=>{(p.activity_types||[]).forEach(t=>{userPrefs.visits[t]=(userPrefs.visits[t]||0)+0.1;});});
  savePrefs();
}
function closeSuggestions(e){if(!e||e.target.id==='suggOverlay')document.getElementById('suggOverlay').classList.remove('open');}

// ===================== CATEGORIES =====================
const CATS=[
  {id:'all',label:'🗺️ Alle'},{id:'badested',label:'🏊 Bading'},{id:'badstue',label:'🧖 Badstue'},
  {id:'elvebad',label:'🏞️ Elvebad'},{id:'tuftpark',label:'💪 Tuftepark'},{id:'tennisbane',label:'🎾 Tennis'},
  {id:'løperute',label:'🏃 Løping'},{id:'tur',label:'🥾 Tur'},{id:'discgolf',label:'🥏 Discgolf'},
  {id:'skatepark',label:'🛹 Skate'},{id:'bordtennis',label:'🏓 Bordtennis'},{id:'fotballbane',label:'⚽ Fotball'},
  {id:'basketballbane',label:'🏀 Basket'},{id:'volleyballbane',label:'🏐 Volleyball'},
  {id:'klatring',label:'🧗 Klatring'},{id:'skiløype',label:'⛷️ Ski'},{id:'skøytebane',label:'⛸️ Skøyter'},
  {id:'padelbane',label:'🏓 Padel'},{id:'kajakkutleie',label:'🚣 Kajakk'},{id:'øy',label:'🏝️ Øyer'},

];
const AREAS=['Alle','Sentrum','Vest','Nord','Sørøst','Øst','Bærum','Asker'];

function buildFilters(){
  const cf=document.getElementById('catFilters');
  CATS.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='filter-btn'+(c.id===activeCat?' active':'');
    btn.textContent=c.label;
    btn.onclick=()=>{activeCat=c.id;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');applyFilters();};
    cf.appendChild(btn);
  });
  const af=document.getElementById('areaFilters');
  AREAS.forEach(a=>{
    const btn=document.createElement('div');
    btn.className='sub-btn'+(a===activeArea?' active':'');
    btn.textContent=a;
    btn.onclick=()=>{activeArea=a;document.querySelectorAll('.sub-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');applyFilters();};
    af.appendChild(btn);
  });
}

// ===================== EXTRA FILTERS =====================
function toggleFree(){freeOnly=!freeOnly;document.getElementById('freeBtn').classList.toggle('active',freeOnly);applyFilters();}
function toggleDog(){dogOnly=!dogOnly;document.getElementById('dogBtn').classList.toggle('active',dogOnly);applyFilters();}
function toggleFam(){famOnly=!famOnly;document.getElementById('famBtn').classList.toggle('active',famOnly);applyFilters();}
function toggleOpen(){openOnly=!openOnly;document.getElementById('openBtn').classList.toggle('active',openOnly);applyFilters();}
function sortBy(mode){
  sortMode=mode;
  ['sortTrend','sortScore','sortMatch'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById({trending:'sortTrend',score:'sortScore',match:'sortMatch'}[mode]).classList.add('active');
  applyFilters();
}

// ===================== FILTER + RENDER =====================
function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  let results=PLACES.filter(p=>{
    if(activeCat!=='all'&&!(p.activity_types||[]).includes(activeCat))return false;
    if(activeArea!=='Alle'&&p.area!==activeArea)return false;
    if(freeOnly&&!p.is_free)return false;
    if(dogOnly&&!p.dog_friendly)return false;
    if(famOnly&&!p.family_friendly)return false;
    if(openOnly&&p.status==='closed')return false;
    if(q){const hay=[p.name,p.description||'',p.neighborhood||'',p.municipality,...(p.best_for_tags||[]),...(p.activity_types||[])].join(' ').toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });

  if(sortMode==='score')results.sort((a,b)=>(b.score_total||0)-(a.score_total||0));
  else if(sortMode==='trending')results.sort((a,b)=>(b.trending_score||0)-(a.trending_score||0));
  else if(sortMode==='match')results.sort((a,b)=>matchScore(b)-matchScore(a));

  document.getElementById('resultsInfo').innerHTML=`<span>${results.length} steder</span>${sortMode==='match'?'<span style="color:#2563eb;font-size:.72rem;font-weight:600">🎯 Sortert etter din match</span>':''}`;

  const cont=document.getElementById('cards');
  if(!results.length){cont.innerHTML='<div class="no-results"><span>🔍</span>Ingen steder — prøv et annet søk</div>';return;}

  const trendingBlock = '';
  
  cont.innerHTML = trendingBlock + results.map(p=>{
    const ms=matchScore(p);
    const isHighMatch=sortMode==='match'&&ms>=75;
    const types=(p.activity_types||[]).slice(0,4).map(t=>`<span class="tag type">${t}</span>`).join('');
    const tags=(p.best_for_tags||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('');
    const icons=[p.toilet?'🚻':null,p.parking?'🅿️':null,p.public_transport?'🚌':null,p.dog_friendly?'🐕':null,p.family_friendly?'👨‍👩‍👧':null,p.wheelchair_accessible?'♿':null].filter(Boolean).slice(0,5);
    const footerLeft=`<span class="icon-info">${icons.map(i=>`<span>${i}</span>`).join(' ')}</span>`;
    const footerRight=`
      <div style="display:flex;gap:5px;align-items:center">
        ${p.score_total?`<span class="score-badge">⭐ ${p.score_total}</span>`:''}
        ${isHighMatch?`<span class="match-badge">🎯 ${ms}%</span>`:''}
      </div>`;
    return `<div class="card ${isHighMatch?'match-high':''}" onclick="openModal('${p.id}');trackVisit('${p.id}')">
      <div class="card-top">
        <div>
          ${p.featured?'<span class="feat-badge">⭐ Anbefalt</span><br>':''}
          <div class="card-name">${placeEmoji(p)} ${p.name}</div>
          <div class="card-area">📍 ${p.neighborhood||p.municipality} · ${p.area}</div>
        </div>
        <span class="${p.is_free?'badge-free':'badge-paid'}">${p.is_free?'Gratis':p.price_range||'Betalt'}</span>
      </div>
      <div class="card-desc">${p.description||''}</div>
      <div class="card-tags">${types}${tags}</div>
      <div class="card-footer">${footerLeft}${footerRight}</div>
    </div>`;
  }).join('');
}

function buildTrendingStrip(results){
  const top=results.slice(0,Math.min(8,results.length));
  return `<div class="trending-strip">
    <div class="trending-title">🔥 Trending blant disse stedene</div>
    <div class="trending-pills">
      ${top.map(p=>`<div class="trend-pill" onclick="openModal('${p.id}')">${placeEmoji(p)} ${p.name.split('(')[0].trim()}</div>`).join('')}
    </div>
  </div>`;
}

// ===================== MODAL =====================
function openModal(id){
  const p=PLACES.find(x=>x.id===id);
  if(!p)return;
  trackVisit(id);
  const isFav=favorites.includes(id);
  const ms=matchScore(p);
  const scores=[['Totalt',p.score_total],['Kvalitet',p.score_quality],['Beliggenhet',p.score_location],['Tilgjengelig',p.score_accessibility],['Atmosfære',p.score_atmosphere],['Verdi',p.score_value]].filter(x=>x[1]);
  
  document.getElementById('modalContent').innerHTML=`
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h2>${placeEmoji(p)} ${p.name}</h2>
    <div class="m-area">📍 ${p.address||p.neighborhood||p.municipality} · ${p.area}</div>
    <div class="m-badges">
      <span class="${p.is_free?'badge-free':'badge-paid'}">${p.is_free?'Gratis':p.price_range||'Betalt'}</span>
      ${ms>=70?`<span class="match-badge">🎯 Passer deg ${ms}%</span>`:''}
      ${p.featured?'<span class="feat-badge">⭐ Anbefalt</span>':''}
      <span style="font-size:.72rem;color:#aaa">👁 ${p.visit_count||0} besøk</span>
    </div>
    <div class="m-desc">${p.description||''}</div>
    ${scores.length?`<div class="modal-scores">${scores.map(([l,v])=>`<div class="mscore-box"><div class="mscore-label">${l}</div><div class="mscore-val">${v}</div></div>`).join('')}</div>`:''}
    <div class="modal-tags">${(p.activity_types||[]).map(t=>`<span class="tag type">${t}</span>`).join('')}${(p.best_for_tags||[]).slice(0,4).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    ${[
      ['Adresse',p.address||'—'],
      ['Bestilling',p.booking_required?'Kreves':'Ikke nødvendig'],
      ['Kollektivt',p.public_transport?(p.transport_details||'Ja'):'Nei'],
      ['Parkering',p.parking?'Ja':'Nei'],
      ['Toalett',p.toilet?'Ja':'Nei'],
      ['Dusj',p.shower?'Ja':'Nei'],
      ['Hund OK',p.dog_friendly?'Ja':'Nei'],
      ['Familie',p.family_friendly?'Ja':'—'],
      ['Rullestol',p.wheelchair_accessible?'Ja':'Nei'],
      ['Sesong',(p.seasons||[]).join(', ')],
      ['Vurderinger',`${p.review_count||0} vurderinger`],
    ].filter(([,v])=>v&&v!=='—'&&v!=='Nei').map(([l,v])=>`<div class="modal-row"><span class="m-label">${l}</span><span class="m-val">${v}</span></div>`).join('')}
    <div style="margin-top:12px;background:#f9f9f6;border-radius:10px;padding:12px">
      <div style="font-size:.8rem;font-weight:700;margin-bottom:8px">⭐ Gi en vurdering</div>
      <div class="rate-row" id="rateRow${id}">
        ${[1,2,3,4,5].map(n=>`<button class="star-btn" onclick="rateStar('${id}',${n})" style="color:${n<=Math.round((p.score_total||75)/20)?'#f59e0b':'#ddd'}">★</button>`).join('')}
      </div>
    </div>
    <button class="fav-btn ${isFav?'active':''}" id="favBtn${id}" onclick="toggleFav('${id}')">
      ${isFav?'❤️ Lagret som favoritt':'🤍 Lagre som favoritt'}
    </button>
    ${p.booking_url?`<a href="${p.booking_url}" target="_blank" class="btn-book">📅 Book plass</a>`:''}
  `;
  document.getElementById('modal').style.display='block';
}

function closeModal(e){if(!e||e.target.id==='modal')document.getElementById('modal').style.display='none';}

// ===================== MAP =====================
const CAT_COLORS={badested:'#1565c0',badstue:'#6a1b9a',elvebad:'#00838f',tuftpark:'#2e7d32',tennisbane:'#e65100',fotballbane:'#1b5e20',basketballbane:'#f57f17',skatepark:'#424242',klatring:'#3e2723',discgolf:'#33691e',løperute:'#004d40',tur:'#4e342e',skiløype:'#0d47a1',bordtennis:'#4a148c',sykling:'#006064',øy:'#01579b',park:'#2e7d32'};
function placeColor(p){for(const t of(p.activity_types||[]))if(CAT_COLORS[t])return CAT_COLORS[t];return'#555'}

function initMap(){
  if(leafletMap)return;
  leafletMap=L.map('map',{zoomControl:false}).setView([59.913,10.752],12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(leafletMap);
  L.control.zoom({position:'bottomright'}).addTo(leafletMap);
  setTimeout(()=>leafletMap.invalidateSize(),100);
}

function renderMap(){
  if(!leafletMap)initMap();
  mapMarkers.forEach(m=>leafletMap.removeLayer(m));
  mapMarkers=[];
  document.getElementById('mapBottomSheet').classList.remove('open');
  const q=document.getElementById('search').value.toLowerCase().trim();
  const places=PLACES.filter(p=>{
    if(!p.lat||!p.lng)return false;
    if(activeCat!=='all'&&!(p.activity_types||[]).includes(activeCat))return false;
    if(activeArea!=='Alle'&&p.area!==activeArea)return false;
    if(freeOnly&&!p.is_free)return false;
    if(q){const hay=[p.name,p.neighborhood||'',p.municipality].join(' ').toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
  places.forEach(p=>{
    const col=placeColor(p);
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34"><path d="M13 0C5.8 0 0 5.8 0 13c0 9 13 21 13 21S26 22 26 13C26 5.8 20.2 0 13 0z" fill="${col}" stroke="rgba(255,255,255,.7)" stroke-width="1.5"/><circle cx="13" cy="13" r="5" fill="rgba(255,255,255,.45)"/></svg>`;
    const icon=L.divIcon({html:svg,className:'',iconSize:[26,34],iconAnchor:[13,34]});
    const m=L.marker([p.lat,p.lng],{icon}).addTo(leafletMap);
    m.on('click',()=>openMapSheet(p.id));
    mapMarkers.push(m);
  });
  document.getElementById('mapCount').textContent=`${places.length} steder`;
  if(mapMarkers.length){try{leafletMap.fitBounds(L.featureGroup(mapMarkers).getBounds().pad(.1),{maxZoom:14});}catch(e){}}
  setTimeout(()=>leafletMap.invalidateSize(),200);
}

function openMapSheet(id){
  const p=PLACES.find(x=>x.id===id);
  if(!p)return;
  document.getElementById('sheetContent').innerHTML=`
    <span class="sheet-close" onclick="document.getElementById('mapBottomSheet').classList.remove('open')">✕</span>
    <div class="sheet-name">${placeEmoji(p)} ${p.name}</div>
    <div class="sheet-area">📍 ${p.address||p.neighborhood||p.municipality} · <strong style="color:${p.is_free?'#2e7d32':'#e65100'}">${p.is_free?'Gratis':p.price_range||'Betalt'}</strong></div>
    <div class="sheet-desc">${(p.description||'').slice(0,130)}...</div>
    <div class="sheet-tags">${(p.activity_types||[]).slice(0,4).map(t=>`<span class="tag type">${t}</span>`).join('')}</div>
    <div style="display:flex;gap:8px">
      <button onclick="toggleFav('${p.id}');this.textContent=favorites.includes('${p.id}')?'❤️ Lagret':'🤍 Lagre'" style="flex:1;padding:10px;border:1.5px solid #ddd;background:#fff;border-radius:10px;font-weight:600;cursor:pointer">${favorites.includes(p.id)?'❤️ Lagret':'🤍 Lagre'}</button>
      <button onclick="document.getElementById('mapBottomSheet').classList.remove('open');setTimeout(()=>openModal('${p.id}'),100)" style="flex:1;padding:10px;background:#1a1a2e;color:#fff;border:none;border-radius:10px;font-weight:600;cursor:pointer">Detaljer →</button>
    </div>
    ${p.booking_url?`<a href="${p.booking_url}" target="_blank" class="sheet-book" style="margin-top:8px">📅 Book plass</a>`:''}
  `;
  document.getElementById('mapBottomSheet').classList.add('open');
}

// ===================== UTILS =====================
function toggleFav(id){
  if(favorites.includes(id)){favorites=favorites.filter(x=>x!==id);showToast('Fjernet fra favoritter');}
  else{favorites.push(id);showToast('❤️ Lagret som favoritt!');}
  localStorage.setItem('ao_favs',JSON.stringify(favorites));
  const btn=document.getElementById('favBtn'+id);
  if(btn){btn.textContent=favorites.includes(id)?'❤️ Lagret som favoritt':'🤍 Lagre som favoritt';btn.classList.toggle('active',favorites.includes(id));}
}

function rateStar(id,stars){
  const p=PLACES.find(x=>x.id===id);
  if(!p)return;
  p.score_total=Math.min(99,Math.max(40,Math.round(((p.score_total||75)*(p.review_count||5)+stars*20)/((p.review_count||5)+1))));
  p.review_count=(p.review_count||5)+1;
  const row=document.getElementById('rateRow'+id);
  if(row)row.querySelectorAll('.star-btn').forEach((b,i)=>{b.style.color=i<stars?'#f59e0b':'#ddd';});
  showToast(`${'★'.repeat(stars)} Takk for vurderingen!`);
  (p.activity_types||[]).forEach(t=>{userPrefs.visits[t]=(userPrefs.visits[t]||0)+2;});
  savePrefs();
}

function trackVisit(id){
  const p=PLACES.find(x=>x.id===id);
  if(p)(p.activity_types||[]).forEach(t=>{userPrefs.visits[t]=(userPrefs.visits[t]||0)+1;});
  savePrefs();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function savePrefs(){localStorage.setItem('ao_prefs',JSON.stringify(userPrefs));}

// ===================== VIEW SWITCH =====================
function switchView(v){
  currentView=v;
  document.getElementById('listView').style.display=v==='list'?'flex':'none';
  document.getElementById('mapView').style.display=v==='map'?'flex':'none';
  document.getElementById('btnList').classList.toggle('active',v==='list');
  document.getElementById('btnMap').classList.toggle('active',v==='map');
  if(v==='map'){initMap();renderMap();}
}

// ===================== INIT =====================
(function(){
  buildFilters();
  applyFilters();
  fetchWeather();
  if(userPrefs.mood){currentContext=userPrefs.mood;document.querySelectorAll('.ctx-chip').forEach(c=>c.classList.toggle('active',c.dataset.ctx===currentContext));}
  sortBy('score');
})();
</script>
