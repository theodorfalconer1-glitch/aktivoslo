<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>AktivOslo</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{
  --navy:#1a2b4a;--accent:#2563eb;--aL:#dbeafe;--sand:#f8f7f4;
  --border:#e5e7eb;--text:#111827;--muted:#6b7280;--green:#16a34a;
  --red:#ef4444;--orange:#f97316;
  --hdr:56px;--bnav:62px
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#e8ebe0}

/* ── MAP ── */
#map{position:fixed;inset:0;z-index:1}

/* ── HEADER ── */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:calc(var(--hdr) + env(safe-area-inset-top));
  padding-top:env(safe-area-inset-top);
  background:rgba(255,255,255,.97);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(0,0,0,.07);
  display:flex;align-items:center;gap:8px;padding-left:12px;padding-right:10px
}
.home-btn{display:flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;padding:4px;border-radius:9px;flex-shrink:0}
.home-logo{font-weight:900;font-size:.88rem;color:var(--navy);letter-spacing:-.3px;white-space:nowrap}
.hdr-srch{
  flex:1;display:flex;align-items:center;gap:7px;min-width:0;
  background:#f3f4f6;border:1.5px solid transparent;border-radius:24px;
  padding:8px 13px;transition:all .15s
}
.hdr-srch:focus-within{background:#fff;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.hdr-srch input{border:none;background:none;outline:none;font-size:.85rem;color:var(--text);font-family:inherit;width:100%}
.hdr-srch input::placeholder{color:#9ca3af}
.hbtn{background:none;border:none;cursor:pointer;font-size:1.05rem;padding:7px;border-radius:9px;flex-shrink:0}
.hbtn:active{background:var(--sand)}

/* ── SEARCH DROPDOWN ── */
#srchDrop{
  position:fixed;top:calc(var(--hdr) + env(safe-area-inset-top) + 4px);
  left:8px;right:8px;z-index:500;
  background:#fff;border-radius:16px;
  box-shadow:0 10px 40px rgba(0,0,0,.16);
  display:none;overflow:hidden;max-height:70vh
}
#srchDrop.on{display:flex;flex-direction:column}
.sdrop-filters{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding:10px 12px 6px;border-bottom:1px solid var(--border);flex-shrink:0}
.sdrop-filters::-webkit-scrollbar{display:none}
.sf{padding:5px 10px;border-radius:20px;font-size:.69rem;font-weight:700;border:1.5px solid var(--border);background:#fff;color:var(--navy);cursor:pointer;white-space:nowrap;flex-shrink:0;touch-action:manipulation}
.sf.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.sdrop-extra{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding:5px 12px 8px;border-bottom:1px solid #f3f4f6;flex-shrink:0}
.sdrop-extra::-webkit-scrollbar{display:none}
.sef{padding:4px 9px;border-radius:20px;font-size:.65rem;font-weight:700;border:1.5px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0}
.sef.on{background:#f0fdf4;border-color:#86efac;color:var(--green)}
#srchList{overflow-y:auto;-webkit-overflow-scrolling:touch;max-height:50vh}
.sr-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #f9fafb;cursor:pointer;touch-action:manipulation}
.sr-item:active{background:#f9fafb}
.sr-ico{font-size:1rem;flex-shrink:0;width:32px;height:32px;background:var(--sand);border-radius:9px;display:flex;align-items:center;justify-content:center}
.sr-name{font-weight:700;font-size:.82rem;color:var(--navy);margin-bottom:1px}
.sr-sub{font-size:.66rem;color:var(--muted)}
.sr-dist{font-size:.66rem;font-weight:700;color:var(--accent);flex-shrink:0}
.sr-empty{padding:22px 16px;text-align:center;color:var(--muted);font-size:.8rem}

/* ── FILTER CHIPS (kart) ── */
#fbar{
  position:fixed;z-index:100;
  top:calc(var(--hdr) + env(safe-area-inset-top) + 8px);
  left:0;right:0;
  display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;
  padding:0 10px;-webkit-overflow-scrolling:touch
}
#fbar::-webkit-scrollbar{display:none}
.chip{
  padding:6px 12px;border-radius:20px;font-size:.71rem;font-weight:700;
  border:none;background:rgba(255,255,255,.93);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  box-shadow:0 1px 6px rgba(0,0,0,.13);cursor:pointer;white-space:nowrap;flex-shrink:0;color:var(--navy);touch-action:manipulation
}
.chip.on{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.35)}

/* ── NÆR MEG-KNAPP ── */
#nearBtn{
  position:fixed;z-index:100;
  bottom:calc(var(--bnav) + env(safe-area-inset-bottom) + 14px);
  left:50%;transform:translateX(-50%);
  background:var(--navy);color:#fff;border:none;border-radius:30px;
  padding:11px 20px;font-size:.82rem;font-weight:800;
  box-shadow:0 4px 20px rgba(26,43,74,.35);cursor:pointer;
  display:flex;align-items:center;gap:7px;white-space:nowrap;touch-action:manipulation;
  transition:transform .12s,box-shadow .12s
}
#nearBtn:active{transform:translateX(-50%) scale(.97);box-shadow:0 2px 10px rgba(26,43,74,.3)}
#nearBtn.loading{opacity:.7;pointer-events:none}

/* ── BOTTOM NAV ── */
#bnav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(255,255,255,.97);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid rgba(0,0,0,.07);
  display:flex;padding-bottom:env(safe-area-inset-bottom)
}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px 6px;cursor:pointer;color:var(--muted);border:none;background:none;font-size:.56rem;font-weight:700;touch-action:manipulation;transition:color .12s}
.bn.on{color:var(--accent)}
.bn-i{font-size:1.1rem;line-height:1}
.bn-badge{position:absolute;top:-2px;right:8px;background:var(--red);color:#fff;border-radius:6px;font-size:.5rem;font-weight:900;padding:1px 4px;min-width:14px;text-align:center}

/* ── SCREENS ── */
.sscr{position:fixed;inset:0;z-index:300;background:#fff;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);will-change:transform}
.sscr.on{transform:translateX(0)}
.sscr-nav{display:flex;align-items:center;gap:10px;padding:12px 14px;padding-top:calc(12px + env(safe-area-inset-top));border-bottom:1px solid var(--border);flex-shrink:0;background:#fff}
.back-btn{display:flex;align-items:center;gap:4px;background:var(--sand);border:1.5px solid var(--border);border-radius:10px;padding:7px 11px;font-size:.8rem;font-weight:700;cursor:pointer;color:var(--navy);touch-action:manipulation;flex-shrink:0}
.sscr-title{font-size:.92rem;font-weight:900;color:var(--navy)}
.sscr-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}

/* ── EXPLORE SCREEN ── */
.exp-search{display:flex;align-items:center;gap:7px;background:#f3f4f6;border:1.5px solid transparent;border-radius:22px;padding:9px 14px;margin:10px 12px 0;transition:all .15s}
.exp-search:focus-within{background:#fff;border-color:var(--accent)}
.exp-search input{border:none;background:none;outline:none;font-size:.87rem;width:100%;font-family:inherit}
.exp-filter-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding:8px 12px;flex-shrink:0}
.exp-filter-row::-webkit-scrollbar{display:none}
.exp-extra-row{display:flex;flex-wrap:wrap;gap:5px;padding:0 12px 8px;border-bottom:1px solid var(--border)}
.fchip{padding:6px 12px;border-radius:20px;font-size:.69rem;font-weight:700;border:1.5px solid var(--border);background:#fff;color:var(--navy);cursor:pointer;white-space:nowrap;flex-shrink:0;touch-action:manipulation}
.fchip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.xchip{padding:5px 10px;border-radius:20px;font-size:.66rem;font-weight:700;border:1.5px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0}
.xchip.on{background:#f0fdf4;border-color:#86efac;color:var(--green)}
.res-count{padding:5px 14px 3px;font-size:.67rem;color:var(--muted);font-weight:600;flex-shrink:0}
#expList{padding:0 10px 80px}
.pc{background:#fff;margin:4px 0;border-radius:12px;border:1px solid var(--border);padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;touch-action:manipulation;transition:background .1s}
.pc:active{background:#f9fafb}
.pc-ico{font-size:1.2rem;flex-shrink:0;width:34px;height:34px;background:var(--sand);border-radius:9px;display:flex;align-items:center;justify-content:center}
.pc-name{font-weight:800;font-size:.83rem;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.pc-sub{font-size:.66rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.pc-sc{font-size:.76rem;font-weight:900;color:var(--accent)}
.vtag{font-size:.53rem;font-weight:700;background:#dcfce7;color:var(--green);border-radius:4px;padding:1px 4px}
.ftag{font-size:.53rem;font-weight:700;background:var(--aL);color:var(--accent);border-radius:4px;padding:1px 4px}
.fvtag{font-size:.53rem;font-weight:700;background:#fef3c7;color:#92400e;border-radius:4px;padding:1px 4px}
.no-res{padding:32px 16px;text-align:center;color:var(--muted);font-size:.82rem;line-height:1.7}

/* ── BOTTOM SHEET ── */
#bshOv{position:fixed;inset:0;z-index:249;display:none;background:rgba(0,0,0,.18);backdrop-filter:blur(1px)}
#bshOv.on{display:block}
#bsh{
  position:fixed;bottom:0;left:0;right:0;z-index:250;
  background:#fff;border-radius:20px 20px 0 0;
  box-shadow:0 -4px 28px rgba(0,0,0,.14);
  transform:translateY(110%);transition:transform .25s cubic-bezier(.4,0,.2,1);
  max-height:80vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding-bottom:env(safe-area-inset-bottom)
}
#bsh.on{transform:translateY(0)}
.bsh-hdl{width:36px;height:4px;background:#d1d5db;border-radius:2px;margin:9px auto 0}
.bsh-in{padding:10px 16px 20px}
.bsh-hdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.bsh-ico2{font-size:1.5rem;flex-shrink:0;width:44px;height:44px;background:var(--sand);border-radius:12px;display:flex;align-items:center;justify-content:center}
.bsh-nm{font-size:1rem;font-weight:900;color:var(--navy);line-height:1.25;margin-bottom:2px}
.bsh-ad{font-size:.7rem;color:var(--muted)}
.bsh-desc{font-size:.77rem;line-height:1.55;color:#374151;margin-bottom:10px}
.bsh-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.btag{font-size:.63rem;font-weight:700;border-radius:6px;padding:3px 7px}
.btag-free{background:#dcfce7;color:var(--green)}
.btag-tr{background:#dbeafe;color:var(--accent)}
.btag-pk{background:#fef9c3;color:#854d0e}
.btag-fam{background:#fce7f3;color:#be185d}
.btag-dog{background:#f3e8ff;color:#7e22ce}
.bsh-acts{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.bsh-btn{padding:11px 6px;border-radius:11px;border:none;font-weight:700;font-size:.74rem;cursor:pointer;touch-action:manipulation;transition:opacity .1s}
.bsh-btn:active{opacity:.8}
.bsh-btn.pr{background:var(--accent);color:#fff}
.bsh-btn.gr{background:#dcfce7;border:1.5px solid #86efac;color:var(--green)}
.bsh-btn.se{background:var(--sand);border:1.5px solid var(--border);color:var(--navy)}
.bsh-btn.re{background:#fee2e2;border:1.5px solid #fca5a5;color:var(--red)}
.bsh-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.stars-row{display:flex;align-items:center;gap:4px;margin:6px 0}
.stars-lbl{font-size:.66rem;color:var(--muted)}
.star{font-size:1.1rem;cursor:pointer;color:#d1d5db;touch-action:manipulation}
.star.on{color:#fbbf24}
.bsh-dist{font-size:.7rem;color:var(--accent);font-weight:700;margin-bottom:6px}

/* ── PROFILE ── */
.prof-hdr{background:linear-gradient(135deg,#1a2b4a,#2563eb);padding:20px 18px 16px;color:#fff;flex-shrink:0}
.prof-av{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.18);margin:0 auto 7px;font-size:1.3rem;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.3)}
.pstats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);margin:10px 12px;border-radius:12px;overflow:hidden}
.pst{background:#fff;padding:10px 4px;text-align:center}
.pst-n{font-size:.98rem;font-weight:900;color:var(--navy)}
.pst-l{font-size:.54rem;color:var(--muted);margin-top:1px}
.sec-t{font-size:.67rem;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;padding:10px 14px 4px}

/* Lister-tabber */
.list-tabs{display:flex;gap:2px;background:var(--sand);border-radius:10px;padding:3px;margin:0 12px 10px}
.lt{flex:1;padding:8px;text-align:center;border-radius:8px;font-size:.77rem;font-weight:700;color:var(--muted);cursor:pointer}
.lt.on{background:#fff;color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.list-items{padding:0 12px 60px}
.li-card{display:flex;align-items:center;gap:9px;background:#fff;margin:4px 0;padding:9px 11px;border-radius:11px;border:1px solid var(--border);cursor:pointer;touch-action:manipulation}
.li-card:active{background:#f9fafb}

/* ── SOSIAL / PLAN ── */
.plan-big{
  margin:12px;background:linear-gradient(135deg,var(--navy),#2563eb);
  color:#fff;border:none;border-radius:14px;padding:14px 16px;
  display:flex;align-items:center;gap:10px;cursor:pointer;width:calc(100% - 24px);touch-action:manipulation
}
.friend-card{display:flex;align-items:center;gap:9px;background:#fff;margin:3px 12px;padding:9px 11px;border-radius:11px;border:1px solid var(--border)}
.fav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:.7rem;flex-shrink:0}
.fr-btn{margin-left:auto;padding:5px 10px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:.68rem;font-weight:700;cursor:pointer;flex-shrink:0}
.fr-btn.ok{background:var(--aL);border-color:var(--accent);color:var(--accent)}
.feed-item{background:#fff;margin:4px 12px;border-radius:11px;border:1px solid var(--border);padding:10px;display:flex;gap:8px}
.feed-txt{font-size:.76rem;line-height:1.42;margin-bottom:2px}
.feed-time{font-size:.62rem;color:var(--muted)}
.fp{font-weight:700;color:var(--accent);cursor:pointer}

/* ── QUICK PLAN MODAL ── */
#qplanModal{position:fixed;inset:0;z-index:9000;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.4)}
#qplanModal.on{display:flex}
.qpm{background:#fff;border-radius:20px 20px 0 0;padding:18px 16px;width:100%;max-width:480px;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
.qpm-title{font-size:.92rem;font-weight:900;color:var(--navy);margin-bottom:12px}
.qpm-place{background:var(--sand);border-radius:10px;padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.qpm-place-name{font-weight:800;font-size:.84rem;color:var(--navy)}
.time-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.qpm-in{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--border);font-size:.84rem;outline:none;font-family:inherit}
.qpm-in:focus{border-color:var(--accent)}
.friend-pick{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:2px 0 8px;margin-bottom:4px}
.friend-pick::-webkit-scrollbar{display:none}
.fp-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:.78rem;flex-shrink:0;cursor:pointer;position:relative;opacity:.4;transition:opacity .15s}
.fp-av.sel{opacity:1}
.fp-av.sel::after{content:'✓';position:absolute;bottom:-1px;right:-1px;background:var(--green);color:#fff;border-radius:50%;width:14px;height:14px;font-size:.55rem;display:flex;align-items:center;justify-content:center;font-weight:900}
.qpm-pr{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:4px}
.qpm-se{width:100%;padding:11px;background:#fff;border:1.5px solid var(--border);color:var(--navy);border-radius:12px;font-size:.85rem;font-weight:700;cursor:pointer;margin-top:6px}

/* ── LANG MODAL ── */
#langModal{position:fixed;inset:0;z-index:9000;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.4)}
#langModal.on{display:flex}
.lm-box{background:#fff;border-radius:20px 20px 0 0;padding:18px 16px 34px;width:100%;max-width:480px}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.li{padding:9px 10px;border-radius:9px;border:1.5px solid var(--border);cursor:pointer;font-size:.78rem;font-weight:700;display:flex;align-items:center;gap:7px}
.li.on{background:var(--aL);border-color:var(--accent)}

/* ── ONBOARDING ── */
#onb{position:fixed;inset:0;z-index:9999;background:rgba(10,20,45,.9);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);display:flex;align-items:flex-end;justify-content:center}
.onb-sheet{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px 18px calc(26px + env(safe-area-inset-bottom));overflow-y:auto;max-height:92vh}
.lp-onb{padding:9px 8px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:.78rem;font-weight:700;cursor:pointer;text-align:center;transition:background .15s,border-color .15s;touch-action:manipulation}
.lp-onb.sel{background:var(--aL);border-color:var(--accent);color:var(--accent)}
.btn-pr{background:var(--accent);color:#fff;border:none;padding:14px;border-radius:13px;font-size:.9rem;font-weight:700;cursor:pointer;width:100%;margin-bottom:7px}
.btn-se{background:#fff;border:1.5px solid var(--border);padding:12px;border-radius:13px;font-size:.87rem;font-weight:700;cursor:pointer;width:100%;color:var(--navy);margin-bottom:12px}
.lang-pills{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.lp{padding:5px 8px;border-radius:20px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:.72rem;font-weight:700;color:var(--navy)}
.lp.sel{background:var(--aL);border-color:var(--accent)}
.onb-feat{display:flex;align-items:flex-start;gap:9px;background:var(--sand);border-radius:11px;padding:9px 11px;border:1px solid var(--border);margin-bottom:6px}

/* ── LOGIN ── */
.tab-row{display:flex;gap:3px;background:var(--sand);border-radius:10px;padding:3px;margin-bottom:14px}
.tab-pill{flex:1;padding:9px;text-align:center;border-radius:8px;font-size:.81rem;font-weight:700;color:var(--muted);cursor:pointer}
.tab-pill.on{background:#fff;color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.lm-in{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:.87rem;margin-bottom:8px;outline:none;font-family:inherit}
.lm-in:focus{border-color:var(--accent)}
.lm-sub{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:11px;font-size:.9rem;font-weight:700;cursor:pointer}

.leaflet-control-zoom{border:none!important;box-shadow:0 2px 10px rgba(0,0,0,.12)!important;border-radius:10px!important;margin-bottom:calc(var(--bnav) + env(safe-area-inset-bottom) + 60px)!important}
.leaflet-control-zoom a{border-radius:8px!important;border:none!important}
.leaflet-control-attribution{display:none}
</style>
</head>
<body>

<div id="map"></div>
<div id="fbar"></div>

<!-- HEADER -->
<div id="hdr">
  <button class="home-btn" id="homeBtn">
    <span style="font-size:1rem">🗺️</span>
    <span class="home-logo">AktivOslo</span>
  </button>
  <div class="hdr-srch" id="hdrSrch">

// ══ SOLFORHOLD ══
// Beregner solforhold basert på klokkeslett, kategori og retning
function getSunInfo(place){
  const h=new Date().getHours();
  const cat=(place.activity_types||[''])[0];
  // Solforhold basert på stedstype og tid
  const openTypes=['bading','badeplass','volleyballbane','basketballbane','løperute','park','discgolf'];
  const shadedTypes=['badstue','klatring','skatepark'];
  // Tid på dagen
  const isMorning=h>=6&&h<11;
  const isDay=h>=11&&h<17;
  const isEvening=h>=17&&h<21;
  const isNight=h>=21||h<6;
  if(isNight) return {icon:'🌙',label:'natt',score:0};
  // Stedsbasert heuristikk
  if(shadedTypes.includes(cat)) return {icon:'🌲',label:'skygge',score:2};
  // Badeplasser og åpne områder
  if(cat==='bading'||cat==='badeplass'){
    if(isDay) return {icon:'☀️',label:'fullt sol',score:5};
    if(isMorning) return {icon:'🌤️',label:'morgensol',score:4};
    if(isEvening) return {icon:'🌅',label:'kveldsol',score:3};
  }
  if(cat==='løperute'){
    if(isDay) return {icon:'☀️',label:'godt lys',score:5};
    if(isMorning||isEvening) return {icon:'🌤️',label:'behagelig lys',score:4};
  }
  if(openTypes.includes(cat)){
    if(isDay) return {icon:'☀️',label:'sol',score:5};
    if(isMorning) return {icon:'🌤️',label:'morgensol',score:4};
    if(isEvening) return {icon:'🌇',label:'kveldsol',score:3};
  }
  // Default
  if(isDay) return {icon:'🌤️',label:'delvis sol',score:3};
  if(isMorning||isEvening) return {icon:'🌤️',label:'lyst',score:3};
  return {icon:'⛅',label:'variabelt',score:2};
}

function getSunBadge(place){
  const s=getSunInfo(place);
  if(s.score===0) return '';
  return `<span style="font-size:.66rem;font-weight:700;color:#92400e;background:#fef3c7;border-radius:6px;padding:2px 5px;display:inline-flex;align-items:center;gap:2px">${s.icon} ${s.label}</span>`;
}

function initMap(){
  if(apMap) return;
  apMap=L.map('map',{zoomControl:true,attributionControl:false,preferCanvas:true,renderer:L.canvas({padding:.5})}).setView([59.913,10.740],12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd',detectRetina:true}).addTo(apMap);
  mLayer=L.layerGroup().addTo(apMap);
  buildFbar(); renderMarkers();
  apMap.on('click',hideSheet);
  setTimeout(()=>apMap.invalidateSize({animate:false}),150);
}
function makeIcon(c,isV){
  const color=isV?'#16a34a':(CLR[c]||'#2563eb');
  return L.divIcon({html:`<div style="width:32px;height:32px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:14px;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.25)">${ICO[c]||'📍'}</div>`,className:'',iconSize:[32,32],iconAnchor:[16,16]});
}
function getFiltered(q,c,filters){
  let r=PLACES.filter(p=>p.status!=='closed');
  const fc=c||mapCat;
  if(fc&&fc!=='all') r=r.filter(p=>(p.activity_types||[]).includes(fc));
  if(q){const lq=q.toLowerCase();r=r.filter(p=>p.name.toLowerCase().includes(lq)||(p.neighborhood||'').toLowerCase().includes(lq)||(p.municipality||'').toLowerCase().includes(lq)||(p.address||'').toLowerCase().includes(lq)||trC((p.activity_types||[''])[0]).toLowerCase().includes(lq));}
  if(filters){
    if(filters.free) r=r.filter(p=>p.is_free);
    if(filters.family) r=r.filter(p=>p.family_friendly);
    if(filters.transport) r=r.filter(p=>p.public_transport);
    if(filters.parking) r=r.filter(p=>p.parking);
  }
  return r;
}
function renderMarkers(){
  if(!apMap||!mLayer) return;
  mLayer.clearLayers();
  getFiltered('',mapCat,null).forEach(p=>{
    if(!p.lat||!p.lng) return;
    const c0=(p.activity_types||['?'])[0];
    mLayer.addLayer(L.marker([p.lat,p.lng],{icon:makeIcon(c0,visited.includes(p.id))}).on('click',e=>{L.DomEvent.stopPropagation(e);openPlace(p.id);}));
  });
}
function focusOn(p){if(apMap&&p.lat&&p.lng)apMap.setView([p.lat,p.lng],17,{animate:true,duration:.4});}

function distTo(p){
  if(!userPos||!p.lat||!p.lng) return null;
  const dx=(p.lng-userPos.lng)*Math.cos(userPos.lat*Math.PI/180)*111.32;
  const dy=(p.lat-userPos.lat)*111.32;
  return Math.sqrt(dx*dx+dy*dy);
}
function fmtDist(km){
  if(km===null) return '';
  if(km<1) return Math.round(km*1000)+'m';
  return km.toFixed(1)+'km';
}

    `<div class="sef${expFilters[k]?' on':''}" data-f="${k}">${tr(lk)}</div>`

const siEl=$('si'), siClear=$('siClear'), srchDrop=$('srchDrop');
function closeSrch(){srchDrop.classList.remove('on');siEl.value='';siEl.blur();siClear.style.display='none';$('srchList').innerHTML='';}
function renderDropResults(q){
  const hits=getFiltered(q,expCat,expFilters).sort((a,b)=>{
    const da=distTo(a),db=distTo(b);
    if(da!==null&&db!==null) return da-db;
    return (b.score_total||0)-(a.score_total||0);
  }).slice(0,15);
  $('srchList').innerHTML=hits.length
    ?hits.map(p=>{
      const c0=(p.activity_types||['?'])[0];
      const d=distTo(p);
      const tags=[(p.is_free?tr('free'):''),(visited.includes(p.id)?'✓':'')].filter(Boolean).join(' ');
      return`<div class="sr-item" data-id="${p.id}">
        <div class="sr-ico">${ICO[c0]||'📍'}</div>
        <div style="flex:1;min-width:0">
          <div class="sr-name">${p.name}${tags?` <span style="font-size:.6rem;color:var(--green)">${tags}</span>`:''}</div>
          <div class="sr-sub">${[p.neighborhood,p.municipality].filter(Boolean).join(', ')||''} · ${trC(c0)}</div>
        </div>
        ${d!==null?`<div class="sr-dist">${fmtDist(d)}</div>`:''}
      </div>`;
    }).join('')
    :`<div class="sr-empty">${tr('noResults')}</div>`;
}
siEl.addEventListener('input',e=>{
  const v=e.target.value.trim();
  siClear.style.display=v?'inline':'none';
  srchDrop.classList.toggle('on',true);
  renderDropResults(v);
});
siEl.addEventListener('focus',()=>{srchDrop.classList.add('on');renderDropResults(siEl.value.trim());});
siClear.addEventListener('click',closeSrch);
$('srchList').addEventListener('click',e=>{

document.addEventListener('click',e=>{

},{passive:true});

  expCat=c.dataset.c;buildExpFilters();buildDropFilters();renderExpList();
});
$('expExtraRow').addEventListener('click',e=>{
  const c=e.target.closest('.xchip');if(!c) return;
  expFilters[c.dataset.f]=!expFilters[c.dataset.f];buildExpFilters();buildDropFilters();renderExpList();
});
function renderExpList(){
  const list=getFiltered(expQ,expCat,expFilters).sort((a,b)=>{
    const da=distTo(a),db=distTo(b);
    if(da!==null&&db!==null) return da-db;
    return (b.score_total||0)-(a.score_total||0);
  });
  $('resCount').textContent=`${list.length} ${tr('results')}`;
  const frag=document.createDocumentFragment();
  if(!list.length){
    const d=document.createElement('div');d.className='no-res';d.textContent=tr('noResults');frag.appendChild(d);
  } else {
    list.forEach(p=>{
      const c0=(p.activity_types||['?'])[0];
      const d=distTo(p);
      const el=document.createElement('div');el.className='pc';el.dataset.id=p.id;
      el.innerHTML=`<div class="pc-ico">${ICO[c0]||'📍'}</div>
        <div class="pc-body"><div class="pc-name">${p.name}</div>
          <div class="pc-sub">${[p.neighborhood,p.municipality].filter(Boolean).join(', ')||''} · ${trC(c0)}</div></div>
        <div class="pc-right">
          ${p.is_free?`<span class="ftag">${tr('free')}</span>`:''}
          ${favorites.includes(p.id)?'<span class="fvtag">♥</span>':''}
          ${visited.includes(p.id)?'<span class="vtag">✓</span>':''}
          ${d!==null?`<span style="font-size:.66rem;font-weight:700;color:var(--accent)">${fmtDist(d)}</span>`:`<span class="pc-sc">${p.score_total||0}</span>`}
        </div>`;
      frag.appendChild(el);
    });
  }
  const el=$('expList');el.innerHTML='';el.appendChild(frag);
}
$('expList').addEventListener('click',e=>{
  const c=e.target.closest('.pc');if(!c) return;
  showSscr(null);openPlace(c.dataset.id);

// ══ ÅPNE STED ══
function openPlace(id){
  const p=PLACES.find(x=>x.id===id);if(!p) return;
  activePl=p;
  const c0=(p.activity_types||['?'])[0];
  $('bshIco').textContent=ICO[c0]||'📍';
  $('bshName').textContent=p.name;
  $('bshAddr').textContent=p.address||[p.neighborhood,p.municipality].filter(Boolean).join(', ');
  const d=distTo(p);
  $('bshDist').textContent=d!==null?('📍 '+fmtDist(d)+' '+tr('away')):'';
  $('bshDesc').textContent=p.description||'';
  // Tags
  const tags=[];
  if(p.is_free) tags.push(`<span class="btag btag-free">${tr('free')}</span>`);
  if(p.public_transport) tags.push(`<span class="btag btag-tr">🚇 ${tr('transport')}</span>`);
  if(p.parking) tags.push(`<span class="btag btag-pk">🅿️ ${tr('parking')}</span>`);
  if(p.family_friendly) tags.push(`<span class="btag btag-fam">👨‍👩‍👧 ${tr('familyF')}</span>`);
  if(p.dog_friendly) tags.push(`<span class="btag btag-dog">🐕</span>`);
  $('bshTags').innerHTML=tags.join('');
  // Stjerner
  const r=ratings[id]||0;
  document.querySelectorAll('.star').forEach(s=>s.classList.toggle('on',parseInt(s.dataset.r)<=r));
  updateBshLang();
  focusOn(p);showSheet();
}
document.querySelectorAll('.star').forEach(s=>s.addEventListener('click',()=>{
  if(!activePl) return;const r=parseInt(s.dataset.r);
  ratings[activePl.id]=r;localStorage.setItem('ao_ratings',JSON.stringify(ratings));
  document.querySelectorAll('.star').forEach(x=>x.classList.toggle('on',parseInt(x.dataset.r)<=r));
}));
$('bshVisit').addEventListener('click',()=>{
  if(!activePl) return;const id=activePl.id;
  if(!visited.includes(id)){
    visited.push(id);localStorage.setItem('ao_visited',JSON.stringify(visited));
    updateStreak();renderMarkers();renderExpList();
  } else {
    visited=visited.filter(x=>x!==id);localStorage.setItem('ao_visited',JSON.stringify(visited));
    renderMarkers();renderExpList();
  }
  updateBshLang();
});
$('bshFav').addEventListener('click',()=>{
  if(!activePl) return;const id=activePl.id;
  if(favorites.includes(id)) favorites=favorites.filter(x=>x!==id);
  else favorites.push(id);
  localStorage.setItem('ao_fav',JSON.stringify(favorites));
  updateBshLang();renderExpList();
});
$('bshWant').addEventListener('click',()=>{
  if(!activePl) return;const id=activePl.id;
  if(wantList.includes(id)) wantList=wantList.filter(x=>x!==id);
  else wantList.push(id);
  localStorage.setItem('ao_want',JSON.stringify(wantList));
  updateBshLang();renderExpList();
});
$('bshPlan').addEventListener('click',()=>{if(activePl)openQPlan(activePl);});
$('bshNav').addEventListener('click',()=>{
  if(!activePl) return;
  const{lat,lng,name}=activePl;
  if(/iPhone|iPad|iPod/.test(navigator.userAgent))window.open(`maps://maps.apple.com/?q=${encodeURIComponent(name)}&ll=${lat},${lng}`);
  else window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`);
});

function updateStreak(){
  const today=new Date().toDateString(),last=localStorage.getItem('ao_lastVisit');
  if(last!==today){
    localStorage.setItem('ao_lastVisit',today);
    streak=(last===new Date(Date.now()-86400000).toDateString())?streak+1:1;
    localStorage.setItem('ao_streak',streak);
  }
}

function openQPlan(pl){
  const d=new Date();d.setHours(d.getHours()+2,0,0,0);
  $('qpmDate').value=d.toISOString().slice(0,10);
  $('qpmTime').value=d.toTimeString().slice(0,5);
  if(pl){
    const c0=(pl.activity_types||['?'])[0];
    $('qpmIco').textContent=ICO[c0]||'📍';
    $('qpmName').textContent=pl.name;
    $('qpmPlace').style.display='flex';
  } else {
    $('qpmPlace').style.display='none';
  }
  // Venner-velger
  const allFr=[...FRIENDS_DEMO,...friends.filter(f=>!FRIENDS_DEMO.find(d=>d.name===f.name))];
  $('friendPick').innerHTML=allFr.map((f,i)=>`<div class="fp-av" data-n="${f.name}" style="background:${f.color||AV_COLORS[i%6]}">${f.name[0]}<span style="display:block;font-size:.5rem;margin-top:1px">${f.name.split(' ')[0]}</span></div>`).join('');
  $('friendPick').querySelectorAll('.fp-av').forEach(av=>av.addEventListener('click',()=>av.classList.toggle('sel')));
  $('qplanModal').classList.add('on');
}
$('openQPlan').addEventListener('click',()=>openQPlan(null));
$('qpmCancel').addEventListener('click',()=>$('qplanModal').classList.remove('on'));
$('qplanModal').addEventListener('click',e=>{if(e.target===$('qplanModal'))$('qplanModal').classList.remove('on');});
$('qpmSend').addEventListener('click',()=>{
  const sel=[...$('friendPick').querySelectorAll('.fp-av.sel')].map(a=>a.dataset.n);
  const pl=activePl;
  const act={place:pl?.name||'',cat:(pl?.activity_types||[''])[0],date:$('qpmDate').value,time:$('qpmTime').value,friends:sel,creator:user?.name||tr('guest'),t:Date.now()};
  activities.unshift(act);activities=activities.slice(0,30);
  localStorage.setItem('ao_activities',JSON.stringify(activities));
  addFeed({type:'plan',user:act.creator,place:act.place,placeId:pl?.id,t:Date.now()});
  $('qplanModal').classList.remove('on');
  renderSocial();
});

// ══ SOSIAL ══
function addFeed(item){const f=JSON.parse(localStorage.getItem('ao_feed')||'[]');f.unshift(item);localStorage.setItem('ao_feed',JSON.stringify(f.slice(0,50)));}
function renderSocial(){
  // Venner
  const allFr=[...FRIENDS_DEMO,...friends.filter(f=>!FRIENDS_DEMO.find(d=>d.name===f.name))];
  $('friendList').innerHTML=allFr.map(f=>{
    const isFr=friends.some(x=>x.name===f.name)||FRIENDS_DEMO.find(d=>d.name===f.name);
    return`<div class="friend-card">
      <div class="fav" style="background:${f.color||'#2563eb'}">${f.name[0]}</div>
      <div style="flex:1"><div style="font-weight:700;font-size:.8rem;color:var(--navy)">${f.name}</div>
        <div style="font-size:.64rem;color:var(--muted)">${f.pts||0} pt</div></div>
      <button class="fr-btn ok" onclick="inviteFr('${f.name}')">${tr('invite')}</button>
    </div>`;
  }).join('');
  // Feed
  const feed=JSON.parse(localStorage.getItem('ao_feed')||'[]');
  const allActs=[...activities.slice(0,5).map(a=>({type:'plan',user:a.creator,place:a.place,placeId:'',t:a.t})),...feed].sort((a,b)=>b.t-a.t).slice(0,20);
  $('feedList').innerHTML=allActs.length
    ?allActs.map(f=>{
      const t=new Date(f.t).toLocaleDateString(lang,{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      let txt='';
      if(f.type==='plan') txt=`<b>${f.user}</b> planlegger → <span class="fp" onclick="openPlace('${f.placeId||''}')">${f.place||''}</span>`;
      if(f.type==='visit') txt=`<b>${f.user}</b> besøkte <span class="fp">${f.place}</span>`;
      if(f.type==='rate') txt=`<b>${f.user}</b> ga <span class="fp">${f.place}</span> ${'⭐'.repeat(f.score||1)}`;
      return`<div class="feed-item"><div class="fav" style="background:#2563eb;width:28px;height:28px;font-size:.68rem">${(f.user||'?')[0]}</div><div><div class="feed-txt">${txt}</div><div class="feed-time">${t}</div></div></div>`;
    }).join('')
    :`<div style="padding:14px;color:var(--muted);font-size:.78rem">${tr('noFeed')}</div>`;
}
window.inviteFr=function(name){openQPlan(activePl);};

// ══ PROFIL ══
function renderProfile(){
  $('profAv').textContent=user?user.name[0].toUpperCase():'?';
  // Geo-toggle
  const geoState=localStorage.getItem('ao_geo_state');
  const geoOn=geoState==='granted'&&userPos!==null;
  if($('geoToggleLbl')) $('geoToggleLbl').textContent=tr('geoTitle');
  if($('geoToggleSub')) $('geoToggleSub').textContent=geoOn?tr('geoActive'):tr('geoInactive');
  if($('geoToggleBtn')){
    $('geoToggleBtn').textContent=geoOn?tr('geoTurnOff'):tr('geoTurnOn');
    $('geoToggleBtn').style.background=geoOn?'#fee2e2':'var(--aL)';
    $('geoToggleBtn').style.borderColor=geoOn?'#fca5a5':'#93c5fd';
    $('geoToggleBtn').style.color=geoOn?'var(--red)':'var(--accent)';
    $('geoToggleBtn').onclick=()=>{
      if(geoOn){clearMyPos();localStorage.removeItem('ao_geo_state');renderProfile();}
      else{localStorage.removeItem('ao_geo_state');showGeoConsent(()=>setTimeout(renderProfile,500));}
    };
  }
  $('profName').textContent=user?.name||tr('guest');
  $('profSub').textContent=user?.email||'';
  const cats=new Set(visited.flatMap(id=>{const p=PLACES.find(x=>x.id===id);return p?(p.activity_types||[]):[]}));
  $('profStats').innerHTML=`
    <div class="pst"><div class="pst-n">${visited.length}</div><div class="pst-l">${tr('visited_tab')}</div></div>
    <div class="pst"><div class="pst-n">${favorites.length}</div><div class="pst-l">${tr('fav_tab')}</div></div>
    <div class="pst"><div class="pst-n">${wantList.length}</div><div class="pst-l">${tr('want_tab')}</div></div>
    <div class="pst"><div class="pst-n">${streak}</div><div class="pst-l">${tr('streak')}</div></div>`;
  renderListTab();
}
function renderListTab(){
  let ids=[];
  if(listTab==='visited') ids=visited;
  else if(listTab==='fav') ids=favorites;
  else ids=wantList;
  $('listItems').innerHTML=ids.length
    ?ids.map(id=>{
      const p=PLACES.find(x=>x.id===id);if(!p) return '';
      const c0=(p.activity_types||['?'])[0];
      return`<div class="li-card" onclick="showSscr(null);openPlace('${id}')">
        <div style="font-size:1.1rem;flex-shrink:0;width:30px;height:30px;background:var(--sand);border-radius:8px;display:flex;align-items:center;justify-content:center">${ICO[c0]||'📍'}</div>
        <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:.82rem;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
        <div style="font-size:.65rem;color:var(--muted)">${trC(c0)} · ${p.municipality||''}</div></div>
      </div>`;
    }).join('')
    :`<div style="padding:24px;text-align:center;color:var(--muted);font-size:.8rem">${tr('emptyList')}</div>`;
}
document.querySelectorAll('.lt').forEach(lt=>lt.addEventListener('click',function(){
  listTab=this.dataset.t;
  document.querySelectorAll('.lt').forEach(x=>x.classList.remove('on'));
  this.classList.add('on');
  renderListTab();
}));

// ══ NAVIGASJON ══
function showSscr(id){
  document.querySelectorAll('.sscr').forEach(s=>s.classList.remove('on'));
  if(id) $(id).classList.add('on');
  ['bn0','bn1','bn2','bn3'].forEach(b=>$(b).classList.remove('on'));
  const bm={null:'bn0','scr-exp':'bn1','scr-social':'bn2','scr-profile':'bn3'};
  const bId=bm[id];if(bId)$(bId).classList.add('on');
  if(!id) hideSheet();
  if(id==='scr-exp'){buildExpFilters();renderExpList();}
  if(id==='scr-social'){renderSocial();}
  if(id==='scr-profile'){renderProfile();}
}
$('homeBtn').addEventListener('click',()=>{
  mapCat='all';buildFbar();renderMarkers();showSscr(null);hideSheet();
  apMap?.setView([59.913,10.740],12,{animate:true});
});
['expBack','socialBack','profileBack','loginBack'].forEach(id=>$(id)?.addEventListener('click',()=>showSscr(null)));
$('bnav').addEventListener('click',e=>{
  const bn=e.target.closest('.bn');if(!bn) return;
  const v=bn.dataset.v;
  if(v==='map') showSscr(null);
  else if(v==='exp') showSscr('scr-exp');
  else if(v==='social') showSscr('scr-social');
  else if(v==='profile') {if(!user&&!localStorage.getItem('ao_guest')) showSscr('scr-login'); else showSscr('scr-profile');}
});

// ══ LOGIN ══
['ltLogin','ltReg'].forEach(id=>$(id).addEventListener('click',function(){
  loginMode=this===('ltLogin')?'login':'register';
  loginMode=this.id==='ltLogin'?'login':'register';
  $('ltLogin').classList.toggle('on',loginMode==='login');
  $('ltReg').classList.toggle('on',loginMode==='register');
  $('lmName').style.display=loginMode==='register'?'block':'none';
  applyLang();
}));
$('lmGuest').addEventListener('click',()=>{user=null;localStorage.setItem('ao_guest','1');closeOnb();showSscr(null);});
$('lmSubmit').addEventListener('click',()=>{
  const email=$('lmEmail').value.trim();if(!email) return;
  const name=loginMode==='register'?($('lmName').value.trim()||email.split('@')[0]):email.split('@')[0];
  user={email,name,joined:Date.now()};localStorage.setItem('ao_user',JSON.stringify(user));
  localStorage.setItem('ao_guest','1');closeOnb();showSscr(null);renderProfile();
});

// ══ LANG ══
$('langBtn').addEventListener('click',()=>$('langModal').classList.add('on'));
$('langModal').addEventListener('click',e=>{if(e.target===$('langModal'))$('langModal').classList.remove('on');});
document.querySelectorAll('.li').forEach(li=>li.addEventListener('click',()=>{
  setLang(li.dataset.l);$('langModal').classList.remove('on');
}));

// ══ ONBOARDING ══
(()=>{const langs=[['no','🇳🇴'],['en','🇬🇧'],['de','🇩🇪'],['sv','🇸🇪'],['da','🇩🇰'],['fr','🇫🇷'],['pt','🇧🇷'],['es','🇪🇸'],['af','🇿🇦'],['zh','🇨🇳'],['ar','🇸🇦'],['he','🇮🇱'],['pl','🇵🇱'],['so','🇸🇴'],['ur','🇵🇰']];const el=$('onbLangs');langs.forEach(([l,f])=>{const b=document.createElement('button');b.className='lp';b.textContent=f;b.dataset.l=l;b.addEventListener('click',()=>setLang(l));el.appendChild(b);});})();
$('onbLogin').addEventListener('click',()=>{
  closeOnb();
  showSscr('scr-login');
});
// ── ONBOARDING ──
function closeOnb(){
  const onbEl=$('onb');
  if(onbEl) onbEl.style.display='none';
  localStorage.setItem('ao_guest','1');
  if(!localStorage.getItem('ao_geo_state')){
    setTimeout(()=>showGeoConsent(null),1200);
  }
}

$('onbGuest').addEventListener('click',closeOnb);

// Språkvelger inne i onboarding
if($('langToggle')){
  $('langToggle').addEventListener('click',()=>{
    const p=$('langPickerInline');
    p.style.display=p.style.display==='none'?'block':'none';
  });
  document.querySelectorAll('.lp-onb').forEach(b=>{
    b.classList.toggle('sel',b.dataset.l===lang);
    b.addEventListener('click',()=>{
      document.querySelectorAll('.lp-onb').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel');
      lang=b.dataset.l;
      localStorage.setItem('ao_lang',lang);
      applyLang();
      $('langPickerInline').style.display='none';
    });
  });
}

// ══ INIT ══
applyLang();
initMap();
// Fjern splash
const _sp=document.getElementById('splash');
if(_sp){setTimeout(()=>{_sp.style.opacity='0';_sp.style.transition='opacity .3s';setTimeout(()=>_sp.remove(),300);},400);}
addMyPosControl();

// ── GEO CONSENT SHEET ──
function showGeoConsent(onAllow){
  const ov=$('geoOv'), sh=$('geoSheet');
  if(!ov||!sh) return;
  // Tekst
  if($('geoSheetTitle')) $('geoSheetTitle').textContent=tr('geoTitle');
  if($('geoSheetBody'))  $('geoSheetBody').textContent=tr('geoBody');
  if($('geoAllowBtn'))   $('geoAllowBtn').textContent=tr('geoAllow');
  if($('geoLaterBtn'))   $('geoLaterBtn').textContent=tr('geoLater');
  if($('geoNeverBtn'))   $('geoNeverBtn').textContent=tr('geoNever');
  // Vis
  ov.style.display='block';
  sh.style.display='block';
  function close(){ov.style.display='none';sh.style.display='none';}
  $('geoAllowBtn').onclick=()=>{
    close();
    startGeo(pos=>{
      if(!pos) return;
      if(apMap) apMap.setView([pos.lat,pos.lng],13,{animate:true,duration:.4});
      showGeoToast(tr('geoOk'),true);
      if(onAllow) onAllow(pos);
    });
  };
  $('geoLaterBtn').onclick=()=>close();
  $('geoNeverBtn').onclick=()=>{localStorage.setItem('ao_geo_state','denied');close();};
  ov.onclick=()=>close();
}

// ── "MIN POSISJON"-knapp på kartet ──
function addMyPosControl(){
  if(!apMap||document.getElementById('myPosBtn')) return;
  const btn=document.createElement('button');
  btn.id='myPosBtn';
  btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/><circle cx="12" cy="12" r="8" stroke-opacity=".3"/></svg>';
  btn.title='Min posisjon';
  btn.style.cssText='position:absolute;bottom:calc(var(--bnav)+env(safe-area-inset-bottom)+70px);right:12px;z-index:50;width:42px;height:42px;border-radius:50%;background:#fff;border:none;box-shadow:0 2px 12px rgba(0,0,0,.18);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--accent);touch-action:manipulation';
  btn.addEventListener('click',()=>{
    if(localStorage.getItem('ao_geo_state')==='denied'){
      // Tilby å reaktivere
      localStorage.removeItem('ao_geo_state');
      showGeoConsent(null); return;
    }
    if(userPos){
      apMap.setView([userPos.lat,userPos.lng],15,{animate:true,duration:.4});
      return;
    }
    if(localStorage.getItem('ao_geo_state')==='granted'){
      startGeo(pos=>{if(pos) apMap.setView([pos.lat,pos.lng],14,{animate:true});});
    } else {
      showGeoConsent(null);
    }
  });
  apMap.getContainer().appendChild(btn);
}

// Første gang: vis consent-sheet etter 2 sek
if(!localStorage.getItem('ao_geo_state')){
  setTimeout(()=>showGeoConsent(null),2000);
}
buildExpFilters();
if(user||localStorage.getItem('ao_guest')==='1') $('onb').style.display='none';

// ══ GEOLOKASJON ══
let geoWatcher=null;
let myPosMarker=null;

function showGeoToast(msg,isOk){
  const old=document.getElementById('_gt');if(old)old.remove();
  const t=document.createElement('div');t.id='_gt';
  t.style.cssText=`position:fixed;bottom:calc(var(--bnav) + env(safe-area-inset-bottom) + 14px);left:50%;transform:translateX(-50%);background:${isOk?'#16a34a':'#1a2b4a'};color:#fff;padding:10px 18px;border-radius:22px;font-size:.77rem;font-weight:700;z-index:9999;white-space:nowrap;box-shadow:0 4px 18px rgba(0,0,0,.22);pointer-events:none;transition:opacity .4s`;
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),400);},2800);
}

function drawMyPos(lat,lng,acc){
  if(!apMap) return;
  // Ytre nøyaktighetssirkel
  if(window._accCircle) window._accCircle.remove();
  if(acc && acc < 500){
    window._accCircle=L.circle([lat,lng],{radius:acc,color:'#2563eb',fillColor:'#2563eb',fillOpacity:.08,weight:1,dashArray:'4'}).addTo(apMap);
  }
  // Blå prikk
  if(myPosMarker) myPosMarker.remove();
  myPosMarker=L.circleMarker([lat,lng],{
    radius:10,fillColor:'#2563eb',fillOpacity:1,
    color:'#fff',weight:3,
    className:'my-pos-marker'
  }).addTo(apMap).bindTooltip('Du er her',{permanent:false,direction:'top',offset:[0,-8]});
}

function applyUserPos(pos){
  userPos={lat:pos.coords.latitude,lng:pos.coords.longitude,acc:pos.coords.accuracy};
  drawMyPos(userPos.lat,userPos.lng,userPos.acc);
  renderExpList();
}

function clearMyPos(){
  if(myPosMarker){myPosMarker.remove();myPosMarker=null;}
  if(window._accCircle){window._accCircle.remove();window._accCircle=null;}
  if(geoWatcher){navigator.geolocation.clearWatch(geoWatcher);geoWatcher=null;}
  userPos=null;
  renderExpList();
}

function startGeo(onDone){
  if(!navigator.geolocation){showGeoToast(tr('noGeo'),false);if(onDone)onDone(null);return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    localStorage.setItem('ao_geo_state','granted');
    applyUserPos(pos);
    if(onDone) onDone(userPos);
    if(geoWatcher) navigator.geolocation.clearWatch(geoWatcher);
    geoWatcher=navigator.geolocation.watchPosition(applyUserPos,
      ()=>{},
      {enableHighAccuracy:false,timeout:30000,maximumAge:45000});
  },err=>{
    if(err.code===1){localStorage.setItem('ao_geo_state','denied');showGeoToast(tr('geoDenied'),false);}
    else showGeoToast(tr('geoError'),false);
    if(onDone) onDone(null);
  },{enableHighAccuracy:true,timeout:12000,maximumAge:30000});
}

// Auto-start hvis tillatelse allerede er gitt
if(localStorage.getItem('ao_geo_state')==='granted') startGeo(null);


</script>
