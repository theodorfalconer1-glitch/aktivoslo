<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2b4a;
  --accent:#2563eb;
  --green:#16a34a;
  --sand:#f8f7f4;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
  --radius:12px;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--sand);color:var(--text);-webkit-tap-highlight-color:transparent}

/* ── APP SHELL ── */
#app{
  display:flex;
  flex-direction:column;
  height:100dvh;
  height:100vh; /* fallback */
  overflow:hidden;
}

/* ── HEADER ── */
#header{
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:12px 16px 8px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  gap:8px;
}
.logo{font-weight:900;font-size:1.1rem;color:var(--navy);flex:1}
.search-box{
  display:flex;align-items:center;gap:6px;
  background:var(--sand);border:1px solid var(--border);
  border-radius:20px;padding:6px 12px;flex:2;
}
.search-box input{border:none;background:none;outline:none;font-size:.9rem;width:100%}

/* ── TAB-BAR TOPP ── */
#tabs{
  display:flex;
  background:#fff;
  border-bottom:2px solid var(--border);
  flex-shrink:0;
}
.tab{
  flex:1;padding:10px 4px;text-align:center;font-size:.8rem;font-weight:700;
  color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;
  margin-bottom:-2px;touch-action:manipulation;
}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── CONTENT ── */
#content{
  flex:1;
  overflow:hidden;
  position:relative;
}

/* ── VIEWS ── */
/* Alle views fyller #content */
.view{
  display:none;
  position:absolute;
  inset:0;
}
.view.active{display:flex;flex-direction:column}

/* ── LISTE VIEW ── */
#listView{
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

/* HERO */
.hero{
  background:#fff;
  padding:18px 16px 14px;
  border-bottom:1px solid var(--border);
}
.hero h1{font-size:1.4rem;font-weight:900;color:var(--navy);margin-bottom:4px}
.hero p{font-size:.85rem;color:var(--muted)}
.quick-cats{
  display:flex;gap:8px;overflow-x:auto;padding:12px 0 4px;
  scrollbar-width:none;
}
.quick-cats::-webkit-scrollbar{display:none}
.qcat{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:var(--sand);border:1px solid var(--border);border-radius:12px;
  padding:10px 12px;cursor:pointer;flex-shrink:0;min-width:64px;
  touch-action:manipulation;transition:background .1s;
}
.qcat:active{background:#dbeafe}
.qcat-ico{font-size:1.4rem}
.qcat-lbl{font-size:.65rem;font-weight:700;color:var(--navy);white-space:nowrap}

/* FILTER-BAR */
.filter-bar{
  background:#fff;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:20;
}
.cat-row{
  display:flex;gap:6px;overflow-x:auto;padding:8px 12px;
  scrollbar-width:none;
}
.cat-row::-webkit-scrollbar{display:none}
.cat-btn{
  flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border);
  background:#fff;font-size:.78rem;font-weight:600;cursor:pointer;color:var(--muted);
  touch-action:manipulation;white-space:nowrap;
}
.cat-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* SORT-ROW */
.sort-row{
  display:flex;gap:6px;padding:6px 12px 8px;overflow-x:auto;
  scrollbar-width:none;
}
.sort-row::-webkit-scrollbar{display:none}
.sort-btn{
  flex-shrink:0;padding:4px 10px;border-radius:20px;border:1px solid var(--border);
  background:#fff;font-size:.72rem;font-weight:600;cursor:pointer;color:var(--muted);
  touch-action:manipulation;
}
.sort-btn.on{background:var(--navy);color:#fff;border-color:var(--navy)}

/* RESULT-COUNT */
.result-count{
  padding:8px 14px 4px;font-size:.78rem;color:var(--muted);font-weight:600;
}

/* CARDS GRID */
.cards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:8px 10px 100px;
}
@media(min-width:500px){.cards{grid-template-columns:repeat(3,1fr)}}

/* CARD */
.card{
  background:#fff;border-radius:var(--radius);padding:14px 12px;
  border:1px solid var(--border);cursor:pointer;
  touch-action:manipulation;user-select:none;
  transition:background .1s, transform .1s;
  -webkit-tap-highlight-color:transparent;
}
.card:active{background:#eff6ff;transform:scale(.97)}
.card-emoji{font-size:1.6rem;margin-bottom:6px}
.card-name{font-size:.85rem;font-weight:800;color:var(--text);margin-bottom:3px;line-height:1.2}
.card-sub{font-size:.72rem;color:var(--muted);margin-bottom:6px}
.card-tags{display:flex;flex-wrap:wrap;gap:3px}
.ctag{font-size:.65rem;background:#f0f4ff;color:var(--accent);padding:2px 6px;border-radius:8px;font-weight:600}
.badge-free{font-size:.65rem;background:#f0fdf4;color:var(--green);padding:2px 6px;border-radius:8px;font-weight:700}
.score-tag{font-size:.65rem;background:#fefce8;color:#92400e;padding:2px 6px;border-radius:8px;font-weight:600}

/* ── KART VIEW ── */
#mapView{overflow:hidden;position:relative;flex:1}
#map{position:absolute;inset:0;}
.map-cat-row{
  position:absolute;top:8px;left:8px;right:8px;z-index:500;
  display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.map-cat-row::-webkit-scrollbar{display:none}
.mcat-btn{
  flex-shrink:0;padding:5px 12px;border-radius:20px;
  background:#fff;border:1px solid var(--border);font-size:.76rem;font-weight:700;
  cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.15);touch-action:manipulation;
}
.mcat-btn.on{background:var(--accent);color:#fff}

/* ── MODAL ── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);z-index:1000;
  align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal{
  background:#fff;border-radius:20px 20px 0 0;
  width:100%;max-width:540px;
  max-height:88vh;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:20px 18px 40px;position:relative;
}
.modal-handle{
  width:36px;height:4px;background:#e5e7eb;
  border-radius:4px;margin:0 auto 16px;
}
.modal-close{
  position:absolute;top:14px;right:14px;
  width:30px;height:30px;border-radius:50%;border:none;
  background:var(--sand);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  touch-action:manipulation;
}
.modal-emoji{font-size:2.4rem;margin-bottom:8px}
.modal-name{font-size:1.3rem;font-weight:900;color:var(--navy);margin-bottom:4px}
.modal-loc{font-size:.8rem;color:var(--muted);margin-bottom:10px}
.modal-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.modal-desc{font-size:.88rem;line-height:1.55;color:var(--text);margin-bottom:14px}
.info-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:.83rem}
.ir-l{color:var(--muted);font-weight:600}
.ir-v{color:var(--text);font-weight:500;text-align:right;max-width:60%}
.nav-btns{display:flex;gap:8px;margin-top:16px}
.nav-btn-maps{
  flex:1;padding:12px 8px;border-radius:10px;text-decoration:none;
  font-weight:800;font-size:.85rem;text-align:center;display:block;
  touch-action:manipulation;
}
.btn-google{background:#34a853;color:#fff}
.btn-apple{background:#000;color:#fff}
.mark-btn{
  display:block;width:100%;margin-top:10px;padding:12px;
  border-radius:10px;border:2px solid var(--border);background:#fff;
  font-size:.88rem;font-weight:700;cursor:pointer;touch-action:manipulation;
}
.mark-btn.done{border-color:var(--green);color:var(--green)}

/* ── NAV ── */
#nav{
  display:flex;background:#fff;
  border-top:1px solid var(--border);
  padding-bottom:env(safe-area-inset-bottom);
  flex-shrink:0;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:2px;padding:8px 4px;cursor:pointer;color:var(--muted);
  font-size:.62rem;font-weight:700;border:none;background:none;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
}
.nav-item.on{color:var(--accent)}
.nav-icon{font-size:1.3rem}

/* ── EMPTY STATE ── */
.empty{
  grid-column:1/-1;padding:40px 20px;text-align:center;color:var(--muted);font-size:.9rem;
}
</style>
</head>

<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div class="logo">🏃 AktivOslo</div>
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="searchQ" placeholder="Søk sted eller aktivitet…" oninput="renderList()">
    </div>
  </div>

  <!-- TABS -->
  <div id="tabs">
    <div class="tab active" id="tabListe" onclick="switchView('liste')">📋 Liste</div>
    <div class="tab" id="tabKart" onclick="switchView('kart')">🗺️ Kart</div>
  </div>

  <!-- CONTENT -->
  <div id="content">

    <!-- LISTE VIEW -->
    <div id="listView" class="view active">

      <!-- HERO -->
      <div class="hero">
        <h1>Hva vil du finne på?</h1>
        <p id="heroSub">243 aktivitetssteder i Oslo, Asker og Bærum</p>
        <div class="quick-cats" id="quickCats"></div>
      </div>

      <!-- FILTER -->
      <div class="filter-bar">
        <div class="cat-row" id="catRow"></div>
        <div class="sort-row">
          <button class="sort-btn on" id="sortBest" onclick="setSort('score')">⭐ Best rangert</button>
          <button class="sort-btn" id="sortNear" onclick="setSort('distance')">📍 Nærmest</button>
          <button class="sort-btn" id="sortFree" onclick="toggleFreeFilter(this)">🆓 Gratis</button>
        </div>
      </div>

      <!-- RESULT COUNT -->
      <div class="result-count" id="resultCount"></div>

      <!-- CARDS -->
      <div class="cards" id="cards"></div>

    </div>

    <!-- KART VIEW -->
    <div id="mapView" class="view">
      <div class="map-cat-row" id="mapCatRow"></div>
      <div id="map"></div>
    </div>

  </div><!-- /content -->

  <!-- NAV -->
  <div id="nav">
    <button class="nav-item on" id="navListe" onclick="switchView('liste')">
      <div class="nav-icon">📋</div>Liste
    </button>
    <button class="nav-item" id="navKart" onclick="switchView('kart')">
      <div class="nav-icon">🗺️</div>Kart
    </button>
  </div>

</div><!-- /app -->

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

// ── HELPERS ───────────────────────────────────────────────────────────────
function pEmoji(p){
  const t=(p.activity_types||[])[0];
  const map={bading:'🏊',badstue:'🧖',tuftpark:'💪',bordtennis:'🏓',
    tennisbane:'🎾',basketballbane:'🏀',volleyballbane:'🏐',fotballbane:'⚽',
    padelbane:'🏸',skatepark:'🛹',discgolf:'🥏',løperute:'🏃',skiløype:'⛷️',
    skøytebane:'⛸️',klatring:'🧗',kajakkutleie:'🚣',øy:'🏝️',park:'🌳',museum:'🏛️'};
  return map[t]||'📍';
}

function catLabel(id){
  const c=CATS.find(x=>x.id===id);
  return c?c.l:id;
}

function haversine(la1,ln1,la2,ln2){
  const R=6371000,dLa=(la2-la1)*Math.PI/180,dLn=(ln2-ln1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLn/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function ls(key, val){
  if(val===undefined) return localStorage.getItem(key);
  localStorage.setItem(key, typeof val==='string'?val:JSON.stringify(val));
}

let currentView = 'liste';

function switchView(v){
  currentView = v;

  // Views
  document.getElementById('listView').classList.toggle('active', v==='liste');
  document.getElementById('mapView').classList.toggle('active', v==='kart');

  // Tabs
  document.getElementById('tabListe').classList.toggle('active', v==='liste');
  document.getElementById('tabKart').classList.toggle('active', v==='kart');

  // Nav
  document.getElementById('navListe').classList.toggle('on', v==='liste');
  document.getElementById('navKart').classList.toggle('on', v==='kart');

  if(v==='kart'){
    if(!leafletMap){
      setTimeout(()=>{ initMap(); if(leafletMap) leafletMap.invalidateSize(true); },50);
    } else {
      setTimeout(()=>{ leafletMap.invalidateSize(true); renderMap(); },100);
    }
  }
}

function buildFilters(){
  const cr = document.getElementById('catRow');
  cr.innerHTML = CATS.map(c=>`
    <button class="cat-btn${c.id===activeCat?' on':''}" onclick="pickCat('${c.id}')">${c.l}</button>
  `).join('');

  const qc = document.getElementById('quickCats');
  qc.innerHTML = QUICK_CATS.map(q=>`
    <div class="qcat" onclick="pickCat('${q.id}')">
      <div class="qcat-ico">${q.ico}</div>
      <div class="qcat-lbl">${q.lbl}</div>
    </div>
  `).join('');
}

function pickCat(cat){
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>{
    b.classList.toggle('on', b.textContent.trim()===(CATS.find(c=>c.id===cat)||{l:cat}).l);
  });
  document.getElementById('listView').scrollTop = 0;
  renderList();
}

function setSort(mode){
  sortMode = mode;
  document.getElementById('sortBest').classList.toggle('on', mode==='score');
  document.getElementById('sortNear').classList.toggle('on', mode==='distance');
  renderList();
}

function toggleFreeFilter(btn){
  freeOnly = !freeOnly;
  btn.classList.toggle('on', freeOnly);
  renderList();
}

// ── RENDER LISTE ──────────────────────────────────────────────────────────
function renderList(){
  const q = (document.getElementById('searchQ').value||'').toLowerCase().trim();

  let res = PLACES.filter(p=>{
    if(p.status && p.status==='closed') return false;
    if(activeCat!=='all' && (p.activity_types||[])[0]!==activeCat) return false;
    if(freeOnly && !p.is_free) return false;
    if(q){
      const hay=[p.name,p.description||'',p.neighborhood||'',p.municipality||'',
        ...(p.activity_types||[])].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  if(userLat && userLng){
    res.forEach(p=>{
      p._dist=(p.lat&&p.lng)?haversine(userLat,userLng,p.lat,p.lng):999999;
    });
  }

  if(sortMode==='score') res.sort((a,b)=>(b.score_total||0)-(a.score_total||0));
  else if(sortMode==='distance') res.sort((a,b)=>(a._dist||999999)-(b._dist||999999));

  const cards = document.getElementById('cards');
  document.getElementById('resultCount').textContent = res.length+' steder';

  if(!res.length){
    cards.innerHTML='<div class="empty">Ingen steder funnet 🤷</div>';
    return;
  }

  cards.innerHTML = res.map(p=>{
    const dist = (p._dist&&p._dist<999999)
      ? `<span class="score-tag">${p._dist<1000?Math.round(p._dist)+'m':(p._dist/1000).toFixed(1)+'km'}</span>`:'';
    return `<div class="card" data-id="${p.id}">
      <div class="card-emoji">${pEmoji(p)}</div>
      <div class="card-name">${p.name}</div>
      <div class="card-sub">📍 ${p.neighborhood||p.municipality||'Oslo'}</div>
      <div class="card-tags">
        ${p.is_free?'<span class="badge-free">Gratis</span>':''}
        ${p.score_total?`<span class="score-tag">⭐ ${p.score_total}</span>`:''}
        ${dist}
      </div>
    </div>`;
  }).join('');
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal(id){
  const p = PLACES.find(x=>x.id===id);
  if(!p) return;

  const isVisited = visited.includes(id);
  const isFav = favs.includes(id);

  const infoRows = [
    ['Adresse', p.address],
    ['Transport', p.public_transport?(p.transport_details||'Tilgjengelig'):null],
    ['Parkering', p.parking?'Ja':null],
    ['Toalett', p.toilet?'Ja':null],
    ['Hund OK', p.dog_friendly?'Ja':null],
    ['Familie', p.family_friendly?'Ja':null],
    ['Sesong', (p.seasons||[]).join(', ')||null],
  ].filter(([,v])=>v).map(([l,v])=>`
    <div class="info-row"><span class="ir-l">${l}</span><span class="ir-v">${v}</span></div>
  `).join('');

  const gMapsUrl = (p.lat&&p.lng)
    ? `https://www.google.com/maps?q=${p.lat},${p.lng}&z=17`
    : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name+' Oslo')}`;
  const aMapsUrl = (p.lat&&p.lng)
    ? `https://maps.apple.com/?ll=${p.lat},${p.lng}&q=${encodeURIComponent(p.name)}&z=17`
    : null;

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-emoji">${pEmoji(p)}</div>
    <div class="modal-name">${p.name}</div>
    <div class="modal-loc">📍 ${p.address||p.neighborhood||p.municipality||'Oslo'}</div>
    <div class="modal-badges">
      ${p.is_free?'<span class="badge-free">🆓 Gratis</span>':''}
      ${p.score_total?`<span class="score-tag">⭐ ${p.score_total}/100</span>`:''}
      ${isVisited?'<span class="badge-free">✓ Besøkt</span>':''}
    </div>
    <p class="modal-desc">${p.description||''}</p>
    ${infoRows}
    <div class="nav-btns">
      <a href="${gMapsUrl}" target="_blank" class="nav-btn-maps btn-google">🗺️ Google Maps</a>
      ${aMapsUrl?`<a href="${aMapsUrl}" target="_blank" class="nav-btn-maps btn-apple">🍎 Apple Maps</a>`:''}
    </div>
    <button class="mark-btn${isVisited?' done':''}" onclick="toggleVisited('${id}',this)">
      ${isVisited?'✓ Besøkt':'📍 Marker som besøkt'}
    </button>
    <button class="mark-btn${isFav?' done':''}" style="margin-top:8px" onclick="toggleFav('${id}',this)">
      ${isFav?'❤️ Lagret':'🤍 Lagre som favoritt'}
    </button>
    ${p.booking_url?`<a href="${p.booking_url}" target="_blank" class="nav-btn-maps btn-google" style="margin-top:10px;display:block">📅 Book plass</a>`:''}
  `;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function toggleVisited(id, btn){
  const idx = visited.indexOf(id);
  if(idx>-1) visited.splice(idx,1); else visited.push(id);
  ls('visited', visited);
  btn.className = 'mark-btn'+(visited.includes(id)?' done':'');
  btn.textContent = visited.includes(id)?'✓ Besøkt':'📍 Marker som besøkt';
}

function toggleFav(id, btn){
  const idx = favs.indexOf(id);
  if(idx>-1) favs.splice(idx,1); else favs.push(id);
  ls('favs', favs);
  btn.className = 'mark-btn'+(favs.includes(id)?' done':'');
  btn.textContent = favs.includes(id)?'❤️ Lagret':'🤍 Lagre som favoritt';
}

  buildMapCatRow();

  setTimeout(()=>leafletMap.invalidateSize(true),300);
}

function getMarkerIcon(type){
  const color = CAT_COLORS[type]||'#6b7280';
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='28' height='38' viewBox='0 0 28 38'>
    <path d='M14 0C6.3 0 0 6.3 0 14c0 10.5 14 24 14 24S28 24.5 28 14C28 6.3 21.7 0 14 0z' fill='${color}' opacity='0.95'/>
    <circle cx='14' cy='14' r='7' fill='white' opacity='0.9'/>
  </svg>`;
  return L.divIcon({
    html: svg, iconSize:[28,38], iconAnchor:[14,38], popupAnchor:[0,-38],
    className:''
  });
}

function renderMap(){
  if(!leafletMap) return;
  markers.forEach(m=>m.remove());
  markers=[];

  const filtered = PLACES.filter(p=>{
    if(!p.lat||!p.lng) return false;
    if(activeCat!=='all' && (p.activity_types||[])[0]!==activeCat) return false;
    return true;
  });

  filtered.forEach(p=>{
    const type = (p.activity_types||[])[0];
    const icon = getMarkerIcon(type);
    const m = L.marker([p.lat,p.lng],{icon})
      .addTo(leafletMap)
      .bindPopup(`<b>${p.name}</b><br><small>${p.address||p.neighborhood||''}</small><br>
        <button onclick="openModal('${p.id}')" style="margin-top:6px;padding:4px 10px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.8rem">Se detaljer</button>`,
        {maxWidth:200}
      );
    markers.push(m);
  });
}

function buildMapCatRow(){
  const row = document.getElementById('mapCatRow');
  if(!row) return;
  row.innerHTML = CATS.slice(0,12).map(c=>`
    <button class="mcat-btn${c.id===activeCat?' on':''}" onclick="mapPickCat('${c.id}')">${c.l}</button>
  `).join('');
}

function mapPickCat(cat){
  activeCat = cat;
  document.querySelectorAll('.mcat-btn').forEach(b=>{
    b.classList.toggle('on', b.dataset && false); // reset
  });
  buildMapCatRow();
  renderMap();
}

// ── GPS ───────────────────────────────────────────────────────────────────
function tryGPS(){
  if(!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    if(sortMode==='distance') renderList();
    if(leafletMap){
      L.circleMarker([userLat,userLng],{radius:8,color:'#2563eb',fillColor:'#2563eb',fillOpacity:.8})
        .addTo(leafletMap).bindPopup('Du er her');
    }
  }, ()=>{}, {timeout:8000,maximumAge:60000});
}

// ── INIT ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', ()=>{
  buildFilters();
  renderList();
  tryGPS();

  // Event delegation — kort klikk
  document.getElementById('cards').addEventListener('click', e=>{
    const card = e.target.closest('[data-id]');
    if(card) openModal(card.dataset.id);
  });
});
</script>
</body>
