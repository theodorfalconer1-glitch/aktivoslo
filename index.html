<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AktivOslo — Finn aktiviteter nær deg</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
header{background:#1a1a2e;color:#fff;padding:12px 16px;flex-shrink:0;z-index:100}
.header-row{display:flex;align-items:center;justify-content:space-between}
header h1{font-size:1.25rem;font-weight:700}
header p{font-size:.72rem;opacity:.55;margin-top:1px}
.view-toggle{display:flex;background:rgba(255,255,255,.15);border-radius:20px;padding:3px;gap:2px}
.view-btn{padding:5px 14px;border-radius:18px;border:none;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:rgba(255,255,255,.7)}
.view-btn.active{background:#fff;color:#1a1a2e}

/* ---- SHARED TOP ---- */
.top-bar{flex-shrink:0;background:#fff;border-bottom:1px solid #e8e8e0}
.search-wrap{padding:9px 14px}
.search-wrap input{width:100%;padding:9px 13px;border:1.5px solid #ddd;border-radius:10px;font-size:.9rem;outline:none}
.search-wrap input:focus{border-color:#1a1a2e}
.filters{display:flex;gap:6px;padding:7px 14px;overflow-x:auto;border-top:1px solid #f0f0f0;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-btn{white-space:nowrap;padding:5px 12px;border-radius:18px;border:1.5px solid #ddd;background:#fff;font-size:.76rem;cursor:pointer;font-weight:500;transition:all .15s}
.filter-btn.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.sub-filters{display:flex;gap:5px;padding:6px 14px;overflow-x:auto;border-top:1px solid #f0f0f0;scrollbar-width:none;background:#fafaf8}
.sub-filters::-webkit-scrollbar{display:none}
.sub-btn{white-space:nowrap;padding:4px 10px;border-radius:14px;border:1px solid #ddd;background:#fff;font-size:.73rem;cursor:pointer;transition:all .15s}
.sub-btn.active{background:#2563eb;color:#fff;border-color:#2563eb}

/* ---- LIST VIEW ---- */
#listView{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.results-info{padding:7px 14px;font-size:.75rem;color:#666;background:#fafaf8;border-bottom:1px solid #e8e8e0;flex-shrink:0}
.cards{padding:10px 14px;display:grid;gap:10px;padding-bottom:20px}
.card{background:#fff;border-radius:13px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;border:1px solid #eee;transition:transform .12s}
.card:active{transform:scale(.98)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-name{font-size:.95rem;font-weight:600;line-height:1.3}
.badge-free{background:#e8f5e9;color:#2e7d32;font-size:.67rem;padding:3px 8px;border-radius:9px;font-weight:600;white-space:nowrap;flex-shrink:0}
.badge-paid{background:#fff3e0;color:#e65100;font-size:.67rem;padding:3px 8px;border-radius:9px;font-weight:600;white-space:nowrap;flex-shrink:0}
.card-area{font-size:.73rem;color:#999;margin-top:2px}
.card-desc{font-size:.81rem;color:#555;margin-top:7px;line-height:1.5}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tag{background:#f0f0eb;color:#555;font-size:.69rem;padding:2px 7px;border-radius:7px}
.tag.type{background:#e8eef7;color:#1a3a6e;font-weight:500}
.card-footer{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.icon-info{font-size:.7rem;color:#999}
.feat-badge{display:inline-block;background:#fff9c4;color:#795548;font-size:.65rem;padding:2px 6px;border-radius:7px;font-weight:600;margin-bottom:4px}
.no-results{text-align:center;padding:50px 20px;color:#bbb}
.no-results span{font-size:2rem;display:block;margin-bottom:10px}

/* ---- MAP VIEW ---- */
#mapView{flex:1;display:none;flex-direction:column}
#map{flex:1}
#mapBottomSheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:18px 18px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.15);z-index:1000;transform:translateY(100%);transition:transform .3s ease;max-height:60dvh;overflow-y:auto}
#mapBottomSheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 8px}
.sheet-content{padding:0 18px 24px}
.sheet-close{float:right;font-size:1.3rem;color:#aaa;cursor:pointer;margin-top:-4px}
.sheet-name{font-size:1.05rem;font-weight:700;margin-bottom:2px;padding-right:24px}
.sheet-area{font-size:.78rem;color:#999;margin-bottom:10px}
.sheet-desc{font-size:.84rem;color:#444;line-height:1.55;margin-bottom:12px}
.sheet-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.sheet-icons{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.sheet-icon{font-size:.78rem;color:#666}
.sheet-book{display:block;background:#1a1a2e;color:#fff;text-align:center;padding:11px;border-radius:11px;text-decoration:none;font-weight:600;font-size:.88rem}
.map-count{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(26,26,46,.85);color:#fff;padding:5px 14px;border-radius:20px;font-size:.75rem;font-weight:600;z-index:500;pointer-events:none}

/* ---- MODAL ---- */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;overflow-y:auto;padding:16px}
.modal{background:#fff;border-radius:18px;padding:22px;max-width:540px;margin:0 auto;position:relative}
.modal h2{font-size:1.2rem;font-weight:700;margin-bottom:3px;padding-right:28px}
.modal .m-area{color:#888;font-size:.8rem;margin-bottom:10px}
.modal .m-desc{font-size:.86rem;line-height:1.6;margin-bottom:12px;color:#333}
.modal-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:.82rem}
.modal-row:last-child{border-bottom:none}
.m-label{color:#aaa;width:115px;flex-shrink:0}
.m-val{color:#1a1a1a;font-weight:500;flex:1}
.close-btn{position:absolute;top:16px;right:16px;font-size:1.3rem;cursor:pointer;color:#bbb;background:none;border:none;line-height:1}
.modal-tags{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0 12px}
.btn-book{display:block;background:#1a1a2e;color:#fff;text-align:center;padding:12px;border-radius:11px;text-decoration:none;font-weight:600;margin-top:14px;font-size:.9rem}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <h1>🏃 AktivOslo</h1>
      <p>Oslo, Asker og Bærum · 146 steder</p>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="btnList" onclick="switchView('list')">📋 Liste</button>
      <button class="view-btn" id="btnMap" onclick="switchView('map')">🗺️ Kart</button>
    </div>
  </div>
</header>

<div class="top-bar">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="🔍 Søk sted, bydel, aktivitet..." oninput="applyFilters()">
  </div>
  <div class="filters" id="catFilters"></div>
  <div class="sub-filters" id="areaFilters"></div>
</div>

<!-- LIST VIEW -->
<div id="listView">
  <div class="results-info" id="resultsInfo"></div>
  <div class="cards" id="cards"></div>
</div>

<!-- MAP VIEW -->
<div id="mapView">
  <div style="position:relative;flex:1;display:flex;flex-direction:column">
    <div id="map"></div>
    <div class="map-count" id="mapCount"></div>
  </div>
  <div id="mapBottomSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-content" id="sheetContent"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

const CATEGORIES = [
  {id:'all',label:'🗺️ Alle'},
  {id:'badested',label:'🏊 Bading'},
  {id:'badstue',label:'🧖 Badstue'},
  {id:'elvebad',label:'🏞️ Elvebad'},
  {id:'tuftpark',label:'💪 Tuftepark'},
  {id:'tennisbane',label:'🎾 Tennis'},
  {id:'padelbane',label:'🏓 Padel'},
  {id:'fotballbane',label:'⚽ Fotball'},
  {id:'basketballbane',label:'🏀 Basket'},
  {id:'volleyballbane',label:'🏐 Volleyball'},
  {id:'skatepark',label:'🛹 Skate'},
  {id:'klatring',label:'🧗 Klatring'},
  {id:'discgolf',label:'🥏 Discgolf'},
  {id:'løperute',label:'🏃 Løping'},
  {id:'tur',label:'🥾 Tur'},
  {id:'skiløype',label:'⛷️ Ski'},
  {id:'skøytebane',label:'⛸️ Skøyter'},
  {id:'golf',label:'⛳ Golf'},
  {id:'kajakkutleie',label:'🚣 Kajakk'},
  {id:'badminton',label:'🏸 Badminton'},
  {id:'bordtennis',label:'🏓 Bordtennis'},
  {id:'sykling',label:'🚴 Sykling'},
  {id:'yoga',label:'🧘 Yoga'},
  {id:'øy',label:'🏝️ Øyer'},
];

const AREAS = ['Alle','Sentrum','Vest','Nord','Sørøst','Øst','Bærum','Asker'];

let activeCat = 'all', activeArea = 'Alle', freeOnly = false;
let currentView = 'list';
let leafletMap = null, markers = [], filtered = [];

// ---- FILTER LOGIC ----
function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  return PLACES.filter(p => {
    if (activeCat !== 'all' && !p.activity_types.includes(activeCat)) return false;
    if (activeArea !== 'Alle' && p.area !== activeArea) return false;
    if (freeOnly && !p.is_free) return false;
    if (q) {
      const hay = [p.name, p.description, p.neighborhood||'', p.municipality, ...(p.best_for_tags||[]), ...(p.activity_types||[])].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  }).sort((a,b) => (b.featured?1:0)-(a.featured?1:0) || a.name.localeCompare(b.name,'no'));
}

function applyFilters() {
  filtered = getFiltered();
  if (currentView === 'list') renderList();
  else renderMap();
}

// ---- BUILD FILTER UI ----
function buildFilters() {
  const cf = document.getElementById('catFilters');
  CATEGORIES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (c.id===activeCat?' active':'');
    btn.textContent = c.label;
    btn.onclick = () => { activeCat=c.id; cf.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); applyFilters(); };
    cf.appendChild(btn);
  });
  const af = document.getElementById('areaFilters');
  const ft = document.createElement('button');
  ft.className = 'sub-btn'+(freeOnly?' active':'');
  ft.textContent = '✅ Kun gratis';
  ft.onclick = () => { freeOnly=!freeOnly; ft.classList.toggle('active'); applyFilters(); };
  af.appendChild(ft);
  AREAS.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'sub-btn'+(a===activeArea?' active':'');
    btn.textContent = a;
    btn.onclick = () => { activeArea=a; af.querySelectorAll('.sub-btn:not(:first-child)').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); applyFilters(); };
    af.appendChild(btn);
  });
}

// ---- LIST VIEW ----
function renderList() {
  document.getElementById('resultsInfo').textContent = filtered.length + ' steder funnet';
  const c = document.getElementById('cards');
  if (!filtered.length) { c.innerHTML = '<div class="no-results"><span>🔍</span>Ingen steder — prøv et annet søk!</div>'; return; }
  c.innerHTML = filtered.map(p => {
    const types = p.activity_types.slice(0,3).map(t=>`<span class="tag type">${t}</span>`).join('');
    const tags = (p.best_for_tags||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('');
    const icons = [];
    if(p.toilet) icons.push('🚻');
    if(p.parking) icons.push('🅿️');
    if(p.public_transport) icons.push('🚌');
    if(p.dog_friendly) icons.push('🐕');
    if(p.kiosk_cafe) icons.push('☕');
    if(p.shower) icons.push('🚿');
    return `<div class="card" onclick="openModal('${p.id}')">
      <div class="card-top">
        <div>
          ${p.featured?'<span class="feat-badge">⭐ Anbefalt</span><br>':''}
          <div class="card-name">${p.name}</div>
          <div class="card-area">📍 ${p.neighborhood||p.municipality} · ${p.area}</div>
        </div>
        <span class="${p.is_free?'badge-free':'badge-paid'}">${p.is_free?'Gratis':p.price_range||'Betalt'}</span>
      </div>
      <div class="card-desc">${p.description}</div>
      <div class="card-tags">${types}${tags}</div>
      ${icons.length?`<div class="card-footer">${icons.map(i=>`<span class="icon-info">${i}</span>`).join(' ')}</div>`:''}
    </div>`;
  }).join('');
}

// ---- MAP VIEW ----
const CAT_COLORS = {
  badested:'#1976d2',badstue:'#7b1fa2',elvebad:'#0097a7',tuftpark:'#388e3c',
  tennisbane:'#f57c00',padelbane:'#e64a19',fotballbane:'#2e7d32',
  basketballbane:'#f9a825',volleyballbane:'#00838f',skatepark:'#616161',
  klatring:'#4e342e',discgolf:'#558b2f',løperute:'#00796b',tur:'#5d4037',
  skiløype:'#1565c0',skøytebane:'#0288d1',golf:'#33691e',kajakkutleie:'#006064',
  badminton:'#ad1457',bordtennis:'#6a1b9a',sykling:'#00695c',yoga:'#4527a0',
  øy:'#0277bd',park:'#2e7d32'
};

function placeColor(p) {
  for (const t of p.activity_types) if (CAT_COLORS[t]) return CAT_COLORS[t];
  return '#555';
}

function makePinSvg(color, free) {
  return `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
    <path d="M14 0C6.3 0 0 6.3 0 14c0 9.8 14 22 14 22S28 23.8 28 14C28 6.3 21.7 0 14 0z" fill="${color}" stroke="white" stroke-width="2"/>
    ${free?`<circle cx="14" cy="14" r="6" fill="white" opacity="0.4"/>`:''}
    <circle cx="14" cy="14" r="5" fill="white" opacity="0.25"/>
  </svg>`;
}

function initMap() {
  if (leafletMap) return;
  leafletMap = L.map('map', {zoomControl:true}).setView([59.913, 10.752], 12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution:'&copy; OpenStreetMap &amp; CartoDB',
    subdomains:'abcd', maxZoom:19
  }).addTo(leafletMap);
  setTimeout(() => leafletMap.invalidateSize(), 100);
}

function renderMap() {
  if (!leafletMap) initMap();
  // Clear old markers
  markers.forEach(m => leafletMap.removeLayer(m));
  markers = [];
  document.getElementById('mapBottomSheet').classList.remove('open');

  filtered.forEach(p => {
    if (!p.lat || !p.lng) return;
    const color = placeColor(p);
    const icon = L.divIcon({
      html: makePinSvg(color, p.is_free),
      className:'',
      iconSize:[28,36],
      iconAnchor:[14,36],
      popupAnchor:[0,-36]
    });
    const m = L.marker([p.lat, p.lng], {icon}).addTo(leafletMap);
    m.on('click', () => openSheet(p.id));
    markers.push(m);
  });

  document.getElementById('mapCount').textContent = filtered.length + ' steder på kartet';

  // Fit bounds if results
  if (markers.length > 0) {
    const group = L.featureGroup(markers);
    leafletMap.fitBounds(group.getBounds().pad(0.1), {maxZoom:14});
  }

  setTimeout(() => leafletMap.invalidateSize(), 200);
}

function openSheet(id) {
  const p = PLACES.find(x=>x.id===id);
  if (!p) return;
  const tags = [...(p.activity_types||[]),...(p.best_for_tags||[])].slice(0,8).map(t=>`<span class="tag type">${t}</span>`).join('');
  const icons = [];
  if(p.toilet) icons.push('🚻 WC');
  if(p.parking) icons.push('🅿️ Parkering');
  if(p.public_transport) icons.push(`🚌 ${p.transport_details||'Kollektiv'}`);
  if(p.dog_friendly) icons.push('🐕 Hundevennlig');
  if(p.kiosk_cafe) icons.push('☕ Kiosk/kafé');
  if(p.shower) icons.push('🚿 Dusj');
  const bookBtn = p.booking_url ? `<a href="${p.booking_url}" target="_blank" class="sheet-book">📅 Book plass</a>` : `<button class="sheet-book" style="border:none;cursor:pointer;" onclick="openModal('${p.id}')">📋 Se alle detaljer</button>`;

  document.getElementById('sheetContent').innerHTML = `
    <span class="sheet-close" onclick="document.getElementById('mapBottomSheet').classList.remove('open')">✕</span>
    <div class="sheet-name">${p.featured?'⭐ ':''}${p.name}</div>
    <div class="sheet-area">📍 ${p.neighborhood||p.municipality} · ${p.area} &nbsp;·&nbsp; <strong style="color:${p.is_free?'#2e7d32':'#e65100'}">${p.is_free?'Gratis':p.price_range||'Betalt'}</strong></div>
    <div class="sheet-desc">${p.description}</div>
    <div class="sheet-tags">${tags}</div>
    ${icons.length?`<div class="sheet-icons">${icons.map(i=>`<span class="sheet-icon">${i}</span>`).join('')}</div>`:''}
    ${bookBtn}
  `;
  document.getElementById('mapBottomSheet').classList.add('open');
}

// ---- VIEW SWITCHING ----
function switchView(view) {
  currentView = view;
  document.getElementById('listView').style.display = view==='list'?'flex':'none';
  document.getElementById('mapView').style.display = view==='map'?'flex':'none';
  document.getElementById('btnList').classList.toggle('active', view==='list');
  document.getElementById('btnMap').classList.toggle('active', view==='map');
  if (view==='map') {
    setTimeout(() => { initMap(); renderMap(); }, 50);
  }
}

// ---- MODAL ----
function openModal(id) {
  const p = PLACES.find(x=>x.id===id);
  if(!p) return;
  document.getElementById('mapBottomSheet').classList.remove('open');
  const rows = [
    ['Adresse', p.address||'—'],
    ['Kommune', `${p.neighborhood||''} · ${p.municipality}`],
    ['Aktiviteter', p.activity_types.join(', ')],
    ['Pris', p.is_free?'🆓 Gratis':(p.price_range||'Betalt')],
    ['Bestilling', p.booking_required?'✅ Kreves':'❌ Ikke nødvendig'],
    ['Kollektivt', p.public_transport?(p.transport_details||'✅ Ja'):'❌ Nei'],
    ['Parkering', p.parking?'✅ Ja':'❌ Nei'],
    ['Toalett', p.toilet?'✅ Ja':'❌ Nei'],
    ['Dusj', p.shower?'✅ Ja':'—'],
    ['Kiosk/kafé', p.kiosk_cafe?'✅ Ja':'—'],
    ['Hundevennlig', p.dog_friendly?'✅ Ja':'❌ Nei'],
    ['Familievennlig', p.family_friendly?'✅ Ja':'—'],
    ['Rullestol', p.wheelchair_accessible?'✅ Ja':'—'],
    ['Sesonger', (p.seasons||[]).join(', ')],
  ].map(([l,v])=>`<div class="modal-row"><span class="m-label">${l}</span><span class="m-val">${v}</span></div>`).join('');
  const tags = [...(p.activity_types||[]),...(p.best_for_tags||[])].map(t=>`<span class="tag type">${t}</span>`).join('');
  document.getElementById('modalContent').innerHTML = `
    <button class="close-btn" onclick="document.getElementById('modal').style.display='none'">✕</button>
    <h2>${p.name}</h2>
    <div class="m-area">📍 ${p.address||p.neighborhood||p.municipality}</div>
    <div class="m-desc">${p.description}</div>
    <div class="modal-tags">${tags}</div>
    ${rows}
    ${p.booking_url?`<a href="${p.booking_url}" target="_blank" class="btn-book">📅 Book plass</a>`:''}
  `;
  document.getElementById('modal').style.display='block';
}

function closeModal(e) {
  if(e.target.id==='modal') document.getElementById('modal').style.display='none';
}

// ---- INIT ----
buildFilters();
filtered = getFiltered();
renderList();
</script>
</body>
</html>
