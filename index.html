*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a}
header{background:#1a1a2e;color:#fff;padding:16px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
header h1{font-size:1.4rem;font-weight:700}
header p{font-size:.78rem;opacity:.6;margin-top:2px}
.search-bar{padding:10px 14px;background:#fff;border-bottom:1px solid #e8e8e0}
.search-bar input{width:100%;padding:10px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:.95rem;outline:none}
.search-bar input:focus{border-color:#1a1a2e}
.filters{display:flex;gap:7px;padding:10px 14px;overflow-x:auto;background:#fff;border-bottom:1px solid #e8e8e0;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-btn{white-space:nowrap;padding:6px 13px;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-size:.8rem;cursor:pointer;transition:all .15s;font-weight:500}
.filter-btn.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.sub-filters{display:flex;gap:6px;padding:7px 14px;overflow-x:auto;background:#fafaf8;border-bottom:1px solid #e8e8e0;scrollbar-width:none}
.sub-filters::-webkit-scrollbar{display:none}
.sub-btn{white-space:nowrap;padding:5px 11px;border-radius:16px;border:1px solid #ddd;background:#fff;font-size:.77rem;cursor:pointer;transition:all .15s}
.sub-btn.active{background:#2563eb;color:#fff;border-color:#2563eb}
.results-info{padding:8px 14px;font-size:.78rem;color:#666;background:#fafaf8;border-bottom:1px solid #e8e8e0}
.cards{padding:12px 14px;display:grid;gap:11px}
.card{background:#fff;border-radius:14px;padding:15px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:transform .12s,box-shadow .12s;border:1px solid #eee}
.card:active{transform:scale(.98)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-name{font-size:.98rem;font-weight:600;line-height:1.3}
.badge-free{background:#e8f5e9;color:#2e7d32;font-size:.7rem;padding:3px 8px;border-radius:10px;font-weight:600;white-space:nowrap;flex-shrink:0}
.badge-paid{background:#fff3e0;color:#e65100;font-size:.7rem;padding:3px 8px;border-radius:10px;font-weight:600;white-space:nowrap;flex-shrink:0}
.card-area{font-size:.76rem;color:#888;margin-top:3px}
.card-desc{font-size:.83rem;color:#555;margin-top:8px;line-height:1.5}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:9px}
.tag{background:#f0f0eb;color:#555;font-size:.71rem;padding:3px 8px;border-radius:8px}
.tag.type{background:#e8eef7;color:#1a3a6e;font-weight:500}
.card-footer{display:flex;gap:10px;margin-top:9px;flex-wrap:wrap}
.icon-info{font-size:.73rem;color:#888;display:flex;align-items:center;gap:3px}
.featured-badge{display:inline-block;background:#fff9c4;color:#795548;font-size:.68rem;padding:2px 7px;border-radius:8px;font-weight:600;margin-bottom:4px}
.no-results{text-align:center;padding:60px 20px;color:#999}
.no-results span{font-size:2.5rem;display:block;margin-bottom:12px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;overflow-y:auto;padding:16px}
.modal{background:#fff;border-radius:18px;padding:22px;max-width:560px;margin:0 auto}
.modal h2{font-size:1.25rem;font-weight:700;margin-bottom:3px;padding-right:28px}
.modal .m-area{color:#888;font-size:.83rem;margin-bottom:10px}
.modal .m-desc{font-size:.88rem;line-height:1.6;margin-bottom:14px;color:#333}
.modal-row{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid #f0f0f0;font-size:.84rem}
.modal-row:last-child{border-bottom:none}
.m-label{color:#888;width:120px;flex-shrink:0;padding-top:1px}
.m-val{color:#1a1a1a;font-weight:500;flex:1}
.close-btn{position:absolute;top:18px;right:18px;font-size:1.4rem;cursor:pointer;color:#aaa;line-height:1;background:none;border:none}
.modal{position:relative}
.modal-tags{display:flex;flex-wrap:wrap;gap:5px;margin:10px 0 14px}
.btn-book{display:block;background:#1a1a2e;color:#fff;text-align:center;padding:12px;border-radius:12px;text-decoration:none;font-weight:600;margin-top:14px;font-size:.93rem}
</style>

const AREAS = ['Alle','Sentrum','Vest','Nord','Sørøst','Øst','Bærum','Asker'];

let activeCat = 'all';
let activeArea = 'Alle';
let freeOnly = false;

function buildFilters() {
  const cf = document.getElementById('catFilters');
  CATEGORIES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (c.id === activeCat ? ' active' : '');
    btn.textContent = c.label;
    btn.onclick = () => {
      activeCat = c.id;
      cf.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    };
    cf.appendChild(btn);
  });

  const af = document.getElementById('areaFilters');
  const ft = document.createElement('button');
  ft.className = 'sub-btn' + (freeOnly ? ' active' : '');
  ft.textContent = '✅ Kun gratis';
  ft.onclick = () => { freeOnly = !freeOnly; ft.classList.toggle('active'); render(); };
  af.appendChild(ft);

  AREAS.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'sub-btn' + (a === activeArea ? ' active' : '');
    btn.textContent = a;
    btn.onclick = () => {
      activeArea = a;
      af.querySelectorAll('.sub-btn:not(:first-child)').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    };
    af.appendChild(btn);
  });
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let results = PLACES.filter(p => {
    if (activeCat !== 'all' && !p.activity_types.includes(activeCat)) return false;
    if (activeArea !== 'Alle' && p.area !== activeArea) return false;
    if (freeOnly && !p.is_free) return false;
    if (q) {
      const hay = [p.name, p.description, p.neighborhood||'', p.municipality, ...(p.best_for_tags||[]), ...(p.activity_types||[])].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  results.sort((a,b) => (b.featured?1:0)-(a.featured?1:0) || a.name.localeCompare(b.name,'no'));

  document.getElementById('resultsInfo').textContent = results.length + ' steder funnet';

  const container = document.getElementById('cards');
  if (!results.length) {
    container.innerHTML = '<div class="no-results"><span>🔍</span>Ingen steder funnet — prøv et annet søk!</div>';
    return;
  }

  container.innerHTML = results.map(p => {
    const types = p.activity_types.slice(0,3).map(t => `<span class="tag type">${t}</span>`).join('');
    const tags = (p.best_for_tags||[]).slice(0,3).map(t => `<span class="tag">${t}</span>`).join('');
    const icons = [];
    if (p.toilet) icons.push('🚻 WC');
    if (p.parking) icons.push('🅿️ P');
    if (p.public_transport) icons.push('🚌 Kollektiv');
    if (p.dog_friendly) icons.push('🐕 Hund');
    if (p.kiosk_cafe) icons.push('☕ Kiosk');
    if (p.shower) icons.push('🚿 Dusj');
    return `<div class="card" onclick="openModal('${p.id}')">
      <div class="card-top">
        <div>
          ${p.featured ? '<span class="featured-badge">⭐ Anbefalt</span><br>' : ''}
          <div class="card-name">${p.name}</div>
          <div class="card-area">📍 ${p.neighborhood||p.municipality} · ${p.area}</div>
        </div>
        <span class="${p.is_free?'badge-free':'badge-paid'}">${p.is_free?'Gratis':p.price_range||'Betalt'}</span>
      </div>
      <div class="card-desc">${p.description}</div>
      <div class="card-tags">${types}${tags}</div>
      ${icons.length?`<div class="card-footer">${icons.map(i=>`<span class="icon-info">${i}</span>`).join('')}</div>`:''}
    </div>`;
  }).join('');
}

function openModal(id) {
  const p = PLACES.find(x => x.id===id);
  if (!p) return;
  const rows = [
    ['Adresse', p.address||'—'],
    ['Kommune', `${p.neighborhood||''} · ${p.municipality}`],
    ['Aktiviteter', p.activity_types.join(', ')],
    ['Pris', p.is_free?'🆓 Gratis':(p.price_range||'Betalt')],
    ['Bestilling', p.booking_required?'✅ Kreves':'❌ Ikke nødvendig'],
    ['Kollektivt', p.public_transport?(p.transport_details||'✅ Ja'):'❌ Nei'],
    ['Parkering', p.parking?'✅ Ja':'❌ Nei'],
    ['Toalett', p.toilet?'✅ Ja':'❌ Nei'],
    ['Dusj', p.shower?'✅ Ja':'—'],
    ['Kiosk/kafé', p.kiosk_cafe?'✅ Ja':'—'],
    ['Hundevennlig', p.dog_friendly?'✅ Ja':'❌ Nei'],
    ['Familievennlig', p.family_friendly?'✅ Ja':'—'],
    ['Rullestolvennlig', p.wheelchair_accessible?'✅ Ja':'—'],
    ['Sesonger', (p.seasons||[]).join(', ')],
  ].map(([l,v])=>`<div class="modal-row"><span class="m-label">${l}</span><span class="m-val">${v}</span></div>`).join('');

  const tags = [...(p.activity_types||[]),...(p.best_for_tags||[])].map(t=>`<span class="tag type">${t}</span>`).join('');
  const bookBtn = p.booking_url?`<a href="${p.booking_url}" target="_blank" class="btn-book">📅 Book plass</a>`:'';

  document.getElementById('modalContent').innerHTML = `
    <button class="close-btn" onclick="document.getElementById('modal').style.display='none'">✕</button>
    <h2>${p.name}</h2>
    <div class="m-area">📍 ${p.address||p.neighborhood||p.municipality}</div>
    <div class="m-desc">${p.description}</div>
    <div class="modal-tags">${tags}</div>
    ${rows}
    ${bookBtn}
  `;
  document.getElementById('modal').style.display='block';
  document.getElementById('modal').scrollTop=0;
}

function closeModal(e) {
  if (e.target.id==='modal') document.getElementById('modal').style.display='none';
}

buildFilters();
render();
</script>
</body>
</html>
