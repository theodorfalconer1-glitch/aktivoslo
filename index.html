<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>AktivOslo</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{
  --navy:#1a2b4a;--accent:#2563eb;--aL:#dbeafe;--sand:#f8f7f4;
  --border:#e5e7eb;--text:#111827;--muted:#6b7280;--green:#16a34a;
  --hdr:52px;--bnav:60px
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#e8ebe0}

/* MAP */
#map{position:fixed;inset:0;z-index:1;background:#e8ebe0}

/* HEADER */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:calc(var(--hdr) + env(safe-area-inset-top));
  padding-top:env(safe-area-inset-top);
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,0,0,.07);
  display:flex;align-items:center;gap:7px;padding-left:10px;padding-right:8px
}
.home-btn{display:flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;padding:4px;border-radius:9px;flex-shrink:0}
.home-btn:active{background:var(--sand)}
.home-logo{font-weight:900;font-size:.9rem;color:var(--navy);letter-spacing:-.3px;white-space:nowrap}
.srch-btn{
  flex:1;display:flex;align-items:center;gap:7px;
  background:#f3f4f6;border:none;border-radius:22px;
  padding:8px 13px;min-width:0;cursor:pointer;
  font-size:.83rem;color:#6b7280;font-family:inherit;
  text-align:left;transition:background .1s
}
.srch-btn:active{background:#e5e7eb}
.hbtn{background:none;border:none;cursor:pointer;font-size:1.05rem;padding:7px;border-radius:9px;flex-shrink:0;transition:background .1s}
.hbtn:active{background:var(--sand)}

/* SEARCH PANEL */
#srchPanel{
  position:fixed;top:0;left:0;right:0;z-index:500;
  background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.15);
  transform:translateY(-110%);transition:transform .22s cubic-bezier(.4,0,.2,1);
  border-radius:0 0 16px 16px;
  padding-top:env(safe-area-inset-top)
}
#srchPanel.on{transform:translateY(0)}
.srch-inner{display:flex;align-items:center;gap:6px;padding:10px 12px;border-bottom:1px solid var(--border)}
.srch-inner input{flex:1;border:none;outline:none;font-size:.92rem;color:var(--text);font-family:inherit}
#srchResults{max-height:55vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sr-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #f3f4f6;cursor:pointer;touch-action:manipulation}
.sr-item:active{background:#f9fafb}
.sr-ico{font-size:1.1rem;flex-shrink:0;width:32px;height:32px;background:var(--sand);border-radius:8px;display:flex;align-items:center;justify-content:center}
.sr-name{font-weight:700;font-size:.83rem;color:var(--navy);margin-bottom:1px}
.sr-sub{font-size:.67rem;color:var(--muted)}
.sr-empty{padding:24px;text-align:center;color:var(--muted);font-size:.8rem}

/* FILTER BAR */
#fbar{
  position:fixed;z-index:100;
  top:calc(var(--hdr) + env(safe-area-inset-top) + 7px);
  left:0;right:0;
  display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;
  padding:0 10px;-webkit-overflow-scrolling:touch
}
#fbar::-webkit-scrollbar{display:none}
.chip{
  padding:6px 12px;border-radius:20px;font-size:.71rem;font-weight:700;
  border:none;background:rgba(255,255,255,.93);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  box-shadow:0 1px 5px rgba(0,0,0,.12);
  cursor:pointer;white-space:nowrap;flex-shrink:0;color:var(--navy);
  touch-action:manipulation;transition:background .12s,color .12s
}
.chip.on{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3)}

/* BOTTOM NAV */
#bnav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid rgba(0,0,0,.07);
  display:flex;padding-bottom:env(safe-area-inset-bottom)
}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px 6px;cursor:pointer;color:var(--muted);border:none;background:none;font-size:.57rem;font-weight:700;transition:color .12s;touch-action:manipulation}
.bn.on{color:var(--accent)}
.bn-i{font-size:1.12rem;line-height:1}

/* SCREENS */
.sscr{position:fixed;inset:0;z-index:300;background:#fff;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);will-change:transform}
.sscr.on{transform:translateX(0)}
.sscr-nav{display:flex;align-items:center;gap:10px;padding:12px 14px;padding-top:calc(12px + env(safe-area-inset-top));border-bottom:1px solid var(--border);flex-shrink:0;background:#fff;position:sticky;top:0;z-index:10}
.back-btn{display:flex;align-items:center;gap:4px;background:var(--sand);border:1.5px solid var(--border);border-radius:10px;padding:7px 11px;font-size:.82rem;font-weight:700;cursor:pointer;color:var(--navy);touch-action:manipulation;flex-shrink:0}
.sscr-title{font-size:.95rem;font-weight:900;color:var(--navy)}
.sscr-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}

/* LIST SCREEN */
.srch-full{display:flex;align-items:center;gap:6px;background:#f3f4f6;border:1.5px solid transparent;border-radius:22px;padding:8px 13px;margin:10px 12px 0;transition:border-color .15s,background .15s}
.srch-full:focus-within{border-color:var(--accent);background:#fff}
.srch-full input{border:none;background:none;outline:none;font-size:.88rem;width:100%;font-family:inherit}
.cat-scroll{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-chip{padding:6px 12px;border-radius:20px;font-size:.71rem;font-weight:700;border:1.5px solid var(--border);background:#fff;color:var(--navy);cursor:pointer;white-space:nowrap;flex-shrink:0;touch-action:manipulation}
.cat-chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.res-hdr{padding:6px 14px 3px;font-size:.68rem;color:var(--muted);font-weight:600;flex-shrink:0;border-bottom:1px solid #f3f4f6}
#lpl{padding:0 10px 80px}
.pc{background:#fff;margin:5px 0;border-radius:12px;border:1px solid var(--border);padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;touch-action:manipulation;transition:background .1s}
.pc:active{background:#f9fafb}
.pc-ico{font-size:1.2rem;flex-shrink:0;width:34px;height:34px;background:var(--sand);border-radius:9px;display:flex;align-items:center;justify-content:center}
.pc-body{flex:1;min-width:0}
.pc-name{font-weight:800;font-size:.84rem;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.pc-sub{font-size:.67rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.pc-sc{font-size:.76rem;font-weight:900;color:var(--accent)}
.vtag{font-size:.54rem;font-weight:700;background:#dcfce7;color:var(--green);border-radius:4px;padding:2px 5px}
.ftag{font-size:.54rem;font-weight:700;background:var(--aL);color:var(--accent);border-radius:4px;padding:2px 5px}
.no-res{padding:32px 16px;text-align:center;color:var(--muted);font-size:.82rem;line-height:1.6}

/* BOTTOM SHEET */
#bsh{position:fixed;bottom:calc(var(--bnav) + env(safe-area-inset-bottom));left:0;right:0;z-index:250;background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.13);transform:translateY(110%);transition:transform .24s cubic-bezier(.4,0,.2,1);max-height:72vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
#bsh.on{transform:translateY(0)}
.bsh-hdl{width:36px;height:4px;background:#d1d5db;border-radius:2px;margin:9px auto 11px}
.bsh-in{padding:0 16px 28px}
.bsh-nm{font-size:.98rem;font-weight:900;color:var(--navy);margin-bottom:3px;line-height:1.3}
.bsh-ad{font-size:.71rem;color:var(--muted);margin-bottom:8px}
.bsh-ds{font-size:.77rem;line-height:1.55;margin-bottom:10px;color:#374151}
.bsh-fts{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.bft{background:var(--sand);border-radius:8px;padding:7px 9px}
.bft-l{font-size:.53rem;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:1px}
.bft-v{font-size:.74rem;font-weight:700;color:var(--navy)}
.stars-row{display:flex;align-items:center;gap:4px;margin-bottom:10px}
.stars-lbl{font-size:.67rem;color:var(--muted)}
.star{font-size:1.15rem;cursor:pointer;color:#d1d5db;touch-action:manipulation}
.star.on{color:#fbbf24}
.bsh-acts{display:flex;gap:6px}
.bsh-btn{flex:1;padding:11px 4px;border-radius:11px;border:none;font-weight:700;font-size:.75rem;cursor:pointer;touch-action:manipulation}
.bsh-btn:active{opacity:.8}
.bsh-btn.pr{background:var(--accent);color:#fff}
.bsh-btn.gr{background:#dcfce7;border:1.5px solid #86efac;color:var(--green)}
.bsh-btn.se{background:var(--sand);border:1.5px solid var(--border);color:var(--navy)}
#bshOv{position:fixed;inset:0;z-index:249;display:none;background:rgba(0,0,0,.15)}
#bshOv.on{display:block}

/* PROFILE */
.prof-hdr{background:linear-gradient(135deg,#1a2b4a,#2563eb);padding:18px;color:#fff;text-align:center;flex-shrink:0}
.prof-av{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.18);margin:0 auto 7px;font-size:1.3rem;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.3)}
.pstats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);margin:10px;border-radius:11px;overflow:hidden}
.pst{background:#fff;padding:11px 6px;text-align:center}
.pst-n{font-size:1.05rem;font-weight:900;color:var(--navy)}
.pst-l{font-size:.57rem;color:var(--muted);margin-top:1px}
.sec-hdr{padding:10px 14px 4px}
.sec-t{font-size:.67rem;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.5px}
.badges-row{display:flex;gap:6px;overflow-x:auto;padding:0 12px 4px;scrollbar-width:none}
.badges-row::-webkit-scrollbar{display:none}
.badge{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:8px;display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;min-width:56px;opacity:.3}
.badge.ok{opacity:1;border-color:#fbbf24;background:#fffbeb}
.map-mini{height:130px;border-radius:11px;margin:0 12px;overflow:hidden;border:1px solid var(--border)}
#miniMap{width:100%;height:100%}
.fr-item{display:flex;align-items:center;gap:9px;background:#fff;margin:3px 12px;padding:9px 11px;border-radius:10px;border:1px solid var(--border)}
.fr-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#db2777);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:.72rem;flex-shrink:0}
.fr-btn{margin-left:auto;padding:5px 9px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:.68rem;font-weight:700;cursor:pointer;flex-shrink:0}
.fr-btn.ok{background:var(--aL);border-color:var(--accent);color:var(--accent)}
.logout-btn{margin:14px 12px 4px;padding:11px;border-radius:10px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-size:.82rem;font-weight:700;cursor:pointer;width:calc(100% - 24px)}

/* SOCIAL */
.feed-item{background:#fff;margin:4px 12px;border-radius:12px;border:1px solid var(--border);padding:10px;display:flex;gap:8px}
.feed-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#7c3aed);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:.72rem;flex-shrink:0}
.feed-txt{font-size:.77rem;line-height:1.4;margin-bottom:2px}
.feed-time{font-size:.63rem;color:var(--muted)}
.fp{font-weight:700;color:var(--accent);cursor:pointer}
.lb-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;margin:3px 12px;border-radius:10px;border:1px solid var(--border)}
.lb-pts{margin-left:auto;font-weight:900;font-size:.76rem;color:var(--accent)}
.chal{background:#fff;margin:4px 12px;border-radius:11px;border:1px solid var(--border);padding:11px;display:flex;align-items:center;gap:9px}
.chal-bar{height:4px;background:var(--sand);border-radius:3px;overflow:hidden;margin-top:3px}
.chal-fill{height:100%;background:var(--accent);border-radius:3px}
.plan-strip{margin:8px 12px 4px;background:var(--navy);color:#fff;border:none;border-radius:11px;padding:12px 14px;display:flex;align-items:center;gap:9px;cursor:pointer;width:calc(100% - 24px);touch-action:manipulation}

/* LOGIN */
.tab-row{display:flex;gap:3px;background:var(--sand);border-radius:10px;padding:3px;margin-bottom:14px}
.tab-pill{flex:1;padding:9px;text-align:center;border-radius:8px;font-size:.81rem;font-weight:700;color:var(--muted);cursor:pointer}
.tab-pill.on{background:#fff;color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.lm-in{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:.87rem;margin-bottom:8px;outline:none;font-family:inherit}
.lm-in:focus{border-color:var(--accent)}
.lm-sub{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:11px;font-size:.9rem;font-weight:700;cursor:pointer}

/* MODALS */
#planModal,#langModal{position:fixed;inset:0;z-index:9000;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.4)}
#planModal.on,#langModal.on{display:flex}
.pm-box,.lm-box{background:#fff;border-radius:20px 20px 0 0;padding:18px 16px 34px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.pm-lbl{font-size:.67rem;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:3px;display:block;margin-top:6px}
.pm-in{width:100%;padding:10px 12px;border-radius:9px;border:1.5px solid var(--border);font-size:.84rem;outline:none;margin-bottom:6px;font-family:inherit}
.pm-in:focus{border-color:var(--accent)}
.pm-pr{width:100%;padding:12px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-weight:700;font-size:.87rem;cursor:pointer;margin-top:4px}
.pm-se{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:10px;background:var(--sand);color:var(--navy);font-weight:700;font-size:.84rem;cursor:pointer;margin-top:6px}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.li{padding:9px 10px;border-radius:9px;border:1.5px solid var(--border);cursor:pointer;font-size:.78rem;font-weight:700;display:flex;align-items:center;gap:7px;touch-action:manipulation}
.li.on{background:var(--aL);border-color:var(--accent)}

/* ONBOARDING */
#onb{position:fixed;inset:0;z-index:9999;background:rgba(15,25,50,.87);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center}
.onb-sheet{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 18px calc(22px + env(safe-area-inset-bottom))}
.onb-logo{font-size:2rem;text-align:center;margin-bottom:3px}
.onb-title{font-size:1.6rem;font-weight:900;color:var(--navy);text-align:center;letter-spacing:-.5px;margin-bottom:3px}
.onb-sub{font-size:.8rem;color:var(--muted);text-align:center;margin-bottom:3px}
.onb-cnt{font-size:.74rem;font-weight:700;color:var(--accent);text-align:center;margin-bottom:12px}
.onb-what{background:linear-gradient(135deg,#eff6ff,#f0fdf4);border:1.5px solid #bfdbfe;border-radius:13px;padding:12px 14px;margin-bottom:12px}
.onb-what-t{font-size:.82rem;font-weight:800;color:var(--navy);margin-bottom:4px}
.onb-what-d{font-size:.75rem;color:#374151;line-height:1.52}
.onb-feats{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.onb-feat{display:flex;align-items:flex-start;gap:9px;background:var(--sand);border-radius:11px;padding:9px 11px;border:1px solid var(--border)}
.onb-feat-i{font-size:1.1rem;flex-shrink:0;padding-top:1px}
.onb-feat-t{font-size:.78rem;font-weight:800;color:var(--navy);margin-bottom:1px}
.onb-feat-d{font-size:.7rem;color:var(--muted);line-height:1.38}
.onb-cats{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.onb-cat{font-size:.68rem;font-weight:700;background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:4px 8px;color:var(--navy)}
.btn-pr{background:var(--accent);color:#fff;border:none;padding:14px;border-radius:13px;font-size:.9rem;font-weight:700;cursor:pointer;width:100%;margin-bottom:7px}
.btn-pr:active{opacity:.85}
.btn-se{background:#fff;border:1.5px solid var(--border);padding:12px;border-radius:13px;font-size:.87rem;font-weight:700;cursor:pointer;width:100%;color:var(--navy);margin-bottom:12px}
.lang-pills{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.lp{padding:5px 8px;border-radius:20px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:.72rem;font-weight:700;color:var(--navy);touch-action:manipulation}
.lp.sel{background:var(--aL);border-color:var(--accent)}
.leaflet-control-zoom{border:none!important;box-shadow:0 2px 10px rgba(0,0,0,.12)!important;border-radius:10px!important}
.leaflet-control-zoom a{border-radius:8px!important;border:none!important}
.leaflet-control-attribution{display:none}
.leaflet-control-zoom{margin-bottom:calc(var(--bnav) + env(safe-area-inset-bottom) + 8px)!important}
</style>
</head>
<body>

<div id="map"></div>
<div id="fbar"></div>

<div id="hdr">
  <button class="home-btn" id="homeBtn">
    <span style="font-size:1rem">🗺️</span>
    <span class="home-logo">AktivOslo</span>
  </button>
  <button class="srch-btn" id="srchOpenBtn">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <span id="srchBtnTxt">Søk etter sted...</span>
  </button>
  <button class="hbtn" id="listBtn">☰</button>
  <button class="hbtn" id="langBtn">🌐</button>
</div>

<div id="srchPanel">
  <div class="srch-inner">
    <svg width="15" height="15" fill="none" stroke="#6b7280" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="si" type="search" autocomplete="off">
    <button id="srchClose" style="background:none;border:none;font-size:1.1rem;cursor:pointer;padding:4px;color:#6b7280">✕</button>
  </div>
  <div id="srchResults"></div>
</div>

<!-- LIST SCREEN -->
<div id="scr-list" class="sscr">
  <div class="sscr-nav">
    <button class="back-btn" id="listBack"></button>
    <div class="sscr-title" id="listTitle"></div>
  </div>
  <div class="srch-full">
    <svg width="15" height="15" fill="none" stroke="#9ca3af" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="siFull" type="search" autocomplete="off">
  </div>
  <div class="cat-scroll" id="catScroll"></div>
  <div class="res-hdr" id="resHdr"></div>
  <div class="sscr-body"><div id="lpl"></div></div>
</div>

<!-- SOCIAL SCREEN -->
<div id="scr-social" class="sscr">
  <div class="sscr-nav">
    <button class="back-btn" id="socialBack"></button>
    <div class="sscr-title" id="socialTitle"></div>
  </div>
  <div class="sscr-body">
    <button class="plan-strip" id="openPlan"><span style="font-size:1.05rem">📅</span><span id="planActTxt" style="flex:1;font-size:.82rem;font-weight:700"></span><span>›</span></button>
    <div class="sec-hdr"><div class="sec-t" id="sh-upcoming"></div></div>
    <div id="actList"></div>
    <div class="sec-hdr"><div class="sec-t" id="sh-lb"></div></div>
    <div id="lbList"></div>
    <div class="sec-hdr"><div class="sec-t" id="sh-chal"></div></div>
    <div id="chalList"></div>

};

function initMap(){
  if(apMap)return;
  apMap=L.map('map',{zoomControl:true,attributionControl:false,preferCanvas:true,renderer:L.canvas({padding:0.5})}).setView([59.913,10.740],12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd',detectRetina:true}).addTo(apMap);
  mLayer=L.layerGroup().addTo(apMap);
  buildFbar();renderMarkers();
  apMap.on('click',()=>hideSheet());
  setTimeout(()=>apMap.invalidateSize({animate:false}),150);
}
function makeIcon(c,isV){
  const color=isV?'#16a34a':(CLR[c]||'#2563eb');
  return L.divIcon({html:`<div style="width:32px;height:32px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:14px;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.25)">${ICO[c]||'📍'}</div>`,className:'',iconSize:[32,32],iconAnchor:[16,16]});
}
function getFiltered(q,c){
  let r=PLACES.filter(p=>p.status!=='closed');
  const fc=c||cat;
  if(fc!=='all')r=r.filter(p=>(p.activity_types||[]).includes(fc));
  if(q){const lq=q.toLowerCase();r=r.filter(p=>p.name.toLowerCase().includes(lq)||(p.neighborhood||'').toLowerCase().includes(lq)||(p.address||'').toLowerCase().includes(lq)||(p.municipality||'').toLowerCase().includes(lq)||trC((p.activity_types||[''])[0]).toLowerCase().includes(lq));}
  return r;
}
function renderMarkers(){
  if(!apMap||!mLayer)return;
  mLayer.clearLayers();
  getFiltered('',cat).forEach(p=>{
    if(!p.lat||!p.lng)return;
    const c0=(p.activity_types||['?'])[0];
    mLayer.addLayer(L.marker([p.lat,p.lng],{icon:makeIcon(c0,visited.includes(p.id))}).on('click',e=>{L.DomEvent.stopPropagation(e);openPlace(p.id);}));
  });
}
function focusOn(p){if(apMap&&p.lat&&p.lng)apMap.setView([p.lat,p.lng],17,{animate:true,duration:0.4});}

// ══ FILTER BAR ══
function buildFbar(){
  const frag=document.createDocumentFragment();
  ['all',...MCATS].forEach(c=>{
    const el=document.createElement('div');
    el.className='chip'+(cat===c?' on':'');el.dataset.c=c;
    el.textContent=c==='all'?tr('allCats'):trC(c);
    frag.appendChild(el);
  });
  const fb=document.getElementById('fbar');fb.innerHTML='';fb.appendChild(frag);
}
document.getElementById('fbar').addEventListener('click',e=>{
  const chip=e.target.closest('.chip');if(!chip)return;
  cat=chip.dataset.c;buildFbar();renderMarkers();
});

// ══ SØKEPANEL ══
document.getElementById('srchOpenBtn').onclick=()=>{
  document.getElementById('srchPanel').classList.add('on');
  setTimeout(()=>document.getElementById('si').focus(),80);
};
document.getElementById('srchClose').onclick=()=>{
  document.getElementById('srchPanel').classList.remove('on');
  document.getElementById('si').value='';
  document.getElementById('srchResults').innerHTML='';
};
document.getElementById('si').addEventListener('input',e=>{
  const v=e.target.value.trim();
  if(!v){document.getElementById('srchResults').innerHTML='';return;}
  const hits=getFiltered(v,'all').slice(0,12);
  document.getElementById('srchResults').innerHTML=hits.length
    ?hits.map(p=>{const c0=(p.activity_types||['?'])[0];return`<div class="sr-item" data-id="${p.id}"><div class="sr-ico">${ICO[c0]||'📍'}</div><div><div class="sr-name">${p.name}</div><div class="sr-sub">${[p.neighborhood,p.municipality].filter(Boolean).join(', ')||''} · ${trC(c0)}</div></div></div>`;}).join('')
    :`<div class="sr-empty">${tr('noResults')}</div>`;
});
document.getElementById('srchResults').addEventListener('click',e=>{
  const item=e.target.closest('.sr-item');if(!item)return;
  document.getElementById('srchPanel').classList.remove('on');
  document.getElementById('si').value='';
  document.getElementById('srchResults').innerHTML='';
  openPlace(item.dataset.id);
});

// ══ LISTE-SCREEN ══
function buildCatScroll(){
  const frag=document.createDocumentFragment();
  ['all',...MCATS].forEach(c=>{
    const el=document.createElement('div');
    el.className='cat-chip'+(listCat===c?' on':'');el.dataset.c=c;
    el.textContent=c==='all'?tr('allCats'):trC(c);
    frag.appendChild(el);
  });
  const cs=document.getElementById('catScroll');cs.innerHTML='';cs.appendChild(frag);
  const active=cs.querySelector('.cat-chip.on');if(active)active.scrollIntoView({block:'nearest',inline:'center'});
}
document.getElementById('catScroll').addEventListener('click',e=>{
  const chip=e.target.closest('.cat-chip');if(!chip)return;
  listCat=chip.dataset.c;buildCatScroll();renderListFull();
});
function renderListFull(){
  const list=getFiltered(listQ,listCat);
  const rh=document.getElementById('resHdr');
  if(rh)rh.textContent=`${list.length} ${tr('results')}${listCat!=='all'?' · '+trC(listCat):''}${listQ?' · "'+listQ+'"':''}`;
  const frag=document.createDocumentFragment();
  if(!list.length){
    const d=document.createElement('div');d.className='no-res';d.textContent=tr('noResults');frag.appendChild(d);
  }else{
    list.forEach(p=>{
      const c0=(p.activity_types||['?'])[0];
      const d=document.createElement('div');d.className='pc';d.dataset.id=p.id;
      d.innerHTML=`<div class="pc-ico">${ICO[c0]||'📍'}</div><div class="pc-body"><div class="pc-name">${p.name}</div><div class="pc-sub">${[p.neighborhood,p.municipality].filter(Boolean).join(', ')||''} · ${trC(c0)}</div></div><div class="pc-right">${p.is_free?`<span class="ftag">${tr('free')}</span>`:''} ${visited.includes(p.id)?`<span class="vtag">✓</span>`:''}<span class="pc-sc">${p.score_total||0}</span></div>`;
      frag.appendChild(d);
    });
  }
  const el=document.getElementById('lpl');el.innerHTML='';el.appendChild(frag);
}
document.getElementById('lpl').addEventListener('click',e=>{
  const c=e.target.closest('.pc');if(!c)return;
  showSscr(null);openPlace(c.dataset.id);
});
document.getElementById('siFull').addEventListener('input',e=>{
  listQ=e.target.value.trim();
  clearTimeout(window._rt);window._rt=setTimeout(renderListFull,160);
});
function openListScreen(){
  listCat=cat;buildCatScroll();renderListFull();showSscr('scr-list');
}

// ══ ÅPNE STED ══
function openPlace(id){
  const p=PLACES.find(x=>x.id===id);if(!p)return;
  activePl=p;
  const c0=(p.activity_types||['?'])[0];
  document.getElementById('bshName').textContent=(ICO[c0]||'📍')+' '+p.name;
  document.getElementById('bshAddr').textContent=p.address||[p.neighborhood,p.municipality].filter(Boolean).join(', ');
  document.getElementById('bshDesc').textContent=p.description||'';
  const userR=ratings[id]||0;
  document.querySelectorAll('.star').forEach(s=>s.classList.toggle('on',parseInt(s.dataset.r)<=userR));
  const facts=[];
  if(p.is_free)facts.push([tr('free'),'✅']);
  if(p.public_transport)facts.push(['Transport',p.transport_details||'✅']);
  if(p.toilet)facts.push(['Toalett','✅']);
  if(p.parking)facts.push(['Parkering','✅']);
  if(p.dog_friendly)facts.push(['🐕','✅']);
  if(p.family_friendly)facts.push(['👨‍👩‍👧','✅']);
  document.getElementById('bshFacts').innerHTML=facts.map(([l,v])=>`<div class="bft"><div class="bft-l">${l}</div><div class="bft-v">${v}</div></div>`).join('');
  const isV=visited.includes(id);
  const vb=document.getElementById('bshVisit');
  vb.textContent=isV?tr('visited'):tr('markVisited');
  vb.className='bsh-btn '+(isV?'gr':'se');
  document.getElementById('bshNav').textContent=tr('navigate');
  document.getElementById('bshClose').textContent=tr('close');
  focusOn(p);showSheet();
}
document.querySelectorAll('.star').forEach(s=>s.addEventListener('click',()=>{
  if(!activePl)return;const r=parseInt(s.dataset.r);
  ratings[activePl.id]=r;localStorage.setItem('ao_ratings',JSON.stringify(ratings));
  document.querySelectorAll('.star').forEach(x=>x.classList.toggle('on',parseInt(x.dataset.r)<=r));
}));
document.getElementById('bshVisit').addEventListener('click',()=>{
  if(!activePl)return;const id=activePl.id;
  if(!visited.includes(id)){
    visited.push(id);localStorage.setItem('ao_visited',JSON.stringify(visited));
    updateStreak();renderMarkers();renderListFull();
    const vb=document.getElementById('bshVisit');
    vb.textContent=tr('visited');vb.className='bsh-btn gr';
  }
});
function updateStreak(){
  const today=new Date().toDateString(),last=localStorage.getItem('ao_lastVisit');
  if(last!==today){
    localStorage.setItem('ao_lastVisit',today);
    streak=(last===new Date(Date.now()-86400000).toDateString())?streak+1:1;
    localStorage.setItem('ao_streak',streak);
  }
}

// ══ SHEET ══
function showSheet(){document.getElementById('bsh').classList.add('on');document.getElementById('bshOv').classList.add('on');}
function hideSheet(){document.getElementById('bsh').classList.remove('on');document.getElementById('bshOv').classList.remove('on');activePl=null;}
document.getElementById('bshClose').onclick=hideSheet;
document.getElementById('bshOv').onclick=hideSheet;
document.getElementById('bshNav').onclick=()=>{
  if(!activePl)return;
  const{lat,lng,name}=activePl;
  if(/iPhone|iPad|iPod/.test(navigator.userAgent))window.open(`maps://maps.apple.com/?q=${encodeURIComponent(name)}&ll=${lat},${lng}`);
  else window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`);
};

// ══ NAVIGASJON ══
function showSscr(id){
  document.querySelectorAll('.sscr').forEach(s=>s.classList.remove('on'));
  if(id)document.getElementById(id).classList.add('on');
  ['bn0','bn1','bn2','bn3'].forEach(b=>document.getElementById(b).classList.remove('on'));
  const bm={null:'bn0','scr-list':'bn1','scr-social':'bn2','scr-profile':'bn3'};
  const bId=bm[id];if(bId)document.getElementById(bId).classList.add('on');
  if(!id)hideSheet();
}
document.getElementById('homeBtn').onclick=()=>{
  cat='all';listQ='';document.getElementById('si').value='';
  buildFbar();renderMarkers();showSscr(null);hideSheet();
  apMap?.setView([59.913,10.740],12,{animate:true});
};
document.getElementById('listBtn').onclick=openListScreen;
document.getElementById('listBack').onclick=()=>showSscr(null);
document.getElementById('socialBack').onclick=()=>showSscr(null);
document.getElementById('profileBack').onclick=()=>showSscr(null);
document.getElementById('loginBack').onclick=()=>showSscr(null);
document.getElementById('bnav').addEventListener('click',e=>{
  const bn=e.target.closest('.bn');if(!bn)return;
  const v=bn.dataset.v;
  if(v==='map')showSscr(null);
  else if(v==='list')openListScreen();
  else if(v==='social'){renderSocial();showSscr('scr-social');}
  else if(v==='profile'){renderProfile();initMiniMap();showSscr('scr-profile');}
});

// ══ MINI KART ══
function initMiniMap(){
  if(miniMap)return;
  miniMap=L.map('miniMap',{zoomControl:false,attributionControl:false,dragging:false,scrollWheelZoom:false}).setView([59.913,10.740],11);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:14,subdomains:'abcd'}).addTo(miniMap);
  miniLayer=L.layerGroup().addTo(miniMap);
  setTimeout(()=>miniMap.invalidateSize(),200);
}

// ══ SOSIAL ══
function addFeed(item){const f=JSON.parse(localStorage.getItem('ao_feed')||'[]');f.unshift(item);localStorage.setItem('ao_feed',JSON.stringify(f.slice(0,50)));}
function renderSocial(){
  document.getElementById('actList').innerHTML=activities.length
    ?activities.slice(0,5).map(a=>{
      const d=new Date(a.date).toLocaleDateString(lang,{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      return`<div class="feed-item"><div class="feed-av">${ICO[a.cat]||'📍'}</div><div><div class="feed-txt"><b>${a.creator}</b> → ${a.place||trC(a.cat)} · ${d}</div><div class="feed-time">${a.desc||''}</div></div></div>`;
    }).join('')
    :`<div style="padding:10px 16px;color:var(--muted);font-size:.78rem">${tr('noActivities')}</div>`;

  const lbData=[{name:user?.name||'–',pts:visited.length*10},...friends.map(f=>({name:f.name,pts:f.pts||0}))].sort((a,b)=>b.pts-a.pts).slice(0,6);
  document.getElementById('lbList').innerHTML=lbData.map((u,i)=>`<div class="lb-item"><div style="width:22px;text-align:center;font-size:.75rem;font-weight:900;color:var(--muted)">${['🥇','🥈','🥉'][i]||i+1}</div><div class="feed-av" style="width:28px;height:28px;font-size:.66rem">${u.name[0].toUpperCase()}</div><div style="flex:1;font-size:.79rem;font-weight:700;color:var(--navy);padding-left:4px">${u.name}</div><div class="lb-pts">${u.pts}p</div></div>`).join('');

  const bading=PLACES.filter(p=>visited.includes(p.id)&&(p.activity_types||[]).includes('bading')).length;
  const badstue=PLACES.filter(p=>visited.includes(p.id)&&(p.activity_types||[]).includes('badstue')).length;
  const chalDefs=[
    {ico:'🏊',name:trC('bading'),p:Math.min(bading,3),t:3},
    {ico:'🧖',name:trC('badstue'),p:Math.min(badstue,2),t:2},
    {ico:'🗺️',name:'',p:Math.min(visited.length,5),t:5}
  ];
  document.getElementById('chalList').innerHTML=chalDefs.map(c=>`<div class="chal"><span style="font-size:1.2rem">${c.ico}</span><div style="flex:1"><div style="font-weight:700;font-size:.78rem;color:var(--navy);margin-bottom:2px">${c.name}</div><div class="chal-bar"><div class="chal-fill" style="width:${Math.round(c.p/c.t*100)}%"></div></div><div style="font-size:.63rem;color:var(--muted);margin-top:2px">${c.p}/${c.t}</div></div></div>`).join('');

  const feed=JSON.parse(localStorage.getItem('ao_feed')||'[]');
  document.getElementById('feedList').innerHTML=feed.length
    ?feed.slice(0,20).map(f=>{
      const t=new Date(f.t).toLocaleDateString(lang,{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      let txt='';
      if(f.type==='visit')txt=`<b>${f.user}</b> → <span class="fp" onclick="openPlace('${f.placeId}')">${f.place}</span>`;
      if(f.type==='rate')txt=`<b>${f.user}</b> — <span class="fp">${f.place}</span> ${'⭐'.repeat(f.score||1)}`;
      if(f.type==='plan')txt=`<b>${f.user}</b> → <span class="fp">${f.place}</span>`;
      return`<div class="feed-item"><div class="feed-av">${f.user?.[0]?.toUpperCase()||'?'}</div><div><div class="feed-txt">${txt}</div><div class="feed-time">${t}</div></div></div>`;
    }).join('')
    :`<div style="padding:10px 16px;color:var(--muted);font-size:.78rem">${tr('noFeed')}</div>`;
}
document.getElementById('openPlan').onclick=()=>{
  const d=new Date();d.setHours(d.getHours()+2,0,0,0);
  document.getElementById('pmDate').value=d.toISOString().slice(0,16);
  document.getElementById('planModal').classList.add('on');
};
document.getElementById('pmCancel').onclick=()=>document.getElementById('planModal').classList.remove('on');
document.getElementById('pmSubmit').onclick=()=>{
  const a={cat:document.getElementById('pmCat').value,place:document.getElementById('pmPlace').value,date:document.getElementById('pmDate').value,desc:document.getElementById('pmDesc').value,creator:user?.name||'–',t:Date.now()};
  activities.unshift(a);activities=activities.slice(0,20);
  localStorage.setItem('ao_activities',JSON.stringify(activities));
  addFeed({type:'plan',user:a.creator,place:a.place||trC(a.cat),t:Date.now()});
  document.getElementById('planModal').classList.remove('on');renderSocial();
};

// ══ PROFIL ══
function isBadgeEarned(b){
  if(b.cat)return PLACES.filter(p=>visited.includes(p.id)&&(p.activity_types||[]).includes(b.cat)).length>=(b.n||1);
  if(b.totalN)return visited.length>=b.totalN;
  if(b.streakN)return streak>=b.streakN;
  return false;
}
function renderProfile(){
  document.getElementById('profAv').textContent=user?user.name[0].toUpperCase():'?';
  document.getElementById('profName').textContent=user?.name||'–';
  document.getElementById('profSub').textContent=user?.email||'';
  const cats=new Set(visited.flatMap(id=>{const p=PLACES.find(x=>x.id===id);return p?(p.activity_types||[]):[]}));
  document.getElementById('profStats').innerHTML=`<div class="pst"><div class="pst-n">${visited.length}</div><div class="pst-l">${tr('visited_n')}</div></div><div class="pst"><div class="pst-n">${cats.size}</div><div class="pst-l">${tr('categories')}</div></div><div class="pst"><div class="pst-n">${streak}</div><div class="pst-l">${tr('streak')}</div></div>`;
  document.getElementById('badgesRow').innerHTML=BADGES.map(b=>`<div class="badge${isBadgeEarned(b)?' ok':''}"><span style="font-size:1.1rem">${b.ico}</span><span style="font-size:.53rem;font-weight:700;color:var(--navy);text-align:center;display:block">${b.ico}</span></div>`).join('');
  renderFriends();
}
function renderFriends(){
  const all=[{name:'Andreas K.',pts:120},{name:'Maria L.',pts:85},{name:'Sophie T.',pts:200},...friends];
  const uniq=[...new Map(all.map(u=>[u.name,u])).values()];
  document.getElementById('frList').innerHTML=uniq.map(u=>{
    const isFr=friends.some(f=>f.name===u.name);
    return`<div class="fr-item"><div class="fr-av">${u.name[0]}</div><div style="flex:1"><div style="font-weight:700;font-size:.8rem;color:var(--navy)">${u.name}</div><div style="font-size:.65rem;color:var(--muted)">${u.pts||0} pt</div></div><button class="fr-btn${isFr?' ok':''}" onclick="toggleFr('${u.name}',${u.pts||0})">${isFr?tr('friendAdded'):tr('addFriend')}</button></div>`;
  }).join('');
}
window.toggleFr=function(name,pts){
  const i=friends.findIndex(f=>f.name===name);if(i>=0)friends.splice(i,1);else friends.push({name,pts});
  localStorage.setItem('ao_friends',JSON.stringify(friends));renderFriends();renderSocial();
};
document.getElementById('logoutBtn').onclick=()=>{
  user=null;localStorage.removeItem('ao_user');localStorage.removeItem('ao_guest');
  document.getElementById('onb').style.display='flex';showSscr(null);
};

// ══ LANG MODAL ══
document.getElementById('langBtn').onclick=()=>document.getElementById('langModal').classList.add('on');
document.getElementById('langModal').addEventListener('click',e=>{if(e.target===document.getElementById('langModal'))document.getElementById('langModal').classList.remove('on');});
document.querySelectorAll('.li').forEach(li=>li.addEventListener('click',()=>{
  setLang(li.dataset.l);
  document.getElementById('langModal').classList.remove('on');
}));

// ══ INIT ══
applyLang();
initMap();
buildCatScroll();
renderListFull();
if(user||localStorage.getItem('ao_guest')==='1'){
  document.getElementById('onb').style.display='none';
}
</script>
